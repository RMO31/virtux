<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;min-height:100vh}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;padding:36px 32px;width:340px;text-align:center}
    .login-box h1{color:#d4e800;font-size:24px;margin-bottom:6px}
    .login-box p{color:#667;font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:14px;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#9fb000}
    .btn-login{width:100%;padding:10px;background:#9fb000;color:#000;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-login:hover{background:#d4e800}
    .err{color:#f55;font-size:12px;margin-top:8px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column}
    .topbar{background:#000718;border-bottom:1px solid #9fb000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{color:#d4e800;font-size:16px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .conn{font-size:12px;padding:3px 10px;border-radius:4px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}
    .conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
    .btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;height:calc(100vh - 46px)}
    .sidebar{width:190px;background:#050c2e;border-right:1px solid #1e2d6b;padding:12px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}
    .sb-btn.active{border-left:3px solid #d4e800}
    .sb-sec{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px}
    .main{flex:1;padding:20px;overflow-y:auto;background:#01042e}
    .ap{display:none}
    .ap.active{display:block}
    .page-title{font-size:18px;color:#d4e800;font-weight:700;margin-bottom:16px}
    .card{background:#050e30;border:1px solid #1e2d6b;border-radius:12px;padding:18px;margin-bottom:18px}
    .card h3{color:#9fb000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:13px;width:100%}
    .full{grid-column:1/-1}
    .btn-pub{background:#9fb000;color:#000;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-pub:hover{background:#d4e800}
    .btn-pub:disabled{background:#445;color:#778;cursor:not-allowed}
    .ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .img-upload input[type=file]{display:none}
    .img-upload label{background:#1a2d80;color:#9fb000;border:1px solid #1e2d6b;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer}
    .img-preview{width:40px;height:40px;border-radius:6px;object-fit:cover;display:none}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
    .stat-card{background:#050e30;border:1px solid #1e2d6b;border-radius:10px;padding:14px;text-align:center}
    .stat-number{font-size:28px;font-weight:700;color:#d4e800}
    .stat-label{font-size:11px;color:#667;margin-top:4px}
    .posts-list{display:flex;flex-direction:column;gap:8px}
    .pi{background:#0a1540;border:1px solid #1e2d6b;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .pi-icon{width:40px;height:40px;border-radius:6px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:#0f1e55;font-size:20px}
    .pi-info{flex:1}
    .pi-title{font-size:13px;font-weight:600;color:#ddd}
    .pi-meta{font-size:11px;color:#667;margin-top:2px}
    .pi-tag{display:inline-block;font-size:10px;background:#0f1e55;color:#9fb000;border-radius:3px;padding:1px 7px;margin-top:3px}
    .btn-edit{background:#1a2d80;border:1px solid #9fb000;color:#9fb000;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-del{background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-edit:hover{background:#9fb000;color:#000}
    .btn-del:hover{background:#f55;color:#fff}
    .empty{text-align:center;color:#445;padding:30px;font-size:13px}
    .loading{text-align:center;color:#667;padding:20px;font-size:13px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,4,0.85);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
    .modal-top{background:#000718;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2d6b}
    .modal-top h2{font-size:16px;color:#d4e800}
    .modal-close{background:transparent;border:1px solid #556;color:#aaa;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px}
    .modal-body{padding:18px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <h1>🎮 Virtux Admin</h1>
    <p>أدخل كلمة المرور</p>
    <input type="password" id="pw" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="err" id="loginErr">كلمة المرور خاطئة!</div>
  </div>
</div>

<div id="adminPage">
  <div class="topbar">
    <h1>🎮 Virtux Admin Panel</h1>
    <div class="topbar-right">
      <span class="conn" id="connStatus">جارٍ الاتصال...</span>
      <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <button class="sb-btn active" id="sb-dashboard" onclick="showPage('dashboard')">📊 Dashboard</button>
      <div class="sb-sec">الأقسام</div>
      <button class="sb-btn" id="sb-live" onclick="showPage('live')">🔴 Live</button>
      <button class="sb-btn" id="sb-tournaments" onclick="showPage('tournaments')">🏆 Tournaments</button>
      <button class="sb-btn" id="sb-highlights" onclick="showPage('highlights')">🎬 Highlights</button>
      <button class="sb-btn" id="sb-subscribers" onclick="showPage('subscribers')">👥 Subscribers</button>
      <div class="sb-sec">أخبار</div>
      <button class="sb-btn" id="sb-gaming-news" onclick="showPage('gaming-news')">📰 Gaming News</button>
      <button class="sb-btn" id="sb-youtube-news" onclick="showPage('youtube-news')">▶️ Youtube News</button>
      <div class="sb-sec">يوتيوب</div>
      <button class="sb-btn" id="sb-yt-channels" onclick="showPage('yt-channels')">📺 Channels</button>
      <button class="sb-btn" id="sb-yt-videos" onclick="showPage('yt-videos')">🎬 Videos</button>
      <button class="sb-btn" id="sb-yt-lives" onclick="showPage('yt-lives')">🔴 Lives</button>
      <div class="sb-sec">تعاون</div>
      <button class="sb-btn" id="sb-projects" onclick="showPage('projects')">🌐 Projects</button>
    </div>
    <div class="main" id="mainContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-top"><h2>✏️ تعديل المنشور</h2><button class="modal-close" onclick="closeEditModal()">✕</button></div>
    <div class="modal-body" id="editModalBody"></div>
  </div>
</div>

<script>
// ==================== إعدادات Supabase ====================
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk';
const YOUTUBE_API_KEY = 'AIzaSyDzjcK_PXjTcrfMO6iE2S-PKg35ZLL0WJY';
const ADMIN_PASSWORD = 'virtux2025';

let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentEditPost = null;
let currentPage = 'dashboard';

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m] || m);
}

// ==================== تسجيل الدخول ====================
async function checkConn() {
  try {
    let res = await fetch(`${SUPABASE_URL}/rest/v1/posts?limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    let el = document.getElementById('connStatus');
    if (res.ok) { el.textContent = '✅ متصل'; el.className = 'conn'; }
    else { el.textContent = '❌ خطأ'; el.className = 'conn fail'; }
  } catch(e) { 
    document.getElementById('connStatus').textContent = '❌ لا إنترنت';
    document.getElementById('connStatus').className = 'conn fail';
  }
}

function login() {
  if (document.getElementById('pw').value === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    checkConn();
    buildPages();
    showPage('dashboard');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout() { window.location.reload(); }

// ==================== بناء الصفحات ====================
function buildPages() {
  let main = document.getElementById('mainContainer');
  main.innerHTML = '';
  let rooms = ['dashboard', 'live', 'tournaments', 'highlights', 'subscribers', 'gaming-news', 'youtube-news', 'yt-channels', 'yt-videos', 'yt-lives', 'projects', 'contact'];
  rooms.forEach(room => {
    let div = document.createElement('div');
    div.className = 'ap';
    div.id = `ap-${room}`;
    div.innerHTML = `<div class="page-title">${getRoomTitle(room)}</div><div id="content-${room}">جاري التحميل...</div>`;
    main.appendChild(div);
  });
}
function getRoomTitle(room) {
  let titles = {
    dashboard:'📊 Dashboard', live:'🔴 Live', tournaments:'🏆 Tournaments', highlights:'🎬 Highlights',
    subscribers:'👥 Subscribers', 'gaming-news':'📰 Gaming News', 'youtube-news':'▶️ Youtube News',
    'yt-channels':'📺 Youtube Channels', 'yt-videos':'🎬 Youtube Videos', 'yt-lives':'🔴 Youtube Lives',
    projects:'🌐 Projects', contact:'📞 Contact'
  };
  return titles[room] || room;
}
function showPage(id) {
  currentPage = id;
  document.querySelectorAll('.ap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  let target = document.getElementById(`ap-${id}`);
  if (target) target.classList.add('active');
  let btn = document.getElementById(`sb-${id}`);
  if (btn) btn.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  else if (id === 'contact') loadContact();
  else loadContentPage(id);
}
function loadContact() {
  let container = document.getElementById('content-contact');
  container.innerHTML = `<div class="card"><h3>معلومات الاتصال</h3><p>بريد: admin@virtux.gg</p><p>ديسكورد: virtux_official</p></div>`;
}

// ==================== Dashboard ====================
async function loadDashboard() {
  let container = document.getElementById('content-dashboard');
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    // Try to get users from profiles table
    let { data: users, error } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    // Also check auth for any users not in profiles (shouldn't happen but just in case)
    if (!users) users = [];
    let total = users?.length || 0;
    let vipCount = users?.filter(u => u.role === 'vip').length || 0;
    let html = `<div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">إجمالي المستخدمين</div></div>
      <div class="stat-card"><div class="stat-number">${vipCount}</div><div class="stat-label">VIP</div></div>
      <div class="stat-card"><div class="stat-number">${total - vipCount}</div><div class="stat-label">عادي</div></div>
    </div>`;
    if (users && users.length) {
      html += `<div class="card"><h3>👥 المستخدمون</h3><div class="posts-list">` + users.map(u => `
        <div class="pi" id="user-${u.id}">
          <div class="pi-icon">👤</div>
          <div class="pi-info">
            <div class="pi-title">${escapeHtml(u.username || u.email)}</div>
            <div class="pi-meta">${escapeHtml(u.email)} • ${new Date(u.created_at).toLocaleDateString()}</div>
            <span class="pi-tag">${u.role?.toUpperCase() || 'USER'}</span>
          </div>
          <div style="display:flex; gap:6px;">
            ${u.role !== 'vip' ? `<button class="btn-edit" onclick="setRole('${u.id}','vip')">👑 VIP</button>` : ''}
            ${u.role !== 'user' ? `<button class="btn-edit" onclick="setRole('${u.id}','user')">👤 User</button>` : ''}
            <button class="btn-del" onclick="deleteUser('${u.id}')">🗑️ حذف</button>
          </div>
        </div>`).join('') + `</div></div>`;
    } else html += '<div class="card"><div class="empty">لا يوجد مستخدمون بعد.</div></div>';
    container.innerHTML = html;
  } catch(e) { container.innerHTML = '<div class="empty">خطأ في تحميل البيانات</div>'; console.error(e); }
}
async function setRole(userId, role) {
  await supabase.from('profiles').update({ role }).eq('id', userId);
  loadDashboard();
}
async function deleteUser(userId) {
  if (!confirm('حذف المستخدم نهائياً؟')) return;
  await supabase.from('profiles').delete().eq('id', userId);
  loadDashboard();
}

// ==================== تحميل صفحة المحتوى (إضافة + قائمة) ====================
async function loadContentPage(room) {
  let container = document.getElementById(`content-${room}`);
  if (!container) return;
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    let { data: posts, error } = await supabase.from('posts').select('*').eq('room', room).order('id', { ascending: false });
    if (error) throw error;
    // بناء نموذج الإضافة
    let addForm = getAddForm(room);
    // بناء قائمة المنشورات
    let postsHtml = '';
    if (posts && posts.length) {
      postsHtml = `<div class="card"><h3>📋 المنشورات</h3><div class="posts-list">` + posts.map(p => {
        let media = '';
        if (p.url && (p.url.match(/\.(mp4|webm)$/i) || p.url.includes('/storage/v1/object/public/videos/'))) 
          media = `<video src="${p.url}" controls style="width:80px; height:60px; object-fit:cover; border-radius:6px;"></video>`;
        else if (p.url && p.url.includes('youtube.com')) {
          let vid = p.url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
          media = vid ? `<img src="https://img.youtube.com/vi/${vid}/default.jpg" style="width:80px; height:60px; object-fit:cover;">` : `<div class="pi-icon">${p.icon || '📹'}</div>`;
        } else if (p.icon && (p.icon.startsWith('data:') || p.icon.startsWith('http'))) 
          media = `<img src="${p.icon}" style="width:40px; height:40px; border-radius:6px; object-fit:cover;">`;
        else 
          media = `<div class="pi-icon">${p.icon || '📄'}</div>`;
        return `<div class="pi" id="pi-${p.id}">
          <div style="width:80px; flex-shrink:0;">${media}</div>
          <div class="pi-info">
            <div class="pi-title">${escapeHtml(p.title)}</div>
            <div class="pi-meta">${escapeHtml(p.description||'')} • ${p.tag||''}</div>
            <span class="pi-tag">${escapeHtml(p.tag||p.room)}</span>
          </div>
          <div style="display:flex; gap:6px;">
            <button class="btn-edit" onclick="openEditModal(${p.id})">✏️ تعديل</button>
            <button class="btn-del" onclick="deletePost(${p.id},'${room}')">🗑️ حذف</button>
          </div>
        </div>`;
      }).join('') + `</div></div>`;
    } else postsHtml = '<div class="card"><div class="empty">لا توجد منشورات.</div></div>';
    container.innerHTML = addForm + postsHtml;
  } catch(e) { container.innerHTML = '<div class="empty">خطأ في التحميل</div>'; console.error(e); }
}

function getAddForm(room) {
  if (room === 'highlights') {
    return `<div class="card"><h3>➕ إضافة منشور</h3>
      <div class="ok" id="ok-${room}">✅ تم النشر!</div><div class="er" id="er-${room}"></div>
      <div class="fg"><input class="full" id="title-${room}" placeholder="العنوان"><input id="desc-${room}" placeholder="وصف قصير">
      <div class="img-upload full"><input type="file" id="imgfile-${room}" accept="image/*" onchange="previewImg('${room}')"><label for="imgfile-${room}">📁 رفع صورة</label><input type="text" id="icon-${room}" placeholder="رمز تعبيري"><img id="preview-${room}" class="img-preview" src=""></div>
      <div class="img-upload full"><input type="file" id="videofile-${room}" accept="video/mp4,video/webm" onchange="uploadVideoToBucket('${room}')"><label for="videofile-${room}">🎥 رفع فيديو</label></div>
      <select id="tag-${room}"><option value="Pro">🏅 Pro</option><option value="Tournament">🏆 بطولة</option><option value="Video">📹 فيديو</option><option value="Photo">📷 صورة</option></select>
      <input class="full" id="url-${room}" placeholder="رابط (يوتيوب أو فيديو)"><textarea class="full" id="content-${room}" placeholder="محتوى طويل" rows="4"></textarea></div>
      <button class="btn-pub" onclick="addPost('${room}')">➕ نشر</button></div>`;
  } else if (room === 'subscribers') {
    return `<div class="card"><h3>🔔 إضافة Youtuber (برابط)</h3>
      <div class="ok" id="ok-${room}">✅ تمت الإضافة!</div><div class="er" id="er-${room}"></div>
      <div class="fg"><input class="full" id="url-${room}" placeholder="رابط قناة يوتيوب"><select id="tag-${room}"><option value="Youtuber">🔔 Youtuber</option><option value="Youtuber VIP">👑 VIP</option></select><textarea class="full" id="content-${room}" placeholder="وصف" rows="2"></textarea></div>
      <button class="btn-pub" onclick="addYouTubeChannel('${room}')">➕ إضافة</button></div>
      <div class="card"><h3>⭐ إضافة Member/Donor (من المستخدمين)</h3><div class="ok" id="ok-sub-user">✅ تمت!</div><div class="er" id="er-sub-user"></div>
      <div class="fg"><input class="full" id="sub-user-search" placeholder="ابحث باسم المستخدم..." oninput="searchUsers(this.value)"><div class="full" id="user-search-results" style="background:#0a1540;border:1px solid #1e2d6b;border-radius:7px;max-height:180px;overflow-y:auto;display:none;"></div><input class="full" id="sub-user-selected" placeholder="المستخدم المختار..." readonly><input type="hidden" id="sub-user-id"><select id="sub-user-role"><option value="Member">⭐ Member</option><option value="Donor">🎁 Donor</option></select></div>
      <button class="btn-pub" onclick="addUserSubscriber()">➕ إضافة</button></div>`;
  } else if (room === 'yt-channels') {
    return `<div class="card"><h3>➕ إضافة قناة يوتيوب</h3><div class="ok" id="ok-${room}">✅ تمت!</div><div class="er" id="er-${room}"></div><div class="fg"><input class="full" id="url-${room}" placeholder="رابط قناة"><select id="tag-${room}"><option value="Channel">📺 Channel</option></select><textarea class="full" id="content-${room}" placeholder="وصف"></textarea></div><button class="btn-pub" onclick="addYouTubeChannel('${room}')">➕ إضافة</button></div>`;
  } else if (room === 'yt-videos') {
    return `<div class="card"><h3>➕ إضافة فيديو يوتيوب</h3><div class="ok" id="ok-${room}">✅ تمت!</div><div class="er" id="er-${room}"></div><div class="fg"><input class="full" id="url-${room}" placeholder="رابط فيديو أو قناة"><select id="type-${room}"><option value="single">🎬 فيديو عادي</option><option value="channel">👑 قناة VIP (أحدث فيديو)</option></select><select id="tag-${room}"><option value="Video">📹 Video</option><option value="VIP">👑 VIP</option></select><textarea class="full" id="content-${room}" placeholder="وصف"></textarea></div><button class="btn-pub" onclick="addYouTubeVideo('${room}')">➕ إضافة</button></div>`;
  } else if (room === 'yt-lives') {
    return `<div class="card"><h3>➕ إضافة بث مباشر يوتيوب</h3><div class="ok" id="ok-${room}">✅ تمت!</div><div class="er" id="er-${room}"></div><div class="fg"><input class="full" id="url-${room}" placeholder="رابط بث أو قناة"><select id="type-${room}"><option value="single">🔴 بث عادي</option><option value="channel">👑 قناة VIP (أحدث بث)</option></select><select id="tag-${room}"><option value="Live Now">🔴 Live Now</option><option value="Pre Lives">⏰ Pre Lives</option><option value="VIP">👑 VIP</option></select><textarea class="full" id="content-${room}" placeholder="وصف"></textarea></div><button class="btn-pub" onclick="addYouTubeLive()">➕ إضافة</button></div>`;
  } else {
    // الأقسام العادية
    let tagOptions = '';
    if (room === 'live') tagOptions = `<option value="Live Now">🔴 Live Now</option><option value="Pre Lives">⏰ Pre Lives</option><option value="VIP">👑 VIP</option>`;
    else if (room === 'tournaments') tagOptions = `<option value="Registration">📋 تسجيل</option><option value="Global">🌍 عالمي</option><option value="VIP">👑 VIP</option>`;
    else if (room === 'gaming-news') tagOptions = `<option value="News">📰 خبر</option><option value="VIP">👑 VIP</option>`;
    else if (room === 'youtube-news') tagOptions = `<option value="Youtube News">▶️ خبر يوتيوب</option>`;
    else if (room === 'projects') tagOptions = `<option value="Project">🌐 مشروع</option>`;
    else tagOptions = `<option value="default">عام</option>`;
    return `<div class="card"><h3>➕ إضافة منشور</h3>
      <div class="ok" id="ok-${room}">✅ تم النشر!</div><div class="er" id="er-${room}"></div>
      <div class="fg"><input class="full" id="title-${room}" placeholder="العنوان"><input id="desc-${room}" placeholder="وصف قصير">
      <div class="img-upload full"><input type="file" id="imgfile-${room}" accept="image/*" onchange="previewImg('${room}')"><label for="imgfile-${room}">📁 رفع صورة</label><input type="text" id="icon-${room}" placeholder="رمز تعبيري"><img id="preview-${room}" class="img-preview" src=""></div>
      <select id="tag-${room}">${tagOptions}</select>
      <input class="full" id="url-${room}" placeholder="رابط"><textarea class="full" id="content-${room}" placeholder="محتوى طويل" rows="4"></textarea></div>
      <button class="btn-pub" onclick="addPost('${room}')">➕ نشر</button></div>`;
  }
}

// ==================== دوال الإضافة والحذف والتعديل ====================
async function addPost(room) {
  let title = document.getElementById(`title-${room}`)?.value.trim() || '';
  let url = document.getElementById(`url-${room}`)?.value.trim() || '';
  let desc = document.getElementById(`desc-${room}`)?.value.trim() || '';
  let content = document.getElementById(`content-${room}`)?.value.trim() || '';
  let icon = document.getElementById(`icon-${room}`)?.value || '';
  let tag = document.getElementById(`tag-${room}`)?.value || room;
  let imgData = document.getElementById(`icon-${room}`)?._imgData || '';
  if (imgData) icon = imgData;
  
  // التحقق من عدم الفارغية
  if (room === 'highlights') {
    let tagVal = tag;
    let hasVideo = url && (url.match(/\.(mp4|webm)$/i) || url.includes('/storage/v1/object/public/videos/') || url.includes('youtube.com') || url.includes('youtu.be'));
    let hasPhoto = (icon && (icon.startsWith('data:') || icon.startsWith('http'))) || (url && url.match(/\.(jpg|jpeg|png|gif|webp)$/i));
    // Must have at least video OR image
    if (!hasVideo && !hasPhoto) {
      showError(room, '❌ يجب رفع صورة أو فيديو على الأقل قبل النشر!');
      return;
    }
    if (tagVal === 'Photo') {
      if (!hasPhoto) { showError(room, '❌ خانة الصورة: يجب رفع صورة أو رابط صورة.'); return; }
      if (hasVideo) { showError(room, '❌ خانة الصورة لا تقبل فيديو! غيّر النوع إلى Video.'); return; }
    } else {
      if (!hasVideo) { showError(room, '❌ خانة الفيديو: يجب رفع فيديو أو رابط يوتيوب.'); return; }
    }
  } else {
    if (!title && !url && !icon) { showError(room, '❌ المنشور فارغ. أدخل عنواناً أو رابطاً أو صورة.'); return; }
  }
  if (!title && (url || icon)) title = room === 'highlights' ? '🎬 مقطع' : '📄 منشور';
  
  let body = { title, description: desc, icon: icon || '📄', url, tag, room, content };
  let btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  try {
    let { error } = await supabase.from('posts').insert(body);
    if (error) throw error;
    let okDiv = document.getElementById(`ok-${room}`);
    if (okDiv) { okDiv.style.display = 'block'; setTimeout(() => okDiv.style.display = 'none', 2000); }
    // تفريغ الحقول
    document.getElementById(`title-${room}`).value = '';
    if (document.getElementById(`desc-${room}`)) document.getElementById(`desc-${room}`).value = '';
    if (document.getElementById(`url-${room}`)) document.getElementById(`url-${room}`).value = '';
    if (document.getElementById(`icon-${room}`)) document.getElementById(`icon-${room}`).value = '';
    if (document.getElementById(`content-${room}`)) document.getElementById(`content-${room}`).value = '';
    let preview = document.getElementById(`preview-${room}`);
    if (preview) { preview.style.display = 'none'; preview.src = ''; }
    let fileInput = document.getElementById(`imgfile-${room}`);
    if (fileInput) fileInput.value = '';
    let videoInput = document.getElementById(`videofile-${room}`);
    if (videoInput) videoInput.value = '';
    loadContentPage(room);
    loadDashboard();
  } catch(e) { showError(room, e.message); }
  finally { if (btn) btn.disabled = false; }
}
function showError(room, msg) {
  let er = document.getElementById(`er-${room}`);
  if (er) { er.textContent = msg; er.style.display = 'block'; setTimeout(() => er.style.display = 'none', 4000); }
  else alert(msg);
}
async function deletePost(id, room) {
  if (!confirm('حذف المنشور؟')) return;
  await supabase.from('posts').delete().eq('id', id);
  loadContentPage(room);
  loadDashboard();
}
async function openEditModal(id) {
  let { data, error } = await supabase.from('posts').select('*').eq('id', id).single();
  if (error) return;
  currentEditPost = data;
  let modalBody = document.getElementById('editModalBody');
  modalBody.innerHTML = `
    <div class="fg"><input class="full" id="edit-title" placeholder="العنوان" value="${escapeHtml(data.title)}"></div>
    <div class="fg"><input id="edit-desc" placeholder="وصف" value="${escapeHtml(data.description||'')}"></div>
    <div class="fg"><input id="edit-icon" placeholder="رمز أو رابط صورة" value="${escapeHtml(data.icon||'')}"></div>
    <div class="fg"><input class="full" id="edit-url" placeholder="رابط" value="${escapeHtml(data.url||'')}"></div>
    <div class="fg"><select id="edit-tag">${getTagOptionsForEdit(data.room, data.tag)}</select></div>
    <div class="fg"><textarea class="full" id="edit-content" placeholder="محتوى" rows="5">${escapeHtml(data.content||'')}</textarea></div>
    <button class="btn-pub" onclick="saveEditPost()">💾 حفظ</button>`;
  document.getElementById('editModal').classList.add('open');
}
function getTagOptionsForEdit(room, currentTag) {
  let opts = '';
  if (room === 'live') opts = `<option value="Live Now">🔴 Live Now</option><option value="Pre Lives">⏰ Pre Lives</option><option value="VIP">👑 VIP</option>`;
  else if (room === 'tournaments') opts = `<option value="Registration">📋 تسجيل</option><option value="Global">🌍 عالمي</option><option value="VIP">👑 VIP</option>`;
  else if (room === 'highlights') opts = `<option value="Pro">🏅 Pro</option><option value="Tournament">🏆 بطولة</option><option value="Video">📹 فيديو</option><option value="Photo">📷 صورة</option>`;
  else if (room === 'gaming-news') opts = `<option value="News">📰 خبر</option><option value="VIP">👑 VIP</option>`;
  else if (room === 'youtube-news') opts = `<option value="Youtube News">▶️ خبر يوتيوب</option>`;
  else if (room === 'projects') opts = `<option value="Project">🌐 مشروع</option>`;
  else opts = `<option value="default">عام</option>`;
  return opts.replace(`value="${currentTag}"`, `value="${currentTag}" selected`);
}
async function saveEditPost() {
  if (!currentEditPost) return;
  let updated = {
    title: document.getElementById('edit-title').value,
    description: document.getElementById('edit-desc').value,
    icon: document.getElementById('edit-icon').value,
    url: document.getElementById('edit-url').value,
    tag: document.getElementById('edit-tag').value,
    content: document.getElementById('edit-content').value
  };
  await supabase.from('posts').update(updated).eq('id', currentEditPost.id);
  closeEditModal();
  loadContentPage(currentEditPost.room);
  loadDashboard();
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); currentEditPost = null; }

// ==================== رفع فيديو ====================
async function uploadVideoToBucket(room) {
  let fileInput = document.getElementById(`videofile-${room}`);
  let file = fileInput?.files[0];
  if (!file) return;
  let fileName = Date.now() + '_' + file.name;
  let filePath = `highlights/${fileName}`;
  let uploadUrl = `${SUPABASE_URL}/storage/v1/object/videos/${filePath}`;
  let btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  try {
    let res = await fetch(uploadUrl, { method: 'POST', headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` }, body: file });
    if (res.ok) {
      let publicUrl = `${SUPABASE_URL}/storage/v1/object/public/videos/${filePath}`;
      document.getElementById(`url-${room}`).value = publicUrl;
      let titleField = document.getElementById(`title-${room}`);
      if (titleField && !titleField.value.trim()) titleField.value = file.name.replace(/\.[^/.]+$/, '');
      alert('✅ تم رفع الفيديو! الرابط جاهز.');
    } else { alert('فشل الرفع: تأكد من وجود bucket "videos" وجعله عاماً.'); }
  } catch(e) { alert('خطأ: ' + e.message); }
  finally { if (btn) btn.disabled = false; }
}
function previewImg(room) {
  let file = document.getElementById(`imgfile-${room}`).files[0];
  if (!file) return;
  let reader = new FileReader();
  reader.onload = e => {
    let preview = document.getElementById(`preview-${room}`);
    preview.src = e.target.result;
    preview.style.display = 'block';
    let iconField = document.getElementById(`icon-${room}`);
    iconField.value = '🖼️';
    iconField._imgData = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ==================== دوال يوتيوب ====================
async function fetchYouTubeChannelInfo(url) {
  let handle = url.split('@')[1]?.split(/[\/?]/)[0];
  if (!handle) return null;
  let apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${handle}&key=${YOUTUBE_API_KEY}`;
  let res = await fetch(apiUrl);
  let data = await res.json();
  if (data.items && data.items[0]) return { title: data.items[0].snippet.title, subscribers: data.items[0].statistics.subscriberCount?.toLocaleString() || '0', thumbnail: data.items[0].snippet.thumbnails?.high?.url };
  return null;
}
async function addYouTubeChannel(room) {
  let url = document.getElementById(`url-${room}`).value.trim();
  if (!url) { alert('أدخل رابط القناة'); return; }
  let info = await fetchYouTubeChannelInfo(url);
  if (!info) { alert('تعذر جلب معلومات القناة'); return; }
  let body = { title: info.title, description: `${info.subscribers} مشترك`, icon: info.thumbnail || '📺', url: url, tag: document.getElementById(`tag-${room}`).value, room: room, content: document.getElementById(`content-${room}`).value.trim() };
  await supabase.from('posts').insert(body);
  loadContentPage(room);
}
async function fetchYouTubeVideoInfo(url) {
  let vid = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
  if (!vid) return null;
  let apiUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${vid}&key=${YOUTUBE_API_KEY}`;
  let res = await fetch(apiUrl);
  let data = await res.json();
  if (data.items && data.items[0]) return { title: data.items[0].snippet.title, description: data.items[0].snippet.channelTitle, thumbnail: data.items[0].snippet.thumbnails?.high?.url, videoUrl: url };
  return null;
}
async function fetchVideoFromChannel(channelUrl) {
  let handle = channelUrl.split('@')[1]?.split(/[\/?]/)[0];
  if (!handle) return null;
  let apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${handle}&key=${YOUTUBE_API_KEY}`;
  let res = await fetch(apiUrl);
  let data = await res.json();
  let channelId = data.items?.[0]?.id;
  if (!channelId) return null;
  let videosApi = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=1&order=date&type=video&key=${YOUTUBE_API_KEY}`;
  let videosRes = await fetch(videosApi);
  let videosData = await videosRes.json();
  let video = videosData.items?.[0];
  if (video) return { title: video.snippet.title, description: video.snippet.channelTitle, thumbnail: video.snippet.thumbnails?.high?.url, videoUrl: `https://www.youtube.com/watch?v=${video.id.videoId}` };
  return null;
}
async function addYouTubeVideo(room) {
  let url = document.getElementById(`url-${room}`).value.trim();
  if (!url) { alert('أدخل رابط'); return; }
  let type = document.getElementById(`type-${room}`).value;
  let info = type === 'single' ? await fetchYouTubeVideoInfo(url) : await fetchVideoFromChannel(url);
  if (!info) { alert('تعذر جلب الفيديو'); return; }
  let body = { title: info.title, description: info.description, icon: info.thumbnail || '📹', url: info.videoUrl, tag: document.getElementById(`tag-${room}`).value, room: room, content: document.getElementById(`content-${room}`).value.trim() };
  await supabase.from('posts').insert(body);
  loadContentPage(room);
}
async function fetchLiveFromChannel(channelUrl) {
  let handle = channelUrl.split('@')[1]?.split(/[\/?]/)[0];
  if (!handle) return null;
  let apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${handle}&key=${YOUTUBE_API_KEY}`;
  let res = await fetch(apiUrl);
  let data = await res.json();
  let channelId = data.items?.[0]?.id;
  if (!channelId) return null;
  let liveApi = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=live&type=video&maxResults=1&key=${YOUTUBE_API_KEY}`;
  let liveRes = await fetch(liveApi);
  let liveData = await liveRes.json();
  let video = liveData.items?.[0];
  if (video) return { title: video.snippet.title, description: video.snippet.channelTitle, thumbnail: video.snippet.thumbnails?.high?.url, videoUrl: `https://www.youtube.com/watch?v=${video.id.videoId}` };
  return null;
}
async function addYouTubeLive() {
  let url = document.getElementById(`url-yt-lives`).value.trim();
  if (!url) { alert('أدخل رابط'); return; }
  let type = document.getElementById(`type-yt-lives`).value;
  let info = type === 'single' ? await fetchYouTubeVideoInfo(url) : await fetchLiveFromChannel(url);
  if (!info) { alert('تعذر جلب البث'); return; }
  let tag = document.getElementById(`tag-yt-lives`).value;
  let body = { title: info.title, description: info.description, icon: info.thumbnail || '🔴', url: info.videoUrl, tag: tag, room: 'yt-lives', content: document.getElementById(`content-yt-lives`).value.trim() };
  let liveBody = { ...body, room: 'live' };
  await supabase.from('posts').insert(body);
  await supabase.from('posts').insert(liveBody);
  loadContentPage('yt-lives');
  loadContentPage('live');
}

// ==================== دوال المستخدمين للإضافة في Subscribers ====================
async function searchUsers(query) {
  let resultsDiv = document.getElementById('user-search-results');
  if (!query || query.length < 2) { resultsDiv.style.display = 'none'; return; }
  let { data: users, error } = await supabase.from('profiles').select('id,username,email').ilike('username', `%${query}%`);
  if (!users || !users.length) { resultsDiv.style.display = 'block'; resultsDiv.innerHTML = '<div style="padding:10px;">لا يوجد مستخدم</div>'; return; }
  resultsDiv.style.display = 'block';
  resultsDiv.innerHTML = users.map(u => `<div onclick="selectUser('${u.id}','${u.username}')" style="padding:10px;cursor:pointer;border-bottom:1px solid #1e2d6b;">${escapeHtml(u.username)} (${u.email})</div>`).join('');
}
function selectUser(id, username) {
  document.getElementById('sub-user-id').value = id;
  document.getElementById('sub-user-selected').value = username;
  document.getElementById('user-search-results').style.display = 'none';
}
async function addUserSubscriber() {
  let userId = document.getElementById('sub-user-id').value;
  let username = document.getElementById('sub-user-selected').value;
  let role = document.getElementById('sub-user-role').value;
  if (!userId || !username) { alert('اختر مستخدم أولاً'); return; }
  let body = { title: username, description: role, room: 'subscribers', icon: '👤', tag: role, url: '' };
  await supabase.from('posts').insert(body);
  loadContentPage('subscribers');
}
