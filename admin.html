<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Virtux Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;min-height:100vh}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;padding:36px 32px;width:340px;text-align:center}
    .login-box h1{color:#d4e800;font-size:24px;margin-bottom:6px}
    .login-box p{color:#667;font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:14px;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#9fb000}
    .btn-login{width:100%;padding:10px;background:#9fb000;color:#000;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-login:hover{background:#d4e800}
    .err{color:#f55;font-size:12px;margin-top:8px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column}
    .topbar{background:#000718;border-bottom:1px solid #9fb000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{color:#d4e800;font-size:16px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .conn{font-size:12px;padding:3px 10px;border-radius:4px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}
    .conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
    .btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;height:calc(100vh - 46px)}
    .sidebar{width:190px;background:#050c2e;border-right:1px solid #1e2d6b;padding:12px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}
    .sb-btn.active{border-left:3px solid #d4e800}
    .sb-sec{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px}
    .main{flex:1;padding:20px;overflow-y:auto;background:#01042e}
    .ap{display:none}
    .ap.active{display:block}
    .page-title{font-size:18px;color:#d4e800;font-weight:700;margin-bottom:16px}
    .card{background:#050e30;border:1px solid #1e2d6b;border-radius:12px;padding:18px;margin-bottom:18px}
    .card h3{color:#9fb000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:13px;width:100%}
    .full{grid-column:1/-1}
    .btn-pub{background:#9fb000;color:#000;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-pub:hover{background:#d4e800}
    .btn-pub:disabled{background:#445;color:#778;cursor:not-allowed}
    .ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .img-upload input[type=file]{display:none}
    .img-upload label{background:#1a2d80;color:#9fb000;border:1px solid #1e2d6b;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer}
    .img-preview{width:40px;height:40px;border-radius:6px;object-fit:cover;display:none}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
    .stat-card{background:#050e30;border:1px solid #1e2d6b;border-radius:10px;padding:14px;text-align:center}
    .stat-number{font-size:28px;font-weight:700;color:#d4e800}
    .stat-label{font-size:11px;color:#667;margin-top:4px}
    .posts-list{display:flex;flex-direction:column;gap:8px}
    .pi{background:#0a1540;border:1px solid #1e2d6b;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .pi-icon{width:40px;height:40px;border-radius:6px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:#0f1e55;font-size:20px}
    .pi-info{flex:1}
    .pi-title{font-size:13px;font-weight:600;color:#ddd}
    .pi-meta{font-size:11px;color:#667;margin-top:2px}
    .pi-tag{display:inline-block;font-size:10px;background:#0f1e55;color:#9fb000;border-radius:3px;padding:1px 7px;margin-top:3px}
    .btn-edit{background:#1a2d80;border:1px solid #9fb000;color:#9fb000;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-del{background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-edit:hover{background:#9fb000;color:#000}
    .btn-del:hover{background:#f55;color:#fff}
    .empty{text-align:center;color:#445;padding:30px;font-size:13px}
    .loading{text-align:center;color:#667;padding:20px;font-size:13px}
    
    /* Modal التعديل */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,4,0.85);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
    .modal-top{background:#000718;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2d6b}
    .modal-top h2{font-size:16px;color:#d4e800}
    .modal-close{background:transparent;border:1px solid #556;color:#aaa;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px}
    .modal-body{padding:18px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <h1>🎮 Virtux Admin</h1>
    <p>أدخل كلمة المرور</p>
    <input type="password" id="pw" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="err" id="loginErr">كلمة المرور خاطئة!</div>
  </div>
</div>

<div id="adminPage">
  <div class="topbar">
    <h1>🎮 Virtux Admin Panel</h1>
    <div class="topbar-right">
      <span class="conn" id="connStatus">جارٍ الاتصال...</span>
      <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <button class="sb-btn active" id="sb-dashboard" onclick="showPage('dashboard')">📊 Dashboard</button>
      <div class="sb-sec">الأقسام</div>
      <button class="sb-btn" id="sb-live" onclick="showPage('live')">🔴 Live</button>
      <button class="sb-btn" id="sb-tournaments" onclick="showPage('tournaments')">🏆 Tournaments</button>
      <button class="sb-btn" id="sb-highlights" onclick="showPage('highlights')">🎬 Highlights</button>
      <button class="sb-btn" id="sb-subscribers" onclick="showPage('subscribers')">👥 Subscribers</button>
      <div class="sb-sec">أخبار</div>
      <button class="sb-btn" id="sb-gaming-news" onclick="showPage('gaming-news')">📰 Gaming News</button>
      <button class="sb-btn" id="sb-youtube-news" onclick="showPage('youtube-news')">▶️ Youtube News</button>
      <div class="sb-sec">يوتيوب</div>
      <button class="sb-btn" id="sb-yt-channels" onclick="showPage('yt-channels')">📺 Channels</button>
      <button class="sb-btn" id="sb-yt-videos" onclick="showPage('yt-videos')">🎬 Videos</button>
      <button class="sb-btn" id="sb-yt-lives" onclick="showPage('yt-lives')">🔴 Lives</button>
      <div class="sb-sec">تعاون</div>
      <button class="sb-btn" id="sb-projects" onclick="showPage('projects')">🌐 Projects</button>
    </div>

    <div class="main">
      <!-- Dashboard -->
      <div class="ap active" id="ap-dashboard">
        <div class="page-title">📊 Dashboard</div>
        <div class="stats-grid" id="visitor-stats"></div>
        <div class="card">
          <h3>👥 المستخدمون المسجلون</h3>
          <div id="registered-users-list" class="posts-list"><div class="loading">جاري التحميل...</div></div>
        </div>
      </div>

      <!-- سيتم إنشاء بقية الأقسام ديناميكياً بواسطة JS (لكل قسم نموذج إضافة + قائمة منشورات) -->
    </div>
  </div>
</div>

<!-- Modal التعديل -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-top">
      <h2>✏️ تعديل المنشور</h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body" id="editModalBody">
      <!-- سيتم تعبئة الحقول ديناميكياً -->
    </div>
  </div>
</div>

<script>
// ==================== إعدادات Supabase ====================
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk';
const YOUTUBE_API_KEY = 'AIzaSyDzjcK_PXjTcrfMO6iE2S-PKg35ZLL0WJY';
const ADMIN_PASSWORD = 'virtux2025';

// ==================== دوال مساعدة ====================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m] || m);
}

// ==================== الاتصال وتسجيل الدخول ====================
async function checkConn() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?limit=1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const el = document.getElementById('connStatus');
    if (res.ok) { el.textContent = '✅ متصل'; el.className = 'conn'; }
    else { el.textContent = '❌ خطأ ' + res.status; el.className = 'conn fail'; }
  } catch(e) {
    document.getElementById('connStatus').textContent = '❌ لا إنترنت';
    document.getElementById('connStatus').className = 'conn fail';
  }
}

function login() {
  if (document.getElementById('pw').value === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    checkConn();
    loadDashboard();
    buildPages(); // إنشاء الأقسام ديناميكياً
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('pw').value = '';
}

// ==================== بناء الأقسام ديناميكياً (نموذج إضافة + قائمة منشورات) ====================
let currentEditPost = null;

function buildPages() {
  const mainContainer = document.querySelector('.main');
  // إزالة أي أقسام موجودة غير dashboard
  const existing = document.querySelectorAll('.ap:not(#ap-dashboard)');
  existing.forEach(el => el.remove());
  
  const rooms = ['live', 'tournaments', 'highlights', 'subscribers', 'gaming-news', 'youtube-news', 'yt-channels', 'yt-videos', 'yt-lives', 'projects'];
  const roomLabels = {
    live:'🔴 Live', tournaments:'🏆 Tournaments', highlights:'🎬 Highlights', subscribers:'👥 Subscribers',
    'gaming-news':'📰 Gaming News', 'youtube-news':'▶️ Youtube News', 'yt-channels':'📺 Youtube Channels',
    'yt-videos':'🎬 Youtube Videos', 'yt-lives':'🔴 Youtube Lives', projects:'🌐 Projects'
  };
  
  rooms.forEach(room => {
    const ap = document.createElement('div');
    ap.className = 'ap';
    ap.id = `ap-${room}`;
    
    // نموذج الإضافة حسب نوع القسم
    let formHtml = '';
    if (room === 'subscribers') {
      formHtml = `
        <div class="card"><h3>🔔 إضافة Youtuber / Youtuber VIP (برابط)</h3>
          <div class="ok" id="ok-${room}">✅ تمت الإضافة!</div><div class="er" id="er-${room}"></div>
          <div class="fg"><input class="full" id="${room}-url" placeholder="رابط قناة يوتيوب"><select id="${room}-tag"><option value="Youtuber">🔔 Youtuber</option><option value="Youtuber VIP">👑 Youtuber VIP</option></select><textarea class="full" id="${room}-content" placeholder="وصف إضافي" rows="2"></textarea></div>
          <button class="btn-pub" onclick="addYouTubeChannel('${room}')">➕ إضافة</button>
        </div>
        <div class="card"><h3>⭐ إضافة Member / Donor / Collaboration (من المستخدمين)</h3>
          <div class="ok" id="ok-sub-user">✅ تمت الإضافة!</div><div class="er" id="er-sub-user"></div>
          <div class="fg"><input class="full" id="sub-user-search" placeholder="ابحث باسم المستخدم..." oninput="searchUsers(this.value)"><div class="full" id="user-search-results" style="background:#0a1540;border:1px solid #1e2d6b;border-radius:7px;max-height:180px;overflow-y:auto;display:none;"></div><input class="full" id="sub-user-selected" placeholder="المستخدم المختار..." readonly><input type="hidden" id="sub-user-id"><select id="sub-user-role" class="full"><option value="Member">⭐ Member</option><option value="Donor">🎁 Donor</option><option value="Collaboration">🌐 Collaboration</option></select></div>
          <button class="btn-pub" onclick="addUserSubscriber()">➕ إضافة</button>
        </div>
      `;
    } else if (room === 'yt-channels') {
      formHtml = `<div class="card"><h3>➕ إضافة قناة يوتيوب</h3><div class="ok" id="ok-${room}">✅ تمت الإضافة!</div><div class="er" id="er-${room}"></div><div class="fg"><input class="full" id="${room}-url" placeholder="رابط قناة يوتيوب"><select id="${room}-tag"><option value="Channel">📺 Channel</option></select><textarea class="full" id="${room}-content" placeholder="وصف إضافي" rows="3"></textarea></div><button class="btn-pub" onclick="addYouTubeChannel('${room}')">➕ إضافة</button></div>`;
    } else if (room === 'yt-videos') {
      formHtml = `<div class="card"><h3>➕ إضافة فيديو يوتيوب</h3><div class="ok" id="ok-${room}">✅ تمت الإضافة!</div><div class="er" id="er-${room}"></div><div class="fg"><input class="full" id="${room}-url" placeholder="رابط فيديو أو قناة"><select id="${room}-type" class="full"><option value="single">🎬 فيديو عادي</option><option value="channel">👑 قناة VIP (أحدث فيديو)</option></select><select id="${room}-tag"><option value="Video">📹 Video</option><option value="VIP">👑 VIP</option></select><textarea class="full" id="${room}-content" placeholder="وصف إضافي" rows="3"></textarea></div><button class="btn-pub" onclick="addYouTubeVideo('${room}')">➕ إضافة</button></div>`;
    } else if (room === 'yt-lives') {
      formHtml = `<div class="card"><h3>➕ إضافة بث مباشر يوتيوب</h3><div class="ok" id="ok-${room}">✅ تمت الإضافة!</div><div class="er" id="er-${room}"></div><div class="fg"><input class="full" id="${room}-url" placeholder="رابط بث أو قناة"><select id="${room}-type" class="full"><option value="single">🔴 بث عادي</option><option value="channel">👑 قناة VIP (أحدث بث)</option></select><select id="${room}-tag"><option value="Live Now">🔴 Live Now</option><option value="Pre Lives">⏰ Pre Lives</option><option value="VIP">👑 VIP</option></select><textarea class="full" id="${room}-content" placeholder="وصف إضافي" rows="3"></textarea></div><button class="btn-pub" onclick="addYouTubeLive()">➕ إضافة</button></div>`;
    } else {
      // الأقسام العادية (live, tournaments, highlights, gaming-news, youtube-news, projects)
      const hasVideoUpload = (room === 'highlights');
      formHtml = `<div class="card"><h3>➕ إضافة منشور</h3>
        <div class="ok" id="ok-${room}">✅ تم النشر!</div><div class="er" id="er-${room}"></div>
        <div class="fg"><input class="full" id="${room}-title" placeholder="العنوان"><input id="${room}-desc" placeholder="وصف قصير"><div class="img-upload full"><input type="file" id="${room}-imgfile" accept="image/*" onchange="previewImg('${room}')"><label for="${room}-imgfile">📁 رفع صورة</label><input type="text" id="${room}-icon" placeholder="رمز تعبيري"><img id="${room}-imgpreview" class="img-preview" src=""></div>${hasVideoUpload ? `<div class="img-upload full"><input type="file" id="${room}-videofile" accept="video/mp4,video/webm" onchange="uploadVideoToBucket('${room}')"><label for="${room}-videofile">🎥 رفع فيديو (سيتم جلب العنوان تلقائياً)</label></div>` : ''}<select id="${room}-tag">${getTagOptions(room)}</select><input class="full" id="${room}-url" placeholder="رابط (اختياري)"><textarea class="full" id="${room}-content" placeholder="محتوى طويل" rows="4"></textarea></div>
        <button class="btn-pub" onclick="addPost('${room}')">➕ نشر</button>
      </div>`;
    }
    
    // قائمة المنشورات مع أزرار تعديل وحذف
    ap.innerHTML = `<div class="page-title">${roomLabels[room]}</div>${formHtml}<div class="card"><h3>📋 المنشورات</h3><div id="list-${room}" class="posts-list"><div class="loading">جاري التحميل...</div></div></div>`;
    mainContainer.appendChild(ap);
  });
  
  // إضافة صفحة الاتصال (contact) بشكل منفصل
  const contactAp = document.createElement('div');
  contactAp.className = 'ap';
  contactAp.id = 'ap-contact';
  contactAp.innerHTML = `<div class="page-title">📞 Contact</div><div class="card"><h3>معلومات الاتصال</h3><p>سيتم إضافتها لاحقاً</p></div>`;
  mainContainer.appendChild(contactAp);
}

function getTagOptions(room) {
  if (room === 'live') return `<option value="Live Now">🔴 Live Now</option><option value="Pre Lives">⏰ Pre Lives</option><option value="VIP">👑 VIP</option>`;
  if (room === 'tournaments') return `<option value="Registration">📋 تسجيل</option><option value="Global">🌍 عالمي</option><option value="VIP">👑 VIP</option>`;
  if (room === 'highlights') return `<option value="Pro">🏅 Pro</option><option value="Tournament">🏆 بطولة</option><option value="Video">📹 فيديو</option><option value="Photo">📷 صورة</option>`;
  if (room === 'gaming-news') return `<option value="News">📰 خبر</option><option value="VIP">👑 VIP</option>`;
  if (room === 'youtube-news') return `<option value="Youtube News">▶️ خبر يوتيوب</option>`;
  if (room === 'projects') return `<option value="Project">🌐 مشروع</option>`;
  return `<option value="default">عام</option>`;
}

// ==================== تحميل المنشورات وعرضها مع أزرار ====================
async function loadPosts(room) {
  const container = document.getElementById(`list-${room}`);
  if (!container) return;
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?room=eq.${room}&order=id.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '<div class="empty">لا توجد منشورات.</div>';
      return;
    }
    container.innerHTML = data.map(p => {
      let iconHtml = p.icon;
      if (p.icon && (p.icon.startsWith('data:image') || p.icon.startsWith('http'))) {
        iconHtml = `<img src="${p.icon}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;">`;
      } else {
        iconHtml = p.icon || '📄';
        if (iconHtml.length > 10) iconHtml = iconHtml.substring(0,10)+'…';
      }
      return `<div class="pi" id="pi-${p.id}">
        <div class="pi-icon">${iconHtml}</div>
        <div class="pi-info">
          <div class="pi-title">${escapeHtml(p.title)}</div>
          <div class="pi-meta">${escapeHtml(p.description||'')} • ${p.tag||''}</div>
          <span class="pi-tag">${escapeHtml(p.tag||p.room)}</span>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn-edit" onclick="openEditModal(${p.id})">✏️ تعديل</button>
          <button class="btn-del" onclick="deletePost(${p.id}, '${p.room}')">🗑️ حذف</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
    container.innerHTML = '<div class="empty">خطأ في التحميل</div>';
  }
}

// ==================== حذف منشور ====================
async function deletePost(id, room) {
  if (!confirm('هل تريد حذف هذا المنشور نهائياً؟')) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${id}`, {
      method: 'DELETE',

function getTagOptionsForEdit(room, currentTag) {
  const options = getTagOptions(room);

}

async function saveEditPost() {

// ==================== إضافة منشور (عام) ====================
async function addPost(room) {
  const title = document.getElementById(`${room}-title`)?.value.trim() || '';
  if (room !== 'highlights' && !title) { alert('الرجاء إدخال عنوان'); return; }
  const description = document.getElementById(`${room}-desc`)?.value.trim() || '';
  const iconEl = document.getElementById(`${room}-icon`);
  let icon = iconEl ? (iconEl._imgData || iconEl.value || '📄') : '📄';
  const url = document.getElementById(`${room}-url`)?.value.trim() || '';
  const tag = document.getElementById(`${room}-tag`)?.value || room;
  const content = document.getElementById(`${room}-content`)?.value.trim() || null;
  const body = { title, description, icon, url, tag, room, content };
  const btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) { btn.disabled = true; btn.textContent = 'جاري النشر...'; }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      // تفريغ الحقول
      document.getElementById(`${room}-title`).value = '';
      if(document.getElementById(`${room}-desc`)) document.getElementById(`${room}-desc`).value = '';
      if(document.getElementById(`${room}-icon`)) document.getElementById(`${room}-icon`).value = '';
      if(document.getElementById(`${room}-url`)) document.getElementById(`${room}-url`).value = '';
      if(document.getElementById(`${room}-content`)) document.getElementById(`${room}-content`).value = '';
      const preview = document.getElementById(`${room}-imgpreview`);
      if(preview) { preview.style.display = 'none'; preview.src = ''; }
      const fileInput = document.getElementById(`${room}-imgfile`);
      if(fileInput) fileInput.value = '';
      const videoInput = document.getElementById(`${room}-videofile`);
      if(videoInput) videoInput.value = '';
      const okDiv = document.getElementById(`ok-${room}`);
      if(okDiv) { okDiv.style.display = 'block'; setTimeout(() => okDiv.style.display = 'none', 3000); }
      loadPosts(room);
      loadDashboard();
    } else {
      const err = await res.json();
      const erDiv = document.getElementById(`er-${room}`);
      if(erDiv) { erDiv.textContent = '❌ ' + (err.message || err.hint || 'خطأ'); erDiv.style.display = 'block'; setTimeout(() => erDiv.style.display = 'none', 5000); }
    }
  } catch(e) {
    const erDiv = document.getElementById(`er-${room}`);
    if(erDiv) { erDiv.textContent = '❌ خطأ في الاتصال'; erDiv.style.display = 'block'; setTimeout(() => erDiv.style.display = 'none', 5000); }
  } finally {
    if(btn) { btn.disabled = false; btn.textContent = '➕ نشر'; }
  }
}

// ==================== رفع الفيديو إلى Supabase bucket ====================
async function uploadVideoToBucket(room) {
  const fileInput = document.getElementById(`${room}-videofile`);
  const file = fileInput?.files[0];
  if (!file) return;
  
  // تعبئة العنوان من اسم الملف
  const fullName = file.name;
  const dotIndex = fullName.lastIndexOf('.');
  let baseName = fullName;
  if (dotIndex > 0) baseName = fullName.substring(0, dotIndex);
  const titleField = document.getElementById(`${room}-title`);
  if (titleField && titleField.value.trim() === '') titleField.value = baseName;
  
  const fileName = Date.now() + '_' + file.name;
  const filePath = `highlights/${fileName}`;
  const uploadUrl = `${SUPABASE_URL}/storage/v1/object/videos/${filePath}`;
  try {
    const res = await fetch(uploadUrl, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: file
    });
    if (res.ok) {
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/videos/${filePath}`;
      document.getElementById(`${room}-url`).value = publicUrl;
      alert('تم رفع الفيديو بنجاح! تم تعبئة الرابط تلقائياً.');
    } else {
      const errText = await res.text();
      if (errText.includes('bucket not found') || res.status === 400) {
        alert('⚠️ فشل الرفع: تأكد من وجود bucket باسم "videos" في مشروع Supabase وأنه عام (public).');
      } else {
        alert('فشل الرفع: ' + errText);
      }
    }
  } catch(e) { alert('خطأ في رفع الفيديو: ' + e.message); }
}

// ==================== دوال يوتيوب (قنوات، فيديوهات، بثوث) ====================
async function fetchYouTubeChannelInfo(url) {
  try {
    let channelId = null, handle = null;
    if (url.includes('/channel/')) channelId = url.split('/channel/')[1]?.split(/[\/?]/)[0];
    else if (url.includes('/c/')) channelId = url.split('/c/')[1]?.split(/[\/?]/)[0];
    else if (url.includes('@')) handle = url.split('@')[1]?.split(/[\/?]/)[0];
    else return null;
    let apiUrl = '';
    if (channelId) apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${YOUTUBE_API_KEY}`;
    else if (handle) apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${handle}&key=${YOUTUBE_API_KEY}`;
    else return null;
    const response = await fetch(apiUrl);
    const data = await response.json();
    if (data.items && data.items.length > 0) {
      const item = data.items[0];
      return {
        title: item.snippet.title,
        subscribers: item.statistics.subscriberCount ? parseInt(item.statistics.subscriberCount).toLocaleString() : '0',
        thumbnail: item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.medium?.url
      };
    }
    return null;
  } catch(e) { return null; }
}

async function fetchYouTubeVideoInfo(url) {
  try {
    const videoIdMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|live\/))([^&\?\/]+)/);
    if (!videoIdMatch) return null;
    const videoId = videoIdMatch[1];
    const apiUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${YOUTUBE_API_KEY}`;
    const response = await fetch(apiUrl);
    const data = await response.json();
    if (data.items && data.items.length > 0) {
      const snippet = data.items[0].snippet;
      return {
        title: snippet.title,
        description: snippet.channelTitle,
        thumbnail: snippet.thumbnails?.high?.url || snippet.thumbnails?.medium?.url,
        videoUrl: url
      };
    }
    return null;
  } catch(e) { return null; }
}

function previewImg(room) {
  const file = document.getElementById(`${room}-imgfile`).files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById(`${room}-imgpreview`);
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById(`${room}-icon`).value = '🖼️';
    document.getElementById(`${room}-icon`)._imgData = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ==================== عرض الصفحات ====================
function showPage(id) {
  document.querySelectorAll('.ap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  const target = document.getElementById(`ap-${id}`);
  if (target) target.classList.add('active');
  const btn = document.getElementById(`sb-${id}`);
  if (btn) btn.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  else loadPosts(id);
}

// ==================== Dashboard (إحصائيات وإدارة المستخدمين) ====================
async function loadDashboard() {
  try {
    // Visitor stats
    try {
      const visitorRes = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_visitor_stats`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      if (visitorRes.ok) {
        const visitorStats = await visitorRes.json();
        document.getElementById('visitor-stats').innerHTML = `
          <div class="stat-card"><div class="stat-number">${visitorStats.today || 0}</div><div class="stat-label">زوار اليوم</div></div>
          <div class="stat-card"><div class="stat-number">${visitorStats.total || 0}</div><div class="stat-label">إجمالي الزوار</div></div>
        `;
      } else {
        document.getElementById('visitor-stats').innerHTML = '<div class="empty">إحصائيات الزوار غير متاحة</div>';
      }
    } catch(e) { console.warn(e); }
    
    // Registered users
    const usersRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (usersRes.ok) {
      const users = await usersRes.json();
      const total = Array.isArray(users) ? users.length : 0;
      const vipCount = Array.isArray(users) ? users.filter(u => u.role === 'vip').length : 0;
      let html = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
        <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-number">${vipCount}</div><div class="stat-label">VIP Users</div></div>
        <div class="stat-card"><div class="stat-number">${total - vipCount}</div><div class="stat-label">Regular Users</div></div>
      </div>`;
      if (Array.isArray(users) && users.length) {
        html += users.map(u => {
          const roleColor = u.role === 'vip' ? '#d4e800' : u.role === 'moderator' ? '#4caf90' : '#aab';
          const roleBg = u.role === 'vip' ? '#2a2000' : u.role === 'moderator' ? '#0f3d2e' : '#0f1e55';
          return `<div class="pi" id="user-${u.id}" style="margin-bottom:6px;">
            <div style="width:36px;height:36px;border-radius:50%;background:#1a2d80;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">👤</div>
            <div class="pi-info">
              <div class="pi-title">${escapeHtml(u.username || 'Unknown')}</div>
              <div class="pi-meta">${escapeHtml(u.email || '')} • ${new Date(u.created_at).toLocaleDateString()}</div>
              <span style="display:inline-block;font-size:11px;background:${roleBg};color:${roleColor};border-radius:4px;padding:2px 8px;margin-top:3px;">${u.role?.toUpperCase() || 'USER'}</span>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${u.role !== 'vip' ? `<button onclick="setRole('${u.id}','vip')" style="background:#2a2000;border:1px solid #d4e800;color:#d4e800;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;">👑 VIP</button>` : ''}
              ${u.role !== 'user' ? `<button onclick="setRole('${u.id}','user')" style="background:#0f1e55;border:1px solid #aab;color:#aab;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;">👤 User</button>` : ''}
              <button onclick="deleteUser('${u.id}')" style="background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;">🗑️</button>
            </div>
          </div>`;
        }).join('');
      } else {
        html += '<div class="empty">لا يوجد مستخدمون بعد.</div>';
      }
      document.getElementById('registered-users-list').innerHTML = html;
    }
  } catch(e) { console.error(e); }
}

async function setRole(userId, role) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ role })
    });
    if (res.ok) loadDashboard();
    else alert('Failed to update role');
  } catch(e) { alert('Error: ' + e.message); }
}

async function deleteUser(userId) {
  if (!confirm('Delete this user?')) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    loadDashboard();
  } catch(e) { alert('Error: ' + e.message); }
}

// ==================== بحث مستخدمين للـ Subscribers ====================
async function searchUsers(query) {
  const resultsDiv = document.getElementById('user-search-results');
  if (!query || query.length < 2) { resultsDiv.style.display = 'none'; return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?username=ilike.*${encodeURIComponent(query)}*&select=id,username,email,role`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const users = await res.json();
    if (!Array.isArray(users) || !users.length) {
      resultsDiv.style.display = 'block';
      resultsDiv.innerHTML = '<div style="padding:10px;color:#667;font-size:13px;">لا يوجد مستخدم بهذا الاسم</div>';
      return;
    }
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = users.map(u => `
      <div onclick="selectUser('${u.id}','${u.username}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #1e2d6b;font-size:13px;color:#ddd;display:flex;align-items:center;gap:8px;" onmouseover="this.style.background='#1a2d80'" onmouseout="this.style.background=''">
        <span style="font-size:18px;">👤</span>
        <div><div style="font-weight:600;color:#d4e800;">${u.username}</div><div style="font-size:11px;color:#667;">${u.email || ''}</div></div>
        <span style="margin-left:auto;font-size:11px;background:#0f1e55;color:#9fb000;border-radius:3px;padding:2px 6px;">${u.role?.toUpperCase() || 'USER'}</span>
      </div>`).join('');
  } catch(e) { console.error(e); }
}

function selectUser(id, username) {
  document.getElementById('sub-user-id').value = id;
  document.getElementById('sub-user-selected').value = username;
  document.getElementById('sub-user-search').value = '';
  document.getElementById('user-search-results').style.display = 'none';
}

async function addUserSubscriber() {
  const userId = document.getElementById('sub-user-id').value;
  const username = document.getElementById('sub-user-selected').value;
  const role = document.getElementById('sub-user-role').value;
  if (!userId || !username) {
    document.getElementById('er-sub-user').textContent = '❌ يرجى البحث عن مستخدم أولاً';
    document.getElementById('er-sub-user').style.display = 'block';
    setTimeout(() => document.getElementById('er-sub-user').style.display = 'none', 3000);
    return;
  }
  const body = { title: username, description: role, room: 'subscribers', icon: '👤', tag: role, url: '', content: null };
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      document.getElementById('sub-user-id').value = '';
      document.getElementById('sub-user-selected').value = '';
      document.getElementById('sub-user-search').value = '';
      const ok = document.getElementById('ok-sub-user');
      ok.style.display = 'block';
      setTimeout(() => ok.style.display = 'none', 3000);
      loadPosts('subscribers');
    } else {
      document.getElementById('er-sub-user').textContent = '❌ فشل الإضافة';
      document.getElementById('er-sub-user').style.display = 'block';
      setTimeout(() => document.getElementById('er-sub-user').style.display = 'none', 3000);
    }
  } catch(e) { console.error(e); }
}
