<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux — Gaming Community</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* جميع الأنماط السابقة كما هي (خلفية حربية، أعلام، صواريخ، إلخ) */
    /* ... */
    /* أضفنا نمطاً إضافياً لشبكة منشورات HOME */
    .home-posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding: 30px 20px;
      background: #0a0a0a;
    }
    .home-post-card {
      background: #1e1e2e;
      border: 1px solid #333;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .home-post-card:hover {
      transform: translateY(-4px);
      border-color: #d4af37;
    }
    .home-post-media {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #111;
    }
    .home-post-body {
      padding: 16px;
    }
    .home-post-title {
      font-size: 18px;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 8px;
    }
    .home-post-summary {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .home-post-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .home-post-tag {
      font-size: 11px;
      background: #2a2a3a;
      color: #d4af37;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .btn-read-more {
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .modal-fullpost {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-fullpost-content {
      background: #1e1e2e;
      border: 1px solid #d4af37;
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }
    .modal-fullpost-close {
      position: absolute;
      top: 12px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="vx-root">
  <!-- الهيدر وشريط الأخبار كما هو -->
  <div class="vx-topbar">...</div>
  <div class="vx-ticker">...</div>
  <div class="vx-body">
    <div class="vx-sidebar">...</div>
    <div class="vx-main">
      <div class="vx-page active" id="page-home">
        <div class="home-hero">
          <div class="flags-container">...</div>
          <div class="home-title">مرحباً بكم في VIRTUX</div>
          <div class="home-subtitle">مجتمع الألعاب والنخبة</div>
          <div class="missile"></div>...
        </div>
        <!-- حاوية منشورات HOME -->
        <div id="home-posts-container" class="home-posts-grid">
          <div class="loading-state">جاري تحميل المحتوى...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let allPosts = {};

// باقي تعريفات rooms, roomLabels, إلخ كما هي (لا نضيف home إلى القائمة لأننا سنعالجها يدوياً)
// لكن نحتاج إلى تحميل منشورات home عند فتح الصفحة

async function loadHomePosts() {
  const container = document.getElementById('home-posts-container');
  if (!container) return;
  container.innerHTML = '<div class="loading-state">جاري التحميل...</div>';
  try {
    const { data, error } = await db.from('posts').select('*').eq('room', 'home').order('id', { ascending: false });
    if (error) throw error;
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty-state">لا توجد منشورات في الصفحة الرئيسية بعد.</div>';
      return;
    }
    renderHomePosts(data, container);
  } catch(e) {
    console.error(e);
    container.innerHTML = '<div class="empty-state">فشل تحميل المحتوى</div>';
  }
}

function renderHomePosts(posts, container) {
  container.innerHTML = posts.map(post => {
    let mediaHtml = '';
    const isVideo = post.url && (post.url.match(/\.(mp4|webm|avi|mov|mkv|flv|wmv|m4v|mpg|mpeg|3gp)$/i) || post.url.includes('/storage/v1/object/public/videos/'));
    const isYouTube = post.url && (post.url.includes('youtube.com/watch') || post.url.includes('youtu.be'));
    const isImage = post.icon && (post.icon.startsWith('http') || post.icon.startsWith('data:'));

    if (isVideo) {
      mediaHtml = `<video class="home-post-media" src="${post.url}" controls preload="metadata"></video>`;
    } else if (isYouTube) {
      const videoId = extractYouTubeId(post.url);
      if (videoId) {
        mediaHtml = `<iframe class="home-post-media" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
      } else {
        mediaHtml = `<img class="home-post-media" src="${post.icon || '📹'}">`;
      }
    } else if (isImage) {
      mediaHtml = `<img class="home-post-media" src="${post.icon}">`;
    } else {
      mediaHtml = `<div class="home-post-media" style="display:flex; align-items:center; justify-content:center; background:#2a2a3a; font-size:48px;">${post.icon || '📄'}</div>`;
    }

    const summary = post.content ? post.content.substring(0, 120) + (post.content.length > 120 ? '...' : '') : (post.description || '');
    const tag = post.tag || 'Article';

    return `<div class="home-post-card" data-id="${post.id}">
      ${mediaHtml}
      <div class="home-post-body">
        <div class="home-post-title">${escapeHtml(post.title)}</div>
        <div class="home-post-summary">${escapeHtml(summary)}</div>
        <div class="home-post-footer">
          <span class="home-post-tag">${escapeHtml(tag)}</span>
          <button class="btn-read-more" onclick="showFullPost(${post.id})">📖 اقرأ المزيد</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function extractYouTubeId(url) {
  const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|live\/))([^&\?\/]+)/);
  return match ? match[1] : null;
}

function showFullPost(postId) {
  // البحث عن المنشور في allPosts (أو جلب مباشرة)
  // سنقوم بجلب البيانات من قاعدة البيانات لعرض النافذة
  db.from('posts').select('*').eq('id', postId).single().then(({ data, error }) => {
    if (error || !data) return;
    const modal = document.createElement('div');
    modal.className = 'modal-fullpost';
    modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    modal.innerHTML = `
      <div class="modal-fullpost-content">
        <div class="modal-fullpost-close" onclick="this.closest('.modal-fullpost').remove()">&times;</div>
        <h2 style="color:#d4af37; margin-bottom:12px;">${escapeHtml(data.title)}</h2>
        ${data.icon && (data.icon.startsWith('http') || data.icon.startsWith('data:')) ? `<img src="${data.icon}" style="max-width:100%; border-radius:12px; margin-bottom:16px;">` : ''}
        ${data.url && (data.url.match(/\.(mp4|webm)/i) || data.url.includes('/storage/v1/object/public/videos/')) ? `<video src="${data.url}" controls style="width:100%; border-radius:12px; margin-bottom:16px;"></video>` : ''}
        ${data.url && data.url.includes('youtube.com') ? `<iframe src="https://www.youtube.com/embed/${extractYouTubeId(data.url)}" style="width:100%; aspect-ratio:16/9; border-radius:12px; margin-bottom:16px;" allowfullscreen></iframe>` : ''}
        <div style="line-height:1.7; color:#ddd;">${escapeHtml(data.content || 'لا يوجد محتوى إضافي.').replace(/\n/g, '<br>')}</div>
        ${data.url && !data.url.match(/\.(mp4|webm)/i) && !data.url.includes('youtube.com') ? `<a href="${data.url}" target="_blank" style="display:inline-block; margin-top:16px; background:#d4af37; color:#000; padding:8px 16px; border-radius:30px; text-decoration:none;">🔗 رابط إضافي</a>` : ''}
      </div>
    `;
    document.body.appendChild(modal);
  });
}

// تسجيل الدخول وباقي الدوال (كما هي في index.html الأصلي)
// ... (checkAuth, doLogout, loadPage, showPage, إلخ)
// لكننا نحتاج إلى تعديل showPage لاستدعاء loadHomePosts عند فتح home
function originalShowPage(id) {
  document.querySelectorAll('.vx-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  const page = document.getElementById(`page-${id}`);
  if (page) page.classList.add('active');
  const btn = document.getElementById(`sb-${id}`);
  if (btn) btn.classList.add('active');
  if (id !== 'home' && id !== 'contact') loadPage(id);
  if (id === 'home') loadHomePosts(); // تحميل منشورات home
}
window.showPage = originalShowPage;
window.filterPosts = filterPosts;
window.toggleDD = toggleDD;
window.closeDD = closeDD;
window.showFullPost = showFullPost;

// تشغيل تحميل منشورات home عند بدء الصفحة
checkAuth();
loadHomePosts();
</script>
</body>
</html>
