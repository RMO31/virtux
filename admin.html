<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Virtux Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* نفس الأنماط السابقة مع إضافة تحسينات بسيطة */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;min-height:100vh}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;padding:36px 32px;width:340px;text-align:center}
    .login-box h1{color:#d4e800;font-size:24px;margin-bottom:6px}
    .login-box p{color:#667;font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:14px;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#9fb000}
    .btn-login{width:100%;padding:10px;background:#9fb000;color:#000;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-login:hover{background:#d4e800}
    .err{color:#f55;font-size:12px;margin-top:8px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column}
    .topbar{background:#000718;border-bottom:1px solid #9fb000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{color:#d4e800;font-size:16px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .conn{font-size:12px;padding:3px 10px;border-radius:4px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}
    .conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
    .btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;height:calc(100vh - 46px)}
    .sidebar{width:190px;background:#050c2e;border-right:1px solid #1e2d6b;padding:12px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}
    .sb-btn.active{border-left:3px solid #d4e800}
    .sb-sec{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px}
    .main{flex:1;padding:20px;overflow-y:auto;background:#01042e}
    .ap{display:none}
    .ap.active{display:block}
    .page-title{font-size:18px;color:#d4e800;font-weight:700;margin-bottom:16px}
    .card{background:#050e30;border:1px solid #1e2d6b;border-radius:12px;padding:18px;margin-bottom:18px}
    .card h3{color:#9fb000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:13px;width:100%}
    .full{grid-column:1/-1}
    .btn-pub{background:#9fb000;color:#000;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-pub:hover{background:#d4e800}
    .btn-pub:disabled{background:#445;color:#778;cursor:not-allowed}
    .ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .img-upload input[type=file]{display:none}
    .img-upload label{background:#1a2d80;color:#9fb000;border:1px solid #1e2d6b;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer}
    .img-preview{width:40px;height:40px;border-radius:6px;object-fit:cover;display:none}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
    .stat-card{background:#050e30;border:1px solid #1e2d6b;border-radius:10px;padding:14px;text-align:center}
    .stat-number{font-size:28px;font-weight:700;color:#d4e800}
    .stat-label{font-size:11px;color:#667;margin-top:4px}
    .posts-list{display:flex;flex-direction:column;gap:8px}
    .pi{background:#0a1540;border:1px solid #1e2d6b;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .pi-icon{width:40px;height:40px;border-radius:6px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:#0f1e55;font-size:20px}
    .pi-info{flex:1}
    .pi-title{font-size:13px;font-weight:600;color:#ddd}
    .pi-meta{font-size:11px;color:#667;margin-top:2px}
    .pi-tag{display:inline-block;font-size:10px;background:#0f1e55;color:#9fb000;border-radius:3px;padding:1px 7px;margin-top:3px}
    .btn-edit{background:#1a2d80;border:1px solid #9fb000;color:#9fb000;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-del{background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-edit:hover{background:#9fb000;color:#000}
    .btn-del:hover{background:#f55;color:#fff}
    .empty{text-align:center;color:#445;padding:30px;font-size:13px}
    .loading{text-align:center;color:#667;padding:20px;font-size:13px}

    .modal-overlay.open{display:flex}
    .modal-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
    .modal-top{background:#000718;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2d6b}
    .modal-top h2{font-size:16px;color:#d4e800}
    .modal-close{background:transparent;border:1px solid #556;color:#aaa;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px}
    .modal-body{padding:18px}
  </style>

</head>

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m] || m);
}

async function checkConn() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?limit=1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const el = document.getElementById('connStatus');
    if (res.ok) { el.textContent = '✅ متصل'; el.className = 'conn'; }
    else { el.textContent = '❌ خطأ ' + res.status; el.className = 'conn fail'; }
  } catch(e) {
    document.getElementById('connStatus').textContent = '❌ لا إنترنت';
    document.getElementById('connStatus').className = 'conn fail';
  }
}

function login() {

    } else if (room === 'yt-videos') {

function getTagOptions(room) {
  if (room === 'live') return `<option value="Live Now">🔴 Live Now</option><option value="Pre Lives">⏰ Pre Lives</option><option value="VIP">👑 VIP</option>`;

  if (room === 'highlights') return `<option value="Pro">🏅 Pro</option><option value="Tournament">🏆 بطولة</option><option value="Video">📹 فيديو</option><option value="Photo">📷 صورة</option>`;
  if (room === 'gaming-news') return `<option value="News">📰 خبر</option><option value="VIP">👑 VIP</option>`;
  if (room === 'youtube-news') return `<option value="Youtube News">▶️ خبر يوتيوب</option>`;
  if (room === 'projects') return `<option value="Project">🌐 مشروع</option>`;
  return `<option value="default">عام</option>`;
}

// ==================== تحميل وعرض المنشورات ====================
async function loadPosts(room) {
  const container = document.getElementById(`list-${room}`);
  if (!container) return;
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?room=eq.${room}&order=id.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '<div class="empty">لا توجد منشورات.</div>';
      return;
    }
    container.innerHTML = data.map(p => {
      let mediaHtml = '';
      const isLocalVideo = p.url && (p.url.match(/\.(mp4|webm)$/i) || p.url.includes('/storage/v1/object/public/videos/'));
      const isYouTube = p.url && (p.url.includes('youtube.com/watch') || p.url.includes('youtu.be'));
      
      if (isLocalVideo) {
        mediaHtml = `<video src="${p.url}" controls style="width:80px; height:60px; object-fit:cover; border-radius:6px;"></video>`;
      } else if (isYouTube) {
        const videoId = p.url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([^&\?\/]+)/)?.[1];
        if (videoId) {
          mediaHtml = `<img src="https://img.youtube.com/vi/${videoId}/default.jpg" style="width:80px; height:60px; object-fit:cover; border-radius:6px;">`;
        } else {
          mediaHtml = `<div class="pi-icon">${p.icon || '📹'}</div>`;
        }
      } else {
        let iconHtml = p.icon;
        if (iconHtml && (iconHtml.startsWith('data:') || iconHtml.startsWith('http'))) {
          mediaHtml = `<img src="${iconHtml}" style="width:40px; height:40px; border-radius:6px; object-fit:cover;">`;
        } else {
          mediaHtml = `<div class="pi-icon">${iconHtml || '📄'}</div>`;
        }
      }
      
      return `<div class="pi" id="pi-${p.id}">
        <div style="width:80px; flex-shrink:0;">${mediaHtml}</div>
        <div class="pi-info">
          <div class="pi-title">${escapeHtml(p.title)}</div>
          <div class="pi-meta">${escapeHtml(p.description||'')} • ${p.tag||''}</div>
          <span class="pi-tag">${escapeHtml(p.tag||p.room)}</span>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="btn-edit" onclick="openEditModal(${p.id})">✏️ تعديل</button>
          <button class="btn-del" onclick="deletePost(${p.id}, '${p.room}')">🗑️ حذف</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
    container.innerHTML = '<div class="empty">خطأ في التحميل</div>';
  }
}

async function deletePost(id, room) {
  if (!confirm('هل تريد حذف هذا المنشور نهائياً؟')) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (res.ok) {
      document.getElementById(`pi-${id}`)?.remove();
      loadPosts(room);
      loadDashboard();
    } else alert('فشل الحذف');
  } catch(e) { alert('خطأ في الحذف'); }
}

// ==================== تعديل منشور ====================
async function openEditModal(id) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${id}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!data || data.length === 0) return;
    currentEditPost = data[0];
    const modalBody = document.getElementById('editModalBody');
    modalBody.innerHTML = `
      <div class="fg"><input class="full" id="edit-title" placeholder="العنوان" value="${escapeHtml(currentEditPost.title)}"></div>
      <div class="fg"><input id="edit-desc" placeholder="وصف قصير" value="${escapeHtml(currentEditPost.description||'')}"></div>
      <div class="fg"><input id="edit-icon" placeholder="رمز تعبيري أو رابط صورة" value="${escapeHtml(currentEditPost.icon||'')}"></div>
      <div class="fg"><input class="full" id="edit-url" placeholder="رابط" value="${escapeHtml(currentEditPost.url||'')}"></div>
      <div class="fg"><select id="edit-tag">${getTagOptionsForEdit(currentEditPost.room, currentEditPost.tag)}</select></div>
      <div class="fg"><textarea class="full" id="edit-content" placeholder="محتوى طويل" rows="5">${escapeHtml(currentEditPost.content||'')}</textarea></div>
      <button class="btn-pub" onclick="saveEditPost()">💾 حفظ التعديلات</button>
    `;
    document.getElementById('editModal').classList.add('open');
  } catch(e) { alert('خطأ في تحميل البيانات'); }
}

function getTagOptionsForEdit(room, currentTag) {
  const options = getTagOptions(room);
  return options.replace(`value="${currentTag}"`, `value="${currentTag}" selected`);
}

async function saveEditPost() {
  if (!currentEditPost) return;
  const updated = {
    title: document.getElementById('edit-title').value,
    description: document.getElementById('edit-desc').value,
    icon: document.getElementById('edit-icon').value,
    url: document.getElementById('edit-url').value,
    tag: document.getElementById('edit-tag').value,
    content: document.getElementById('edit-content').value
  };
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${currentEditPost.id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(updated)
    });
    if (res.ok) {
      closeEditModal();
      loadPosts(currentEditPost.room);
      loadDashboard();
    } else alert('فشل التعديل');
  } catch(e) { alert('خطأ في التعديل'); }
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  currentEditPost = null;
}

// ==================== إضافة منشور مع منع النشر الفارغ (في جميع الأقسام) ====================
async function addPost(room) {
  const title = document.getElementById(`${room}-title`)?.value.trim() || '';
  const url = document.getElementById(`${room}-url`)?.value.trim() || '';
  const description = document.getElementById(`${room}-desc`)?.value.trim() || '';
  const content = document.getElementById(`${room}-content`)?.value.trim() || '';
  const iconEl = document.getElementById(`${room}-icon`);
  const icon = iconEl ? (iconEl._imgData || iconEl.value || '') : '';
  const hasImage = icon && (icon.startsWith('data:') || icon.startsWith('http'));
  const hasVideo = url && (url.match(/\.(mp4|webm)$/i) || url.includes('/storage/v1/object/public/videos/') || url.includes('youtube.com') || url.includes('youtu.be'));
  
  let isValid = false;
  let errorMsg = '';
  
  if (room === 'highlights') {
    // في Highlights: يجب وجود فيديو أو صورة (حسب نوع الوسم)
    const tag = document.getElementById(`${room}-tag`)?.value;
    if (tag === 'Photo') {
      if (hasImage || (url && url.match(/\.(jpg|jpeg|png|gif|webp)$/i))) {
        isValid = true;
      } else {
        errorMsg = '❌ في قسم الصور، يجب رفع صورة أو إضافة رابط صورة.';
      }
    } else {
      // Video, Pro, Tournament: يجب وجود فيديو
      if (hasVideo) {
        isValid = true;
      } else {
        errorMsg = '❌ في قسم الفيديو، يجب رفع فيديو أو إضافة رابط يوتيوب صالح.';
      }
    }
  } 
  else if (room === 'subscribers' || room === 'yt-channels' || room === 'yt-videos' || room === 'yt-lives') {
    // الأقسام التي تعتمد على الرابط
    if (url) isValid = true;
    else errorMsg = '❌ يجب إدخال رابط صالح (يوتيوب أو قناة).';
  }
  else {
    // الأقسام العادية: يتطلب عنوان أو رابط أو صورة أو محتوى
    if (title || url || hasImage || content) {
      isValid = true;
    } else {
      errorMsg = '❌ المنشور فارغ. الرجاء إدخال عنوان أو رابط أو صورة أو محتوى.';
    }
  }
  
  if (!isValid) {
    const erDiv = document.getElementById(`er-${room}`);
    if (erDiv) {
      erDiv.textContent = errorMsg;
      erDiv.style.display = 'block';
      setTimeout(() => erDiv.style.display = 'none', 5000);
    } else alert(errorMsg);
    return;
  }
  
  // إذا كان هناك عنوان فارغ ولكن يوجد محتوى، نعطي عنواناً افتراضياً
  let finalTitle = title;
  if (!finalTitle && (url || hasImage || content)) {
    finalTitle = room === 'highlights' ? '🎬 مقطع فيديو' : '📄 منشور';
    const titleInput = document.getElementById(`${room}-title`);
    if (titleInput) titleInput.value = finalTitle;
  }
  
  const tag = document.getElementById(`${room}-tag`)?.value || room;
  const body = { title: finalTitle, description, icon: icon || '📄', url, tag, room, content };
  const btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) { btn.disabled = true; btn.textContent = 'جاري النشر...'; }
  
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      // تفريغ الحقول
      if (document.getElementById(`${room}-title`)) document.getElementById(`${room}-title`).value = '';
      if (document.getElementById(`${room}-desc`)) document.getElementById(`${room}-desc`).value = '';
      if (document.getElementById(`${room}-icon`)) document.getElementById(`${room}-icon`).value = '';
      if (document.getElementById(`${room}-url`)) document.getElementById(`${room}-url`).value = '';
      if (document.getElementById(`${room}-content`)) document.getElementById(`${room}-content`).value = '';
      const preview = document.getElementById(`${room}-imgpreview`);
      if (preview) { preview.style.display = 'none'; preview.src = ''; }
      const fileInput = document.getElementById(`${room}-imgfile`);
      if (fileInput) fileInput.value = '';
      const videoInput = document.getElementById(`${room}-videofile`);
      if (videoInput) videoInput.value = '';
      const okDiv = document.getElementById(`ok-${room}`);
      if (okDiv) { okDiv.style.display = 'block'; setTimeout(() => okDiv.style.display = 'none', 3000); }
      loadPosts(room);
      loadDashboard();
    } else {
      const err = await res.json();
      const erDiv = document.getElementById(`er-${room}`);
      if (erDiv) { erDiv.textContent = '❌ ' + (err.message || err.hint || 'خطأ'); erDiv.style.display = 'block'; setTimeout(() => erDiv.style.display = 'none', 5000); }
    }
  } catch(e) {
    const erDiv = document.getElementById(`er-${room}`);
    if (erDiv) { erDiv.textContent = '❌ خطأ في الاتصال: ' + e.message; erDiv.style.display = 'block'; setTimeout(() => erDiv.style.display = 'none', 5000); }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '➕ نشر'; }
  }
}

// ==================== رفع الفيديو إلى Supabase bucket مع تحسينات ====================
async function uploadVideoToBucket(room) {
  const fileInput = document.getElementById(`${room}-videofile`);
  const file = fileInput?.files[0];
  if (!file) return;
  
  // التحقق من وجود bucket قبل الرفع
  try {
    const checkBucket = await fetch(`${SUPABASE_URL}/storage/v1/bucket/videos`, {
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if (!checkBucket.ok) {
      alert('⚠️ Bucket "videos" غير موجود. يرجى إنشاؤه في Supabase (Storage → New bucket → name: videos, Public: ON) ثم المحاولة مرة أخرى.');
      return;
    }
  } catch(e) {
    alert('⚠️ لا يمكن الوصول إلى bucket "videos". تأكد من وجوده في Supabase وأنه عام (public).');
    return;
  }
  
  const fullName = file.name;
  const dotIndex = fullName.lastIndexOf('.');
  let baseName = fullName;
  if (dotIndex > 0) baseName = fullName.substring(0, dotIndex);
  const titleField = document.getElementById(`${room}-title`);
  if (titleField && titleField.value.trim() === '') titleField.value = baseName;
  
  const fileName = Date.now() + '_' + file.name;
  const filePath = `highlights/${fileName}`;
  const uploadUrl = `${SUPABASE_URL}/storage/v1/object/videos/${filePath}`;
  const btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  
  try {
    const res = await fetch(uploadUrl, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: file
    });
    if (res.ok) {
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/videos/${filePath}`;
      const urlField = document.getElementById(`${room}-url`);
      if (urlField) {
        urlField.value = publicUrl;
        alert('✅ تم رفع الفيديو بنجاح! تم تعبئة رابط الفيديو تلقائياً.');
      }
    } else {
      const errText = await res.text();
      if (errText.includes('bucket not found') || res.status === 400) {
        alert('⚠️ فشل الرفع: تأكد من وجود bucket باسم "videos" في مشروع Supabase وأنه عام (public).\n\nيمكنك إنشاؤه من Supabase Dashboard → Storage → New bucket (name: videos, Public bucket: ON)');
      } else {
        alert('فشل الرفع: ' + errText);
      }
    }
  } catch(e) {
    alert('خطأ في رفع الفيديو: ' + e.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}
