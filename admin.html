<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux Admin Fixed</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:radial-gradient(circle at center,#061235,#000a18 58%,#00040f);color:#fff;min-height:100vh;overflow:hidden}
    button,input,textarea{font-family:inherit}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-box{background:rgba(3,8,28,.9);border:1px solid #9fb000;border-radius:16px;padding:34px 30px;width:360px;text-align:center;box-shadow:0 0 50px rgba(159,176,0,.18);backdrop-filter:blur(8px)}
    .login-box h1{color:#d4e800;font-size:25px;margin-bottom:9px}.login-box p{color:#9aa;font-size:13px;margin-bottom:22px}
    .login-box input{width:100%;padding:12px 14px;border-radius:9px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;text-align:center;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#9fb000}.btn-login{width:100%;padding:12px;background:#9fb000;color:#000;border:none;border-radius:9px;font-weight:700;cursor:pointer}.btn-login:hover{background:#d4e800}
    .err{color:#f55;font-size:12px;margin-top:10px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column}.topbar{height:56px;background:rgba(0,7,24,.94);border-bottom:1px solid #9fb000;padding:0 20px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(5px)}
    .topbar h1{color:#d4e800;font-size:17px}.topbar-right{display:flex;align-items:center;gap:10px}.conn{font-size:12px;padding:4px 10px;border-radius:5px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}.conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}.btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;min-height:0}.sidebar{width:210px;background:rgba(5,12,46,.9);border-left:1px solid #1e2d6b;padding:13px 9px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}.sb-sec{font-size:10px;color:#667;text-transform:uppercase;letter-spacing:1px;padding:12px 12px 4px}.sb-btn{background:transparent;border:none;color:#aab;padding:10px 12px;border-radius:8px;font-size:13px;cursor:pointer;text-align:right}.sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}.sb-btn.active{border-right:3px solid #d4e800}
    .main{flex:1;padding:22px;overflow:auto;background:rgba(1,4,46,.78);backdrop-filter:blur(2px)}.page-title{font-size:21px;color:#d4e800;font-weight:700;margin-bottom:16px}.card{background:#050e30;border:1px solid #1e2d6b;border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:0 12px 35px rgba(0,0,0,.22)}.card h3{color:#9fb000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px}.stat-card{background:#071542;border:1px solid #1e2d6b;border-radius:12px;padding:16px;text-align:center}.stat-number{font-size:30px;font-weight:700;color:#d4e800}.stat-label{font-size:11px;color:#889;margin-top:4px}.grid{display:grid;grid-template-columns:2fr 1fr;gap:18px}.posts-list{display:flex;flex-direction:column;gap:9px}.pi,.news-item,.recent-member-item{background:#0a1540;border:1px solid #1e2d6b;border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px}.recent-member-item{background:transparent;border-width:0 0 1px 0;border-radius:0}.pi-info{flex:1;min-width:0}.pi-title{font-size:14px;font-weight:700;color:#eee;display:flex;align-items:center;gap:7px;flex-wrap:wrap}.pi-meta{font-size:11px;color:#778;margin-top:3px}.avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:#1a2d80;border:1px solid #3146a0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#d4e800;flex-shrink:0}.avatar.sm{width:36px;height:36px}.role-badge{display:inline-flex;font-size:10px;border-radius:5px;padding:2px 8px;font-weight:700;text-transform:uppercase;border:1px solid transparent}.vip{background:#2a2000;color:#d4e800;border-color:rgba(212,232,0,.35)}.member{background:#0f3d2e;color:#4caf90;border-color:rgba(76,175,144,.35)}.moderator{background:#3d2e0f;color:#ff9800;border-color:rgba(255,152,0,.35)}.user{background:#0f1e55;color:#aab;border-color:#1e2d6b}.actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.btn-edit,.btn-del,.btn-pub{border-radius:6px;padding:7px 11px;font-size:11px;cursor:pointer}.btn-edit{background:#132771;border:1px solid #9fb000;color:#d4e800}.btn-edit.active{background:#9fb000;color:#000}.btn-del{background:transparent;border:1px solid #f55;color:#f55}.btn-pub{background:#9fb000;border:0;color:#000;font-weight:700}.btn-edit:hover{background:#9fb000;color:#000}.btn-del:hover{background:#f55;color:#fff}.btn-pub:hover{background:#d4e800}.search{width:100%;padding:11px 13px;margin-bottom:12px;border-radius:9px;border:1px solid #1e2d6b;background:#0a1540;color:#fff}.fg{display:grid;gap:9px}.fg input{padding:10px 12px;border-radius:8px;border:1px solid #1e2d6b;background:#0a1540;color:#fff}.empty,.loading{text-align:center;color:#667;padding:24px;font-size:13px}.msg{display:none;margin-bottom:12px;padding:10px 12px;border-radius:8px;font-size:13px}.ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90}.er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55}.news-text{flex:1;font-size:13px}.news-link{font-size:11px;color:#9fb000;text-decoration:none}.placeholder{height:260px;display:flex;align-items:center;justify-content:center;color:#667;text-align:center}.hidden{display:none!important}@media(max-width:900px){.grid{grid-template-columns:1fr}.sidebar{width:170px}.pi{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}.topbar{padding:0 12px}.main{padding:14px}}
  </style>
</head>
<body>
<div id="loginPage">
  <div class="login-box">
    <h1>🎮 Virtux Admin</h1>
    <p>أدخل كلمة المرور للوصول إلى لوحة التحكم</p>
    <input type="password" id="pw" placeholder="كلمة المرور" autocomplete="new-password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="err" id="loginErr">كلمة المرور خاطئة!</div>
  </div>
</div>
<div id="adminPage">
  <div class="topbar">
    <h1>🎮 Virtux Admin Panel</h1>
    <div class="topbar-right">
      <span class="conn" id="connStatus">جارٍ الاتصال...</span>
      <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk'.replace('eyJpc3MiOiJIUzI1NiIs','eyJpc3MiOiJzdXBhYmFzZSIs');
const ADMIN_PASSWORD='virtux2025';
const ROLES=['vip','member','moderator'];
let users=[];
let news=[];
let activePage='dashboard';
function escapeHtml(str){if(!str)return'';return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
async function api(endpoint,options={}){let res=await fetch(`${SUPABASE_URL}/rest/v1${endpoint}`,{...options,headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'return=representation',...(options.headers||{})}});if(!res.ok){throw new Error(await res.text()||`HTTP ${res.status}`)}if(res.status===204)return null;let text=await res.text();return text?JSON.parse(text):null;}
function login(){if(document.getElementById('pw').value===ADMIN_PASSWORD){document.getElementById('loginPage').style.display='none';document.getElementById('adminPage').style.display='flex';buildSidebar();checkConn();showPage('dashboard')}else document.getElementById('loginErr').style.display='block';}
function logout(){location.reload()}
function buildSidebar(){let groups=[['','dashboard','📊 Dashboard'],['الأقسام','home','🏠 Home'],['الأقسام','live','🔴 Live'],['الأقسام','tournaments','🏆 Tournaments'],['الأقسام','highlights','🎬 Highlights'],['الأقسام','subscribers','👥 Subscribers'],['أخبار','gaming-news','📰 Gaming News'],['أخبار','youtube-news','▶️ Youtube News'],['يوتيوب','yt-channels','📺 Channels'],['يوتيوب','yt-videos','🎬 Videos'],['تعاون','projects','🌐 Collaboration']];let last='';document.getElementById('sidebar').innerHTML=groups.map(g=>{let sec=g[0]&&g[0]!==last?`<div class="sb-sec">${g[0]}</div>`:'';last=g[0];return `${sec}<button id="sb-${g[1]}" class="sb-btn" onclick="showPage('${g[1]}')">${g[2]}</button>`}).join('');}
async function checkConn(){let el=document.getElementById('connStatus');try{await api('/posts?limit=1');el.textContent='✅ متصل';el.className='conn'}catch(e){el.textContent='❌ خطأ';el.className='conn fail'}}
function showPage(page){activePage=page;document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));let btn=document.getElementById(`sb-${page}`);if(btn)btn.classList.add('active');if(page==='dashboard')loadDashboard();else document.getElementById('main').innerHTML=`<div class="page-title">${btn?btn.textContent:page}</div><div class="card placeholder"><div>هذا القسم محفوظ في اللوحة.<br>إدارة الرولات، صور البروفايل، الحذف، والأخبار موجودة في Dashboard.</div></div>`;}
function getUserRoles(u){let list=[];if(Array.isArray(u.roles))list=list.concat(u.roles);if(typeof u.role==='string')list=list.concat(u.role.split(','));return [...new Set(list.map(r=>String(r).trim().toLowerCase()).filter(r=>r&&r!=='user'))];}
function hasRole(u,r){return getUserRoles(u).includes(r)}
function displayRoles(u){let r=getUserRoles(u);return r.length?r:['user']}
function avatarUrl(u){return u.avatar_url||u.profile_logo||u.logo_url||u.image_url||u.photo_url||u.picture||u.icon||''}
function initials(u){let n=(u.username||u.email||'U').trim();return escapeHtml(n.slice(0,2).toUpperCase())}
function avatar(u,small=false){let url=avatarUrl(u);let cls=`avatar${small?' sm':''}`;if(url&&(url.startsWith('http')||url.startsWith('data:')))return `<img class="${cls}" src="${escapeHtml(url)}" alt="avatar">`;return `<div class="${cls}">${initials(u)}</div>`}
function roleBadges(u){return displayRoles(u).map(r=>`<span class="role-badge ${r}">${escapeHtml(r.toUpperCase())}</span>`).join('')}
async function loadData(){users=await api('/profiles?select=*&order=created_at.desc');news=await api('/posts?select=*&room=eq.ticker&order=id.desc');users=users||[];news=news||[];}
async function loadDashboard(){let main=document.getElementById('main');main.innerHTML='<div class="loading">جاري التحميل...</div>';try{await loadData();renderDashboard()}catch(e){main.innerHTML=`<div class="card"><div class="er msg" style="display:block">خطأ في تحميل البيانات: ${escapeHtml(e.message)}</div></div>`}}
function renderDashboard(){let total=users.length,vip=users.filter(u=>hasRole(u,'vip')).length,member=users.filter(u=>hasRole(u,'member')).length,mod=users.filter(u=>hasRole(u,'moderator')).length,normal=users.filter(u=>!hasRole(u,'vip')&&!hasRole(u,'member')&&!hasRole(u,'moderator')).length;document.getElementById('main').innerHTML=`<div class="page-title">📊 Dashboard</div><div id="msgOk" class="msg ok"></div><div id="msgEr" class="msg er"></div><div class="stats-grid"><div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">إجمالي المستخدمين</div></div><div class="stat-card"><div class="stat-number">${vip}</div><div class="stat-label">VIP</div></div><div class="stat-card"><div class="stat-number">${member}</div><div class="stat-label">Member</div></div><div class="stat-card"><div class="stat-number">${mod}</div><div class="stat-label">Moderator</div></div><div class="stat-card"><div class="stat-number">${normal}</div><div class="stat-label">عادي</div></div></div><div class="grid"><div><div class="card"><h3>👥 إدارة المستخدمين والرولات</h3><input class="search" id="userSearch" placeholder="🔍 ابحث باسم المستخدم أو البريد الإلكتروني..." oninput="renderUsers(this.value)"><div id="usersList" class="posts-list"></div></div></div><div><div class="card"><h3>🆕 آخر الأعضاء المسجلين</h3><div class="posts-list">${users.slice(0,5).map(renderRecentUser).join('')||'<div class="empty">لا يوجد مستخدمون بعد.</div>'}</div></div><div class="card"><h3>📰 إدارة الأخبار</h3><div class="fg"><input id="newsTitle" placeholder="نص الخبر"><input id="newsUrl" placeholder="رابط اختياري"><button class="btn-pub" onclick="addNews()">➕ إضافة خبر</button></div><div id="newsList" class="posts-list" style="margin-top:14px"></div></div></div></div>`;renderUsers('');renderNews()}
function renderRecentUser(u){return `<div class="recent-member-item">${avatar(u,true)}<div class="pi-info"><div class="pi-title">${escapeHtml(u.username||u.email)}</div><div class="pi-meta">${escapeHtml(u.email)} • ${new Date(u.created_at).toLocaleDateString('ar-EG')}</div><div style="margin-top:5px">${roleBadges(u)}</div></div></div>`}
function renderUsers(q=''){let query=String(q).toLowerCase();let filtered=users.filter(u=>!query||(u.username&&u.username.toLowerCase().includes(query))||(u.email&&u.email.toLowerCase().includes(query)));document.getElementById('usersList').innerHTML=filtered.map(u=>`<div class="pi" id="user-${escapeHtml(u.id)}">${avatar(u)}<div class="pi-info"><div class="pi-title">${escapeHtml(u.username||u.email)} ${roleBadges(u)}</div><div class="pi-meta">${escapeHtml(u.email)} • ${u.created_at?new Date(u.created_at).toLocaleDateString('ar-EG'):''}</div></div><div class="actions">${ROLES.map(r=>`<button class="btn-edit ${hasRole(u,r)?'active':''}" onclick="toggleRole('${escapeHtml(u.id)}','${r}')">${hasRole(u,r)?'✓':'+'} ${r}</button>`).join('')}<button class="btn-edit" onclick="clearRoles('${escapeHtml(u.id)}')">User</button><button class="btn-del" onclick="deleteUser('${escapeHtml(u.id)}')">🗑️ حذف</button></div></div>`).join('')||'<div class="empty">لا يوجد مستخدم مطابق</div>'}
function showMsg(type,msg){let ok=document.getElementById('msgOk'),er=document.getElementById('msgEr');if(!ok||!er){alert(msg);return}ok.style.display=er.style.display='none';let el=type==='ok'?ok:er;el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',4000)}
async function getUser(id){return await api(`/profiles?select=*&id=eq.${encodeURIComponent(id)}`)}
async function saveRoles(id,roles){let clean=[...new Set((roles||[]).map(r=>String(r).trim().toLowerCase()).filter(r=>r&&r!=='user'))];let primary=clean[0]||'user';try{await api(`/profiles?id=eq.${encodeURIComponent(id)}`,{method:'PATCH',body:JSON.stringify({roles:clean,role:primary})})}catch(e){if(!String(e.message).toLowerCase().includes('roles'))throw e;await api(`/profiles?id=eq.${encodeURIComponent(id)}`,{method:'PATCH',body:JSON.stringify({role:clean.length?clean.join(','):'user'})})}showMsg('ok','تم تحديث الرولات بنجاح');await loadDashboard()}
async function toggleRole(id,role){try{let rows=await getUser(id);let u=rows&&rows[0];if(!u)throw new Error('المستخدم غير موجود');let roles=getUserRoles(u);roles=roles.includes(role)?roles.filter(r=>r!==role):roles.concat(role);await saveRoles(id,roles)}catch(e){showMsg('er','فشل تحديث الرولات: '+e.message)}}
async function clearRoles(id){try{await saveRoles(id,[])}catch(e){showMsg('er','فشل تحويل المستخدم إلى User: '+e.message)}}
async function deleteUser(id){if(!confirm('حذف المستخدم نهائياً؟'))return;let row=document.getElementById('user-'+id);if(row)row.style.opacity='.45';try{let deleted=await api(`/profiles?id=eq.${encodeURIComponent(id)}`,{method:'DELETE'});if(Array.isArray(deleted)&&deleted.length===0)throw new Error('لم يتم حذف أي حساب. تأكد من صلاحيات الحذف في Supabase.');if(row)row.remove();showMsg('ok','تم حذف المستخدم بنجاح');await loadDashboard()}catch(e){if(row)row.style.opacity='1';showMsg('er','فشل حذف المستخدم: '+e.message)}}
function renderNews(){let box=document.getElementById('newsList');if(!box)return;box.innerHTML=news.map(n=>`<div class="news-item"><div class="news-text">${escapeHtml(n.title)}</div>${n.url?`<a class="news-link" target="_blank" href="${escapeHtml(n.url)}">رابط</a>`:''}<button class="btn-del" onclick="deleteNews(${Number(n.id)})">حذف</button></div>`).join('')||'<div class="empty">لا توجد أخبار.</div>'}
async function addNews(){let title=document.getElementById('newsTitle').value.trim(),url=document.getElementById('newsUrl').value.trim();if(!title)return showMsg('er','يرجى إدخال نص الخبر');try{await api('/posts',{method:'POST',body:JSON.stringify({title,url:url||null,room:'ticker',tag:'news',icon:'📢',content:null})});showMsg('ok','تم إضافة الخبر');await loadDashboard()}catch(e){showMsg('er','فشل إضافة الخبر: '+e.message)}}
async function deleteNews(id){if(!confirm('حذف الخبر؟'))return;try{await api(`/posts?id=eq.${id}`,{method:'DELETE'});showMsg('ok','تم حذف الخبر');await loadDashboard()}catch(e){showMsg('er','فشل حذف الخبر: '+e.message)}}
</script>
</body>
</html>
