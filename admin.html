<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Virtux Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #01042e; color: white; padding: 20px; }
        .login-box { background: #050e30; padding: 20px; border-radius: 10px; max-width: 300px; margin: auto; text-align: center; }
        input, button { padding: 8px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #9fb000; cursor: pointer; }
        .post { background: #0a1540; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        .admin-panel { display: none; }
        .error { color: #f55; }
        .success { color: #4caf90; }
    </style>
</head>
<body>
<div id="loginDiv" class="login-box">
    <h2>Virtux Admin</h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="loginError" class="error"></div>
</div>

<div id="adminDiv" class="admin-panel">
    <button onclick="logout()">Logout</button>
    <h2>Manage Live Posts</h2>
    <div>
        <input type="text" id="title" placeholder="Title" style="width: 80%;">
        <button onclick="addPost()">Add Post</button>
    </div>
    <div id="postsList"></div>
</div>

<script>
    const supabaseUrl = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const ADMIN_PASSWORD = 'virtux2025';

    async function login() {
        const pw = document.getElementById('password').value;
        if (pw !== ADMIN_PASSWORD) {
            document.getElementById('loginError').innerText = 'Wrong password';
            return;
        }
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('adminDiv').style.display = 'block';
        await loadPosts();
    }

    function logout() {
        document.getElementById('loginDiv').style.display = 'block';
        document.getElementById('adminDiv').style.display = 'none';
        document.getElementById('password').value = '';
        document.getElementById('loginError').innerText = '';
    }

    async function loadPosts() {
        const container = document.getElementById('postsList');
        container.innerHTML = 'Loading...';
        try {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .eq('room', 'live')
                .order('id', { ascending: false });
            if (error) throw error;
            if (!data || data.length === 0) {
                container.innerHTML = '<p>No posts yet.</p>';
                return;
            }
            container.innerHTML = data.map(post => `
                <div class="post">
                    <div>
                        <strong>${escapeHtml(post.title)}</strong><br>
                        ${escapeHtml(post.description || '')}
                        ${post.url ? `<br><a href="${post.url}" target="_blank" style="color:#9fb000">Link</a>` : ''}
                    </div>
                    <button onclick="deletePost(${post.id})">Delete</button>
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
            container.innerHTML = '<p>Error loading posts.</p>';
        }
    }

    async function addPost() {
        const title = document.getElementById('title').value.trim();
        if (!title) {
            alert('Please enter a title');
            return;
        }
        const body = {
            title: title,
            description: '',
            icon: '📄',
            url: '',
            tag: 'Live Now',
            room: 'live',
            content: null
        };
        try {
            const { error } = await supabase.from('posts').insert(body);
            if (error) throw error;
            document.getElementById('title').value = '';
            await loadPosts();
        } catch (err) {
            alert('Error: ' + err.message);
        }
    }

    async function deletePost(id) {
        if (!confirm('Delete this post?')) return;
        try {
            const { error } = await supabase.from('posts').delete().eq('id', id);
            if (error) throw error;
            await loadPosts();
        } catch (err) {
            alert('Delete failed: ' + err.message);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
