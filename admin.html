<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#000a18;color:#fff;min-height:100vh;overflow:hidden}
    #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
    #loginPage,#adminPage{position:relative;z-index:1}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:transparent}
    .login-box{background:rgba(3,8,28,0.88);border:1px solid #9fb000;border-radius:14px;padding:36px 32px;width:340px;text-align:center;backdrop-filter:blur(6px);box-shadow:0 0 40px rgba(159,176,0,0.15)}
    .login-box h1{color:#d4e800;font-size:24px;margin-bottom:6px}
    .login-box p{color:#667;font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:14px;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#9fb000}
    .btn-login{width:100%;padding:10px;background:#9fb000;color:#000;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-login:hover{background:#d4e800}
    .err{color:#f55;font-size:12px;margin-top:8px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column;background:transparent}
    .topbar{background:rgba(0,7,24,0.92);border-bottom:1px solid #9fb000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(4px)}
    .topbar h1{color:#d4e800;font-size:16px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .conn{font-size:12px;padding:3px 10px;border-radius:4px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}
    .conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
    .btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;height:calc(100vh - 46px)}
    .sidebar{width:190px;background:rgba(5,12,46,0.88);border-right:1px solid #1e2d6b;padding:12px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;backdrop-filter:blur(3px)}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}
    .sb-btn.active{border-left:3px solid #d4e800}
    .sb-sec{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px}
    .main{flex:1;padding:20px;overflow-y:auto;background:rgba(1,4,46,0.82);backdrop-filter:blur(2px)}
    .ap{display:none}
    .ap.active{display:block}
    .page-title{font-size:18px;color:#d4e800;font-weight:700;margin-bottom:16px}
    .card{background:#050e30;border:1px solid #1e2d6b;border-radius:12px;padding:18px;margin-bottom:18px}
    .card h3{color:#9fb000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:13px;width:100%}
    .full{grid-column:1/-1}
    .btn-pub{background:#9fb000;color:#000;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-pub:hover{background:#d4e800}
    .btn-pub:disabled{background:#445;color:#778;cursor:not-allowed}
    .ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .img-upload input[type=file]{display:none}
    .img-upload label{background:#1a2d80;color:#9fb000;border:1px solid #1e2d6b;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer}
    .img-preview{width:40px;height:40px;border-radius:6px;object-fit:cover;display:none}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
    .stat-card{background:#050e30;border:1px solid #1e2d6b;border-radius:10px;padding:14px;text-align:center}
    .stat-number{font-size:28px;font-weight:700;color:#d4e800}
    .stat-label{font-size:11px;color:#667;margin-top:4px}
    .posts-list{display:flex;flex-direction:column;gap:8px}
    .pi{background:#0a1540;border:1px solid #1e2d6b;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .pi-icon{width:40px;height:40px;border-radius:6px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:#0f1e55;font-size:20px}
    .pi-info{flex:1}
    .pi-title{font-size:13px;font-weight:600;color:#ddd}
    .pi-meta{font-size:11px;color:#667;margin-top:2px}
    .pi-tag{display:inline-block;font-size:10px;background:#0f1e55;color:#9fb000;border-radius:3px;padding:1px 7px;margin-top:3px}
    .btn-edit{background:#1a2d80;border:1px solid #9fb000;color:#9fb000;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-del{background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-edit:hover{background:#9fb000;color:#000}
    .btn-del:hover{background:#f55;color:#fff}
    .btn-del:disabled,.btn-edit:disabled{opacity:0.4;cursor:not-allowed}
    .empty{text-align:center;color:#445;padding:30px;font-size:13px}
    .loading{text-align:center;color:#667;padding:20px;font-size:13px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,4,0.85);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
    .modal-top{background:#000718;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2d6b}
    .modal-top h2{font-size:16px;color:#d4e800}
    .modal-close{background:transparent;border:1px solid #556;color:#aaa;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px}
    .modal-body{padding:18px}
    .channel-card-admin{background:#0a1540;border:1px solid #1e2d6b;border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .channel-avatar-admin{width:50px;height:50px;border-radius:50%;object-fit:cover}
    .channel-info-admin{flex:1}
    .channel-name-admin{font-size:13px;font-weight:600;color:#d4e800}
    .channel-sub-admin{font-size:11px;color:#aaa}
    .channel-link-admin{color:#9fb000;font-size:11px;text-decoration:none}
    .preview-panel{background:#0a1540;border:1px solid #1e2d6b;border-radius:12px;padding:16px;margin-top:16px;display:flex;flex-direction:column;align-items:center}
    .preview-media{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-bottom:12px}
    .preview-buttons{display:flex;gap:8px;justify-content:center}
    .form-with-preview{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
    @media (max-width:768px){.form-with-preview{grid-template-columns:1fr}}
    .role-search-input{width:100%;padding:10px;margin-bottom:10px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff}
    .role-search-results{max-height:200px;overflow-y:auto;margin-bottom:10px}
    .role-search-result-item{background:#0a1540;border:1px solid #1e2d6b;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
    .role-buttons{display:flex;flex-wrap:wrap;gap:4px}
    .role-buttons button{padding:3px 7px;font-size:10px;border-radius:4px;cursor:pointer}
    .recent-member-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #1e2d6b}
    .recent-avatar{width:36px;height:36px;border-radius:50%;background:#1a2d80;display:flex;align-items:center;justify-content:center;font-size:16px}
    .news-item{display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid #1e2d6b}
    .news-text{flex:1;font-size:13px}
    .news-link{font-size:11px;color:#9fb000;text-decoration:none}
    .toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:8px;font-size:13px;color:#fff;opacity:0;transition:opacity 0.3s;pointer-events:none}
    .toast.show{opacity:1}
    .toast.ok{background:#0f3d2e;border:1px solid #0f6e56}
    .toast.err{background:#3d0f0f;border:1px solid #6e0f0f}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- Toast إشعار -->
<div class="toast" id="toast"></div>

<div id="loginPage">
  <div class="login-box">
    <h1>🎮 Virtux Admin</h1>
    <p>أدخل كلمة المرور</p>
    <input type="password" id="pw" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="err" id="loginErr">كلمة المرور خاطئة!</div>
  </div>
</div>

<div id="adminPage">
  <div class="topbar">
    <h1>🎮 Virtux Admin Panel</h1>
    <div class="topbar-right">
      <span class="conn" id="connStatus">جارٍ الاتصال...</span>
      <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <button class="sb-btn active" id="sb-dashboard" onclick="showPage('dashboard')">📊 Dashboard</button>
      <div class="sb-sec">الأقسام</div>
      <button class="sb-btn" id="sb-home" onclick="showPage('home')">🏠 Home</button>
      <button class="sb-btn" id="sb-live" onclick="showPage('live')">🔴 Live</button>
      <button class="sb-btn" id="sb-tournaments" onclick="showPage('tournaments')">🏆 Tournaments</button>
      <button class="sb-btn" id="sb-highlights" onclick="showPage('highlights')">🎬 Highlights</button>
      <button class="sb-btn" id="sb-subscribers" onclick="showPage('subscribers')">👥 Subscribers</button>
      <div class="sb-sec">أخبار</div>
      <button class="sb-btn" id="sb-gaming-news" onclick="showPage('gaming-news')">📰 Gaming News</button>
      <button class="sb-btn" id="sb-youtube-news" onclick="showPage('youtube-news')">▶️ Youtube News</button>
      <div class="sb-sec">يوتيوب</div>
      <button class="sb-btn" id="sb-yt-channels" onclick="showPage('yt-channels')">📺 Channels</button>
      <button class="sb-btn" id="sb-yt-videos" onclick="showPage('yt-videos')">🎬 Videos</button>
      <div class="sb-sec">تعاون</div>
      <button class="sb-btn" id="sb-projects" onclick="showPage('projects')">🌐 Collaboration</button>
    </div>
    <div class="main" id="mainContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-top"><h2>✏️ تعديل المنشور</h2><button class="modal-close" onclick="closeEditModal()">✕</button></div>
    <div class="modal-body" id="editModalBody"></div>
  </div>
</div>

<script>
// ==================== إعدادات Supabase ====================
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk';
const YOUTUBE_API_KEY = 'AIzaSyDzjcK_PXjTcrfMO6iE2S-PKg35ZLL0WJY';
const ADMIN_PASSWORD = 'virtux2025';

let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentEditPost = null;

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m] || m);
}

// ==================== Toast إشعار ====================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ==================== تسجيل الدخول ====================
async function checkConn() {
  try {
    let res = await fetch(`${SUPABASE_URL}/rest/v1/posts?limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    let el = document.getElementById('connStatus');
    if (res.ok) { el.textContent = '✅ متصل'; el.className = 'conn'; }
    else { el.textContent = '❌ خطأ'; el.className = 'conn fail'; }
  } catch(e) {
    document.getElementById('connStatus').textContent = '❌ لا إنترنت';
    document.getElementById('connStatus').className = 'conn fail';
  }
}

function login() {
  if (document.getElementById('pw').value === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    checkConn();
    buildPages();
    showPage('dashboard');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout() { window.location.reload(); }

// ==================== بناء الصفحات ====================
function buildPages() {
  let main = document.getElementById('mainContainer');
  main.innerHTML = '';
  let rooms = ['dashboard', 'home', 'live', 'tournaments', 'highlights', 'subscribers', 'gaming-news', 'youtube-news', 'yt-channels', 'yt-videos', 'projects', 'contact'];
  rooms.forEach(room => {
    let div = document.createElement('div');
    div.className = 'ap';
    div.id = `ap-${room}`;
    div.innerHTML = `<div class="page-title">${getRoomTitle(room)}</div><div id="content-${room}">جاري التحميل...</div>`;
    main.appendChild(div);
  });
}
function getRoomTitle(room) {
  let titles = {
    dashboard:'📊 Dashboard', home:'🏠 إدارة الصفحة الرئيسية', live:'🔴 Live', tournaments:'🏆 Tournaments', highlights:'🎬 Highlights',
    subscribers:'👥 Subscribers', 'gaming-news':'📰 Gaming News', 'youtube-news':'▶️ Youtube News',
    'yt-channels':'📺 Youtube Channels', 'yt-videos':'🎬 Youtube Videos',
    projects:'🌐 Collaboration', contact:'📞 Contact'
  };
  return titles[room] || room;
}
function showPage(id) {
  document.querySelectorAll('.ap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  let target = document.getElementById(`ap-${id}`);
  if (target) target.classList.add('active');
  let btn = document.getElementById(`sb-${id}`);
  if (btn) btn.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  else if (id === 'contact') loadContact();
  else loadContentPage(id);
}
function loadContact() {
  let container = document.getElementById('content-contact');
  container.innerHTML = `<div class="card"><h3>معلومات الاتصال</h3><p>بريد: admin@virtux.gg</p><p>ديسكورد: virtux_official</p></div>`;
}

// ==================== أدوات الرولات ====================
function hasRole(user, roleName) {
  if (Array.isArray(user.roles)) return user.roles.includes(roleName);
  return user.role === roleName;
}
function getRolesArray(user) {
  if (Array.isArray(user.roles) && user.roles.length > 0) return user.roles;
  if (user.role) return [user.role];
  return ['user'];
}
function getRoleColor(role) {
  const colors = { vip:'#d4e800', member:'#4caf90', moderator:'#ff9800', youtuber:'#ff4444', 'youtuber vip':'#ff6b35', user:'#aab' };
  return colors[role] || '#aab';
}
function getRoleBg(role) {
  const bgs = { vip:'#2a2000', member:'#0f3d2e', moderator:'#3d2e0f', youtuber:'#3d0a0a', 'youtuber vip':'#3d1a0a', user:'#0f1e55' };
  return bgs[role] || '#0f1e55';
}
function getRoleEmoji(role) {
  const emojis = { vip:'👑', member:'⭐', moderator:'🛡️', youtuber:'🎬', 'youtuber vip':'🔥', user:'👤' };
  return emojis[role] || '👤';
}

// ==================== بناء أزرار الرولات بأمان (بدون inline onclick) ====================
const ALL_ROLES = ['vip','member','moderator','youtuber','youtuber vip','user'];

function buildRoleButtonsHTML(userId, roles) {
  return ALL_ROLES.map(r => {
    let has = roles.includes(r);
    if (has) {
      return `<button class="btn-del" style="font-size:10px;padding:3px 7px;"
        data-action="remove-role" data-userid="${escapeHtml(userId)}" data-role="${escapeHtml(r)}"
        >✕ ${escapeHtml(r)}</button>`;
    } else {
      return `<button class="btn-edit" style="font-size:10px;padding:3px 7px;"
        data-action="add-role" data-userid="${escapeHtml(userId)}" data-role="${escapeHtml(r)}"
        >+ ${escapeHtml(r)}</button>`;
    }
  }).join('');
}

function buildRolesBadgesHTML(roles) {
  return roles.map(r =>
    `<span style="display:inline-block;font-size:10px;background:${getRoleBg(r)};color:${getRoleColor(r)};border-radius:4px;padding:2px 6px;margin-right:3px;">${getRoleEmoji(r)} ${escapeHtml(r).toUpperCase()}</span>`
  ).join('');
}

// ==================== Event Delegation المركزي لجميع أزرار الرولات والحذف ====================
document.addEventListener('click', async function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;

  const action = btn.dataset.action;
  const userId = btn.dataset.userid;
  const role = btn.dataset.role;

  if (!action || !userId) return;

  // تعطيل الزر أثناء التنفيذ لمنع النقر المتكرر
  btn.disabled = true;

  try {
    if (action === 'add-role') {
      await addRoleToUser(userId, role);
      showToast(`✅ تم إضافة الرول: ${role}`, 'ok');
    } else if (action === 'remove-role') {
      await removeRoleFromUser(userId, role);
      showToast(`✅ تم إزالة الرول: ${role}`, 'ok');
    } else if (action === 'delete-user') {
      await deleteUser(userId);
    }
  } catch(err) {
    console.error('خطأ في العملية:', err);
    showToast('❌ خطأ: ' + err.message, 'err');
    btn.disabled = false;
  }
});

// ==================== دوال الرولات (مُحدثة مع معالجة أخطاء) ====================
async function addRoleToUser(userId, roleToAdd) {
  const { data: userData, error: fetchError } = await supabaseClient
    .from('profiles').select('role,roles').eq('id', userId).single();
  if (fetchError) throw new Error('فشل جلب بيانات المستخدم: ' + fetchError.message);

  let roles = getRolesArray(userData || {});
  if (!roles.includes(roleToAdd)) {
    roles.push(roleToAdd);
  }
  // إزالة "user" إذا لديه رول آخر
  if (roles.length > 1) roles = roles.filter(r => r !== 'user');

  const { error: updateError } = await supabaseClient
    .from('profiles').update({ roles: roles, role: roles[0] }).eq('id', userId);
  if (updateError) throw new Error('فشل تحديث الرول: ' + updateError.message);

  loadDashboard();
}

async function removeRoleFromUser(userId, roleToRemove) {
  const { data: userData, error: fetchError } = await supabaseClient
    .from('profiles').select('role,roles').eq('id', userId).single();
  if (fetchError) throw new Error('فشل جلب بيانات المستخدم: ' + fetchError.message);

  let roles = getRolesArray(userData || {}).filter(r => r !== roleToRemove);
  if (roles.length === 0) roles = ['user'];

  const { error: updateError } = await supabaseClient
    .from('profiles').update({ roles: roles, role: roles[0] }).eq('id', userId);
  if (updateError) throw new Error('فشل تحديث الرول: ' + updateError.message);

  loadDashboard();
}

// ==================== حذف المستخدم (مُحسّن مع تأكيد مزدوج ومعالجة أخطاء) ====================
async function deleteUser(userId) {
  // تأكيد أول
  if (!confirm('⚠️ هل أنت متأكد من حذف هذا المستخدم نهائياً؟')) return;
  // تأكيد ثانٍ
  if (!confirm('🔴 تأكيد أخير: سيتم حذف الحساب نهائياً ولا يمكن التراجع!')) return;

  const { error } = await supabaseClient.from('profiles').delete().eq('id', userId);
  if (error) {
    throw new Error('فشل حذف المستخدم: ' + error.message);
  }

  showToast('✅ تم حذف المستخدم بنجاح', 'ok');

  // إزالة عنصر المستخدم من DOM فوراً قبل إعادة التحميل
  const userEl = document.getElementById('user-' + userId);
  if (userEl) {
    userEl.style.transition = 'opacity 0.3s, transform 0.3s';
    userEl.style.opacity = '0';
    userEl.style.transform = 'translateX(30px)';
    setTimeout(() => userEl.remove(), 300);
  }

  // إعادة تحميل الداشبورد بعد لحظة
  setTimeout(() => loadDashboard(), 400);
}

// ==================== البحث عن مستخدمين لإدارة الرولات ====================
async function searchUsersForRole(query) {
  let resultsDiv = document.getElementById('roleSearchResults');
  if (!resultsDiv) return;
  if (!query || query.length < 2) { resultsDiv.innerHTML = ''; return; }
  try {
    let { data: users, error } = await supabaseClient.from('profiles')
      .select('id,username,email,role,roles')
      .or(`username.ilike.%${query}%,email.ilike.%${query}%`).limit(10);
    if (error) throw error;
    if (!users || !users.length) {
      resultsDiv.innerHTML = '<div class="empty" style="padding:10px;">لا يوجد مستخدم مطابق</div>';
      return;
    }
    resultsDiv.innerHTML = users.map(u => {
      let roles = getRolesArray(u);
      let roleButtons = buildRoleButtonsHTML(u.id, roles);
      return `<div class="role-search-result-item" style="flex-direction:column;align-items:flex-start;gap:6px;">
        <div><strong>${escapeHtml(u.username||u.email)}</strong> <small style="color:#667;">${escapeHtml(u.email)}</small></div>
        <div>${buildRolesBadgesHTML(roles)}</div>
        <div class="role-buttons">${roleButtons}</div>
      </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
    resultsDiv.innerHTML = '<div class="empty">خطأ في البحث</div>';
  }
}

function refreshDashboard() { loadDashboard(); }

// ==================== دوال إدارة الأخبار ====================
async function loadNewsList() {
  let { data: news, error } = await supabaseClient.from('posts')
    .select('*').eq('room', 'ticker').order('id', { ascending: false });
  if (error) return;
  let container = document.getElementById('newsList');
  if (!container) return;
  if (!news || news.length === 0) {
    container.innerHTML = '<div class="empty">لا توجد أخبار. أضف خبراً الآن.</div>';
    return;
  }
  container.innerHTML = news.map(item => `
    <div class="news-item" id="news-${item.id}">
      <div class="news-text">${escapeHtml(item.title)}</div>
      ${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" class="news-link">رابط</a>` : ''}
      <button class="btn-edit" onclick="editNews(${item.id})">✏️</button>
      <button class="btn-del" onclick="deleteNews(${item.id})">🗑️</button>
    </div>
  `).join('');
}

async function addNews() {
  let title = document.getElementById('newsTitle').value.trim();
  let url = document.getElementById('newsUrl').value.trim();
  if (!title) { showToast('❌ يرجى إدخال نص الخبر', 'err'); return; }
  let { error } = await supabaseClient.from('posts').insert({ title, url: url||null, room:'ticker', tag:'news', icon:'📢', content:null });
  if (error) { showToast('❌ فشل إضافة الخبر: '+error.message, 'err'); return; }
  document.getElementById('newsTitle').value = '';
  document.getElementById('newsUrl').value = '';
  showToast('✅ تم إضافة الخبر', 'ok');
  loadNewsList();
}

async function deleteNews(id) {
  if (!confirm('حذف الخبر؟')) return;
  await supabaseClient.from('posts').delete().eq('id', id);
  loadNewsList();
}

async function editNews(id) {
  let { data, error } = await supabaseClient.from('posts').select('*').eq('id', id).single();
  if (error) return;
  let newTitle = prompt('تعديل نص الخبر:', data.title);
  if (newTitle === null) return;
  let newUrl = prompt('تعديل الرابط (اختياري):', data.url||'');
  await supabaseClient.from('posts').update({ title: newTitle, url: newUrl||null }).eq('id', id);
  loadNewsList();
}

// ==================== دوال المعاينة والإضافة ====================
function clearMedia(room) {
  const previewImg = document.getElementById(`preview-img-${room}`);
  const previewVideo = document.getElementById(`preview-video-${room}`);
  const previewText = document.getElementById(`preview-text-${room}`);
  if (previewImg) previewImg.style.display = 'none';
  if (previewVideo) previewVideo.style.display = 'none';
  if (previewText) previewText.style.display = 'block';
  const urlEl = document.getElementById(`url-${room}`);
  const iconEl = document.getElementById(`icon-${room}`);
  const imgfileEl = document.getElementById(`imgfile-${room}`);
  const videofileEl = document.getElementById(`videofile-${room}`);
  if (urlEl) urlEl.value = '';
  if (iconEl) { iconEl.value = ''; delete iconEl._imgData; }
  if (imgfileEl) imgfileEl.value = '';
  if (videofileEl) videofileEl.value = '';
}

function handleImageUpload(room) {
  const fileInput = document.getElementById(`imgfile-${room}`);
  const file = fileInput?.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const previewImg = document.getElementById(`preview-img-${room}`);
    const previewVideo = document.getElementById(`preview-video-${room}`);
    const previewText = document.getElementById(`preview-text-${room}`);
    if (previewImg) { previewImg.src = e.target.result; previewImg.style.display = 'block'; }
    if (previewVideo) previewVideo.style.display = 'none';
    if (previewText) previewText.style.display = 'none';
    const iconField = document.getElementById(`icon-${room}`);
    if (iconField) { iconField.value = '🖼️'; iconField._imgData = e.target.result; }
    const urlField = document.getElementById(`url-${room}`);
    if (urlField) urlField.value = '';
  };
  reader.readAsDataURL(file);
}

async function uploadVideoToBucket(room) {
  let fileInput = document.getElementById(`videofile-${room}`);
  let file = fileInput?.files[0];
  if (!file) { showToast('❌ لم تختر ملفاً', 'err'); return; }
  if (!file.type.startsWith('video/')) { showToast('❌ الملف المختار ليس فيديو', 'err'); return; }
  let fileName = Date.now() + '_' + file.name.replace(/\s/g, '_').replace(/[^a-zA-Z0-9._-]/g, '');
  let filePath = `highlights/${fileName}`;
  let uploadUrl = `${SUPABASE_URL}/storage/v1/object/videos/${filePath}`;
  let btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  try {
    let res = await fetch(uploadUrl, { method: 'POST', headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` }, body: file });
    if (res.ok) {
      let publicUrl = `${SUPABASE_URL}/storage/v1/object/public/videos/${filePath}`;
      document.getElementById(`url-${room}`).value = publicUrl;
      let titleField = document.getElementById(`title-${room}`);
      if (titleField && !titleField.value.trim()) titleField.value = file.name.replace(/\.[^/.]+$/, '');
      const previewImg = document.getElementById(`preview-img-${room}`);
      const previewVideo = document.getElementById(`preview-video-${room}`);
      const previewText = document.getElementById(`preview-text-${room}`);
      if (previewImg) previewImg.style.display = 'none';
      if (previewVideo) { previewVideo.src = publicUrl; previewVideo.style.display = 'block'; }
      if (previewText) previewText.style.display = 'none';
      const iconField = document.getElementById(`icon-${room}`);
      if (iconField) { iconField.value = ''; delete iconField._imgData; }
      showToast('✅ تم رفع الفيديو!', 'ok');
    } else {
      let errText = await res.text();
      showToast('❌ فشل الرفع: ' + errText, 'err');
    }
  } catch(e) { showToast('❌ خطأ: ' + e.message, 'err'); }
  finally { if (btn) btn.disabled = false; }
}

async function addPost(room) {
  const titleEl = document.getElementById(`title-${room}`);
  const urlEl = document.getElementById(`url-${room}`);
  const descEl = document.getElementById(`desc-${room}`);
  const contentEl = document.getElementById(`content-${room}`);
  const iconEl = document.getElementById(`icon-${room}`);
  const tagEl = document.getElementById(`tag-${room}`);
  function gv(el) { return el ? (el.value || '').trim() : ''; }
  let title = gv(titleEl), url = gv(urlEl), desc = gv(descEl), content = gv(contentEl), icon = gv(iconEl);
  let tag = tagEl ? tagEl.value : room;
  let imgData = iconEl?._imgData || '';
  if (imgData) icon = imgData;
  const hasImage = (icon && (icon.startsWith('data:') || icon.startsWith('http'))) || (url && url.match(/\.(jpg|jpeg|png|gif|webp)$/i));
  const hasVideo = url && (url.match(/\.(mp4|webm|avi|mov|mkv|flv|wmv|m4v|mpg|mpeg|3gp)$/i) || url.includes('/storage/v1/object/public/videos/') || url.includes('youtube.com') || url.includes('youtu.be'));
  // فحوصات
  if (tag === 'Photo' && !hasImage) { showError(room, '❌ يجب رفع صورة أو إضافة رابط صورة.'); return; }
  if (tag === 'Video' && !hasVideo) { showError(room, '❌ يجب رفع فيديو أو إضافة رابط يوتيوب.'); return; }
  if (!title && !desc && !content && !url && !icon) { showError(room, '❌ المنشور فارغ. أدخل عنواناً أو محتوى.'); return; }
  if (!title) title = '📄 منشور';
  const body = { title, description: desc, icon: icon || '📄', url, tag, room, content };
  const btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  try {
    const { error } = await supabaseClient.from('posts').insert(body);
    if (error) throw error;
    const okDiv = document.getElementById(`ok-${room}`);
    if (okDiv) { okDiv.style.display = 'block'; setTimeout(() => okDiv.style.display = 'none', 2000); }
    if (titleEl) titleEl.value = '';
    if (descEl) descEl.value = '';
    if (urlEl) urlEl.value = '';
    if (iconEl) { iconEl.value = ''; delete iconEl._imgData; }
    if (contentEl) contentEl.value = '';
    const fileInput = document.getElementById(`imgfile-${room}`);
    if (fileInput) fileInput.value = '';
    const videoInput = document.getElementById(`videofile-${room}`);
    if (videoInput) videoInput.value = '';
    const previewImg = document.getElementById(`preview-img-${room}`);
    const previewVideo = document.getElementById(`preview-video-${room}`);
    const previewText = document.getElementById(`preview-text-${room}`);
    if (previewImg) previewImg.style.display = 'none';
    if (previewVideo) previewVideo.style.display = 'none';
    if (previewText) previewText.style.display = 'block';
    loadContentPage(room);
    loadDashboard();
  } catch (e) { showError(room, e.message); }
  finally { if (btn) btn.disabled = false; }
}

function showError(room, msg) {
  let er = document.getElementById(`er-${room}`);
  if (er) { er.textContent = msg; er.style.display = 'block'; setTimeout(() => er.style.display = 'none', 4000); }
  else showToast(msg, 'err');
}

async function fetchYouTubeChannelInfo(url) {
  try {
    let handle = url.split('@')[1]?.split(/[\/?]/)[0];
    if (!handle) return null;
    let apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${handle}&key=${YOUTUBE_API_KEY}`;
    let res = await fetch(apiUrl);
    let data = await res.json();
    if (data.items && data.items[0]) return { title: data.items[0].snippet.title, subscribers: data.items[0].statistics.subscriberCount?.toLocaleString() || '0', thumbnail: data.items[0].snippet.thumbnails?.high?.url };
    return null;
  } catch(e) { return null; }
}

async function addYouTubeChannel(room) {
  let url = document.getElementById(`url-${room}`).value.trim();
  if (!url) { showToast('❌ أدخل رابط القناة', 'err'); return; }
  let info = await fetchYouTubeChannelInfo(url);
  if (!info) { showToast('❌ تعذر جلب معلومات القناة', 'err'); return; }
  let extraContent = document.getElementById(`content-${room}`)?.value.trim() || '';
  let body = { title: info.title, description: `${info.subscribers} مشترك`, icon: info.thumbnail || '📺', url: url, tag: room === 'yt-channels' ? 'Channel' : (document.getElementById(`tag-${room}`)?.value || 'Youtuber'), room: room, content: extraContent };
  let btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  try {
    let { error } = await supabaseClient.from('posts').insert(body);
    if (error) throw error;
    document.getElementById(`url-${room}`).value = '';
    if (document.getElementById(`content-${room}`)) document.getElementById(`content-${room}`).value = '';
    let okDiv = document.getElementById(`ok-${room}`);
    if (okDiv) { okDiv.style.display = 'block'; setTimeout(() => okDiv.style.display = 'none', 2000); }
    loadContentPage(room);
    loadDashboard();
  } catch(e) { showToast('❌ خطأ: ' + e.message, 'err'); }
  finally { if (btn) btn.disabled = false; }
}

async function fetchYouTubeVideoInfo(url) {
  let vid = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
  if (!vid) return null;
  let apiUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${vid}&key=${YOUTUBE_API_KEY}`;
  let res = await fetch(apiUrl);
  let data = await res.json();
  if (data.items && data.items[0]) return { title: data.items[0].snippet.title, description: data.items[0].snippet.channelTitle, thumbnail: data.items[0].snippet.thumbnails?.high?.url, videoUrl: url };
  return null;
}

async function fetchVideoFromChannel(channelUrl) {
  let handle = channelUrl.split('@')[1]?.split(/[\/?]/)[0];
  if (!handle) return null;
  let apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${handle}&key=${YOUTUBE_API_KEY}`;
  let res = await fetch(apiUrl);
  let data = await res.json();
  let channelId = data.items?.[0]?.id;
  if (!channelId) return null;
  let videosApi = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=1&order=date&type=video&key=${YOUTUBE_API_KEY}`;
  let videosRes = await fetch(videosApi);
  let videosData = await videosRes.json();
  let video = videosData.items?.[0];
  if (video) return { title: video.snippet.title, description: video.snippet.channelTitle, thumbnail: video.snippet.thumbnails?.high?.url, videoUrl: `https://www.youtube.com/watch?v=${video.id.videoId}` };
  return null;
}

async function addYouTubeVideo(room) {
  let url = document.getElementById(`url-${room}`).value.trim();
  if (!url) { showToast('❌ أدخل رابط', 'err'); return; }
  let type = document.getElementById(`type-${room}`).value;
  let info = type === 'single' ? await fetchYouTubeVideoInfo(url) : await fetchVideoFromChannel(url);
  if (!info) { showToast('❌ تعذر جلب الفيديو', 'err'); return; }
  let body = { title: info.title, description: info.description, icon: info.thumbnail || '📹', url: info.videoUrl, tag: document.getElementById(`tag-${room}`).value, room: room, content: document.getElementById(`content-${room}`).value.trim() };
  await supabaseClient.from('posts').insert(body);
  loadContentPage(room);
}

}

<script>
// ===== 3D SPACE TUNNEL + FLOATING CUBES BACKGROUND =====
(function() {
  const canvas = document.getElementById('bgCanvas');
  if (!canvas) return;
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) { fallback2D(canvas); return; }

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0, 0, canvas.width, canvas.height); }
  resize();
  window.addEventListener('resize', resize);

  const vsSource = `
    attribute vec3 aPos;
    attribute vec3 aColor;
    uniform mat4 uMVP;
    varying vec3 vColor;
    varying float vDepth;
    void main() {
      vec4 pos = uMVP * vec4(aPos, 1.0);
      gl_Position = pos;
      vColor = aColor;
      vDepth = pos.z;
    }
  `;
  const fsSource = `
    precision mediump float;
    varying vec3 vColor;
    varying float vDepth;
    void main() {
      float fog = clamp(1.0 - vDepth * 0.18, 0.0, 1.0);
      gl_FragColor = vec4(vColor * fog, fog * 0.92);
    }
  `;

  function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vsSource));
  gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fsSource));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const aPos = gl.getAttribLocation(prog, 'aPos');
  const aColor = gl.getAttribLocation(prog, 'aColor');
  const uMVP = gl.getUniformLocation(prog, 'uMVP');

  function mat4() { return new Float32Array(16); }
  function identity(m) { m[0]=1;m[1]=0;m[2]=0;m[3]=0;m[4]=0;m[5]=1;m[6]=0;m[7]=0;m[8]=0;m[9]=0;m[10]=1;m[11]=0;m[12]=0;m[13]=0;m[14]=0;m[15]=1; return m; }
  function perspective(m, fov, aspect, near, far) {
    const f = 1.0 / Math.tan(fov / 2), nf = 1 / (near - far);
    m[0]=f/aspect; m[1]=0; m[2]=0; m[3]=0; m[4]=0; m[5]=f; m[6]=0; m[7]=0;
    m[8]=0; m[9]=0; m[10]=(far+near)*nf; m[11]=-1; m[12]=0; m[13]=0; m[14]=2*far*near*nf; m[15]=0;
    return m;
  }
  function multiply(out, a, b) {
    for(let i=0;i<4;i++) for(let j=0;j<4;j++) { out[j*4+i]=0; for(let k=0;k<4;k++) out[j*4+i]+=a[k*4+i]*b[j*4+k]; }
    return out;
  }
  function rotateY(m, angle) {
    const c=Math.cos(angle), s=Math.sin(angle), r=identity(mat4());
    r[0]=c; r[2]=s; r[8]=-s; r[10]=c;
    return multiply(mat4(), m, r);
  }
  function rotateX(m, angle) {
    const c=Math.cos(angle), s=Math.sin(angle), r=identity(mat4());
    r[5]=c; r[6]=-s; r[9]=s; r[10]=c;
    return multiply(mat4(), m, r);
  }

  function randomColor() {
    const p = [[0,0.8,0.5],[0.8,0.7,0],[0,0.4,1],[0.6,0,1],[0,1,0.3],[1,0.3,0]];
    return p[Math.floor(Math.random()*p.length)];
  }

  const numCubes = 60;
  const cubes = Array.from({length: numCubes}, () => ({
    x:(Math.random()-0.5)*20, y:(Math.random()-0.5)*20, z:-Math.random()*40,
    size:0.3+Math.random()*1.2, rx:Math.random()*6.28, ry:Math.random()*6.28,
    drx:(Math.random()-0.5)*0.015, dry:(Math.random()-0.5)*0.02,
    speed:0.04+Math.random()*0.06, color:randomColor()
  }));

  const stars3d = Array.from({length:300}, () => ({
    x:(Math.random()-0.5)*50, y:(Math.random()-0.5)*50, z:-Math.random()*60
  }));

  const tunnelRings = Array.from({length:20}, (_, i) => ({ z:-i*3.5, angle:i*0.1 }));

  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  let t = 0;

  function buildAndDraw(positions, colors, mode) {
    if(!positions.length) return;
    const pb = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, pb);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(aPos);
    const cb = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, cb);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(aColor);
    gl.drawArrays(mode, 0, positions.length/3);
    gl.deleteBuffer(pb);
    gl.deleteBuffer(cb);
  }

  function drawCube(cube, proj, view) {
    const s=cube.size/2;
    const v=[[-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],[-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]];
    const e=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    let model = identity(mat4());
    model = rotateX(model, cube.rx);
    model = rotateY(model, cube.ry);
    model[12]=cube.x; model[13]=cube.y; model[14]=cube.z;
    gl.uniformMatrix4fv(uMVP, false, multiply(mat4(), proj, multiply(mat4(), view, model)));
    const pos=[], col=[];
    const [r,g,b] = cube.color;
    e.forEach(([a,bb])=>{ pos.push(...v[a],...v[bb]); col.push(r,g,b,r,g,b); });
    buildAndDraw(pos, col, gl.LINES);
  }

  function drawRing(ring, proj, view) {
    const segs=16, radius=6+Math.sin(t*0.5+ring.z*0.1)*1.5;
    const pos=[], col=[];
    for(let i=0;i<segs;i++){
      const a1=(i/segs)*6.28+ring.angle, a2=((i+1)/segs)*6.28+ring.angle;
      pos.push(Math.cos(a1)*radius,Math.sin(a1)*radius,ring.z, Math.cos(a2)*radius,Math.sin(a2)*radius,ring.z);
      const glow=0.3+0.5*Math.abs(Math.sin(t*0.8+i*0.4));
      col.push(0,glow*0.6,glow, 0,glow*0.6,glow);
    }
    gl.uniformMatrix4fv(uMVP, false, multiply(mat4(), proj, view));
    buildAndDraw(pos, col, gl.LINES);
  }

  function animate() {
    t += 0.016;
    const W=canvas.width, H=canvas.height;
    gl.clearColor(0.002, 0.004, 0.02, 1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    const proj = perspective(mat4(), 0.9, W/H, 0.1, 80);
    let view = identity(mat4());
    view[12]=-Math.sin(t*0.15)*1.2; view[13]=-Math.cos(t*0.12)*0.8; view[14]=2;

    // نجوم
    const sp=[], sc=[];
    stars3d.forEach(s=>{ sp.push(s.x,s.y,s.z); const br=0.5+0.5*Math.sin(t*2+s.x+s.y); sc.push(br,br,br); });
    gl.uniformMatrix4fv(uMVP, false, multiply(mat4(), proj, view));
    buildAndDraw(sp, sc, gl.POINTS);

    // حلقات النفق
    tunnelRings.forEach(ring=>{ ring.z+=0.04; ring.angle+=0.004; if(ring.z>4) ring.z-=70; drawRing(ring,proj,view); });

    // مكعبات
    cubes.forEach(cube=>{
      cube.z+=cube.speed; cube.rx+=cube.drx; cube.ry+=cube.dry;
      if(cube.z>5){ cube.z=-40-Math.random()*20; cube.x=(Math.random()-0.5)*20; cube.y=(Math.random()-0.5)*20; cube.color=randomColor(); }
      drawCube(cube,proj,view);
    });

    // خطوط ربط
    const lp=[], lc=[];
    for(let i=0;i<cubes.length;i++) for(let j=i+1;j<cubes.length;j++){
      const dx=cubes[i].x-cubes[j].x, dy=cubes[i].y-cubes[j].y, dz=cubes[i].z-cubes[j].z;
      const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(dist<3.5){ const a=(1-dist/3.5)*0.4; lp.push(cubes[i].x,cubes[i].y,cubes[i].z,cubes[j].x,cubes[j].y,cubes[j].z); lc.push(0,a*0.8,a,0,a*0.8,a); }
    }
    if(lp.length){ gl.uniformMatrix4fv(uMVP, false, multiply(mat4(), proj, view)); buildAndDraw(lp, lc, gl.LINES); }

    requestAnimationFrame(animate);
  }
  animate();

  function fallback2D(c) {
    const ctx=c.getContext('2d');
    function resz(){c.width=window.innerWidth;c.height=window.innerHeight;}
    resz(); window.addEventListener('resize',resz);
    const pts=Array.from({length:120},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-0.5)*0.002,vy:(Math.random()-0.5)*0.002,r:Math.random()*2+1,c:`hsl(${180+Math.random()*60},100%,${50+Math.random()*30}%)`}));
    function frame(){
      ctx.fillStyle='rgba(0,4,18,0.18)'; ctx.fillRect(0,0,c.width,c.height);
      pts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>1)p.vx*=-1; if(p.y<0||p.y>1)p.vy*=-1; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x*c.width,p.y*c.height,p.r,0,6.28); ctx.fill(); });
      pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{ const dx=(a.x-b.x)*c.width, dy=(a.y-b.y)*c.height, d=Math.sqrt(dx*dx+dy*dy); if(d<120){ctx.strokeStyle=`rgba(0,220,200,${(1-d/120)*0.3})`;ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(a.x*c.width,a.y*c.height);ctx.lineTo(b.x*c.width,b.y*c.height);ctx.stroke();} }));
      requestAnimationFrame(frame);
    }
    frame();
  }
})();
</script>
