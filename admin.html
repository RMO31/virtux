<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Virtux Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;min-height:100vh}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;padding:36px 32px;width:340px;text-align:center}
    .login-box h1{color:#d4e800;font-size:24px;margin-bottom:6px}
    .login-box p{color:#667;font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:14px;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#9fb000}
    .btn-login{width:100%;padding:10px;background:#9fb000;color:#000;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-login:hover{background:#d4e800}
    .err{color:#f55;font-size:12px;margin-top:8px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column}
    .topbar{background:#000718;border-bottom:1px solid #9fb000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{color:#d4e800;font-size:16px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .conn{font-size:12px;padding:3px 10px;border-radius:4px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}
    .conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
    .btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;height:calc(100vh - 46px)}
    .sidebar{width:190px;background:#050c2e;border-right:1px solid #1e2d6b;padding:12px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}
    .sb-btn.active{border-left:3px solid #d4e800}
    .sb-sec{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px}
    .main{flex:1;padding:20px;overflow-y:auto;background:#01042e}
    .ap{display:none}
    .ap.active{display:block}
    .page-title{font-size:18px;color:#d4e800;font-weight:700;margin-bottom:16px}
    .card{background:#050e30;border:1px solid #1e2d6b;border-radius:12px;padding:18px;margin-bottom:18px}
    .card h3{color:#9fb000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:13px;width:100%}
    .fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#9fb000}
    .full{grid-column:1/-1}
    .btn-pub{background:#9fb000;color:#000;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-pub:hover{background:#d4e800}
    .btn-pub:disabled{background:#445;color:#778;cursor:not-allowed}
    .ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .posts-list{display:flex;flex-direction:column;gap:8px}
    .pi{background:#0a1540;border:1px solid #1e2d6b;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .pi-icon{width:40px;height:40px;border-radius:6px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:#0f1e55;font-size:20px}
    .pi-info{flex:1}
    .pi-title{font-size:13px;font-weight:600;color:#ddd}
    .pi-meta{font-size:11px;color:#667;margin-top:2px}
    .pi-tag{display:inline-block;font-size:10px;background:#0f1e55;color:#9fb000;border-radius:3px;padding:1px 7px;margin-top:3px}
    .btn-del{background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-del:hover{background:#f55;color:#fff}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
    .sc{background:#050e30;border:1px solid #1e2d6b;border-radius:10px;padding:16px;text-align:center}
    .sc-num{font-size:30px;font-weight:700;color:#d4e800}
    .sc-lbl{font-size:11px;color:#667;margin-top:4px}
    .img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .img-upload input[type=file]{display:none}
    .img-upload label{background:#1a2d80;color:#9fb000;border:1px solid #1e2d6b;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer}
    .img-preview{width:40px;height:40px;border-radius:6px;object-fit:cover;display:none}
  </style>
</head>
<body>
<div id="loginPage">
  <div class="login-box">
    <h1>🎮 Virtux Admin</h1>
    <p>Enter your password</p>
    <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Login</button>
    <div class="err" id="loginErr">Wrong password!</div>
  </div>
</div>

<div id="adminPage">
  <div class="topbar">
    <h1>🎮 Virtux Admin Panel</h1>
    <div class="topbar-right">
      <span class="conn" id="connStatus">Checking...</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <button class="sb-btn active" id="sb-dashboard" onclick="showPage('dashboard')">📊 Dashboard</button>
      <div class="sb-sec">Rooms</div>
      <button class="sb-btn" id="sb-live" onclick="showPage('live')">🔴 Live</button>
      <button class="sb-btn" id="sb-tournaments" onclick="showPage('tournaments')">🏆 Tournaments</button>
      <button class="sb-btn" id="sb-highlights" onclick="showPage('highlights')">🎬 Highlights</button>
      <button class="sb-btn" id="sb-subscribers" onclick="showPage('subscribers')">👥 Subscribers</button>
      <div class="sb-sec">News</div>
      <button class="sb-btn" id="sb-gaming-news" onclick="showPage('gaming-news')">📰 Gaming News</button>
      <button class="sb-btn" id="sb-youtube-news" onclick="showPage('youtube-news')">▶️ Youtube News</button>
      <div class="sb-sec">Youtube</div>
      <button class="sb-btn" id="sb-yt-channels" onclick="showPage('yt-channels')">📺 Channels</button>
      <button class="sb-btn" id="sb-yt-videos" onclick="showPage('yt-videos')">🎬 Videos</button>
      <button class="sb-btn" id="sb-yt-lives" onclick="showPage('yt-lives')">🔴 Lives</button>
      <div class="sb-sec">Collab</div>
      <button class="sb-btn" id="sb-projects" onclick="showPage('projects')">🌐 Projects</button>
    </div>

    <div class="main">
      <!-- Dashboard (مختصر) -->
      <div class="ap active" id="ap-dashboard">
        <div class="page-title">📊 Dashboard</div>
        <div class="stats">
          <div class="sc"><div class="sc-num" id="s-total">—</div><div class="sc-lbl">Total Posts</div></div>
          <div class="sc"><div class="sc-num" id="s-live">—</div><div class="sc-lbl">Live</div></div>
          <div class="sc"><div class="sc-num" id="s-tour">—</div><div class="sc-lbl">Tournaments</div></div>
          <div class="sc"><div class="sc-num" id="s-news">—</div><div class="sc-lbl">News</div></div>
        </div>
        <div class="card"><h3>Recent Posts</h3><div id="recent-list"><div class="loading">Loading...</div></div></div>
      </div>

      <!-- باقي الأقسام (يمكن إضافتها لاحقاً، لكن الأساس هو Subscribers) -->
      <div class="ap" id="ap-subscribers">
        <div class="page-title">👥 Subscribers</div>
        <div class="card"><h3>➕ Add Subscriber</h3>
          <div class="ok" id="ok-subscribers">✅ Added!</div><div class="er" id="er-subscribers"></div>
          <div class="fg">
            <input class="full" id="subscribers-url" placeholder="YouTube channel URL (e.g. https://www.youtube.com/@RMO-MR)">
            <select id="subscribers-tag">
              <option value="YouTube">🔔 YouTube</option>
              <option value="Member">⭐ Member</option>
              <option value="Donor">🎁 Donor</option>
              <option value="Collaboration">🌐 Collaboration</option>
              <option value="VIP">👑 VIP</option>
            </select>
            <textarea class="full" id="subscribers-content" placeholder="Extra description (optional)" rows="3"></textarea>
          </div>
          <button class="btn-pub" onclick="addYouTubeChannel('subscribers')">➕ Add</button>
        </div>
        <div class="card"><h3>Posts</h3><div class="posts-list" id="list-subscribers"><div class="loading">Loading...</div></div></div>
      </div>

      <!-- باقي الأقسام (نفس الهيكل القديم يمكن إضافته) -->
    </div>
  </div>
</div>

<script>
const SB = 'https://eyqcpkhjzpmawqtilhgl.supabase.co/rest/v1';
const KEY = 'sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';
const HDR = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
let PASS = localStorage.getItem('vx_pw') || 'virtux2025';

// مفتاح YouTube API الخاص بك
const YOUTUBE_API_KEY = 'AIzaSyDzjcK_PXjTcrfMO6iE2S-PKg35ZLL0WJY';

// دوال مساعدة
async function checkConn() {
  try {
    const r = await fetch(SB + '/posts?limit=1', { headers: HDR });
    const el = document.getElementById('connStatus');
    if (r.ok) { el.textContent = '✅ Connected'; el.className = 'conn'; }
    else { el.textContent = '❌ Error ' + r.status; el.className = 'conn fail'; }
  } catch(e) {
    document.getElementById('connStatus').textContent = '❌ No Internet';
    document.getElementById('connStatus').className = 'conn fail';
  }
}

function login() {
  if (document.getElementById('pw').value === PASS) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    checkConn();
    loadDashboard();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('pw').value = '';
}

function showPage(id) {
  document.querySelectorAll('.ap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ap-' + id).classList.add('active');
  const s = document.getElementById('sb-' + id);
  if (s) s.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  else loadPosts(id);
}

async function loadDashboard() {
  try {
    const r = await fetch(SB + '/posts?order=id.desc', { headers: HDR });
    const data = await r.json();
    if (!Array.isArray(data)) return;
    document.getElementById('s-total').textContent = data.length;
    document.getElementById('s-live').textContent = data.filter(p=>p.room==='live').length;
    document.getElementById('s-tour').textContent = data.filter(p=>p.room==='tournaments').length;
    document.getElementById('s-news').textContent = data.filter(p=>p.room==='gaming-news'||p.room==='youtube-news').length;
    const el = document.getElementById('recent-list');
    if (!data.length) { el.innerHTML = '<div class="empty">No posts yet.</div>'; return; }
    el.innerHTML = '<div class="posts-list">'+data.slice(0,6).map(postHTML).join('')+'</div>';
  } catch(e) {}
}

async function loadPosts(room) {
  const el = document.getElementById('list-'+room);
  if (!el) return;
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const r = await fetch(SB + '/posts?room=eq.'+room+'&order=id.desc', { headers: HDR });
    const data = await r.json();
    if (!Array.isArray(data)||!data.length) { el.innerHTML='<div class="empty">No posts yet.</div>'; return; }
    el.innerHTML = data.map(postHTML).join('');
  } catch(e) { el.innerHTML='<div class="empty">Error loading.</div>'; }
}

function postHTML(p) {
  const link = p.url ? ` • <a href="${p.url}" target="_blank" style="color:#9fb000;font-size:11px">🔗 Link</a>` : '';
  let iconHtml = '📄';
  if (p.icon) {
    if (p.icon.startsWith('data:image') || p.icon.startsWith('http')) {
      iconHtml = `<img src="${p.icon}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;">`;
    } else {
      let shortIcon = p.icon.length > 20 ? p.icon.substring(0,20)+'…' : p.icon;
      iconHtml = shortIcon;
    }
  }
  return `<div class="pi" id="pi-${p.id}">
    <div class="pi-icon">${iconHtml}</div>
    <div class="pi-info">
      <div class="pi-title">${p.title}</div>
      <div class="pi-meta">${p.description||''}${link}</div>
      <span class="pi-tag">${p.tag||p.room}</span>
    </div>
    <button class="btn-del" onclick="delPost(${p.id},'${p.room}')">🗑️ Delete</button>
  </div>`;
}

function val(id) { const el=document.getElementById(id); return el?(el.value||'').trim():''; }
function clear(id) { const el=document.getElementById(id); if(el) el.value=''; }

async function delPost(id, room) {
  if (!confirm('Delete this post?')) return;
  await fetch(SB+'/posts?id=eq.'+id, { method:'DELETE', headers: HDR });
  document.getElementById('pi-'+id)?.remove();
  loadDashboard();
}

// استخراج معرف القناة من الرابط
function extractChannelIdFromUrl(url) {
  try {
    if (url.includes('/channel/')) {
      return url.split('/channel/')[1]?.split(/[\/?]/)[0];
    } else if (url.includes('/c/')) {
      return url.split('/c/')[1]?.split(/[\/?]/)[0];
    }
    return null;
  } catch(e) { return null; }
}

// جلب بيانات القناة باستخدام YouTube Data API v3
async function fetchYouTubeChannelInfo(url) {
  if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === 'AIzaSyDzjcK_PXjTcrfMO6iE2S-PKg35ZLL0WJY') {
    alert('⚠️ يرجى التأكد من صحة مفتاح YouTube API');
    return null;
  }
  try {
    let handle = null;
    let channelId = extractChannelIdFromUrl(url);
    if (!channelId && url.includes('@')) {
      handle = url.split('@')[1]?.split(/[\/?]/)[0];
    }
    let apiUrl = '';
    if (channelId) {
      apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${YOUTUBE_API_KEY}`;
    } else if (handle) {
      apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${handle}&key=${YOUTUBE_API_KEY}`;
    } else {
      return null;
    }
    const res = await fetch(apiUrl);
    const data = await res.json();
    if (data.items && data.items.length > 0) {
      const item = data.items[0];
      const snippet = item.snippet;
      const stats = item.statistics;
      return {
        title: snippet.title,
        subscribers: stats.subscriberCount ? parseInt(stats.subscriberCount).toLocaleString() : '0',
        thumbnail: snippet.thumbnails?.high?.url || snippet.thumbnails?.medium?.url || snippet.thumbnails?.default?.url,
        description: snippet.description
      };
    }
    return null;
  } catch(e) {
    console.error('YouTube API error:', e);
    return null;
  }
}

// إضافة قناة يوتيوب (لـ subscribers)
async function addYouTubeChannel(room) {
  const url = document.getElementById(room+'-url').value.trim();
  if (!url) { alert('Please enter a YouTube channel URL'); return; }
  const info = await fetchYouTubeChannelInfo(url);
  if (!info) {
    alert('Could not fetch channel info. Check URL or API key.');
    return;
  }
  const tag = document.getElementById(room+'-tag')?.value || room;
  const extraContent = document.getElementById(room+'-content')?.value || '';
  const body = {
    title: info.title,
    description: `${info.subscribers} subscribers`,
    icon: info.thumbnail,
    url: url,
    tag: tag,
    room: room,
    content: extraContent
  };
  const btn = document.querySelector('#ap-'+room+' .btn-pub');
  if(btn) { btn.disabled=true; btn.textContent='Adding...'; }
  try {
    const r = await fetch(SB + '/posts', {
      method: 'POST',
      headers: { ...HDR, 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      document.getElementById(room+'-url').value = '';
      if(document.getElementById(room+'-content')) document.getElementById(room+'-content').value = '';
      const ok = document.getElementById('ok-'+room);
      ok.style.display='block';
      setTimeout(()=>ok.style.display='none',3000);
      loadPosts(room);
      loadDashboard();
    } else {
      const err = await r.json();
      const er = document.getElementById('er-'+room);
      er.textContent = '❌ ' + (err.message||err.hint||'Error '+r.status);
      er.style.display='block';
      setTimeout(()=>er.style.display='none',5000);
    }
  } catch(e) {
    const er = document.getElementById('er-'+room);
    er.textContent = '❌ Network error';
    er.style.display='block';
    setTimeout(()=>er.style.display='none',5000);
  } finally {
    if(btn) { btn.disabled=false; btn.textContent='➕ Add'; }
  }
}
</script>
</body>
</html>
