<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Virtux Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;min-height:100vh}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#050e30;border:1px solid #9fb000;border-radius:14px;padding:36px 32px;width:340px;text-align:center}
    .login-box h1{color:#d4e800;font-size:24px;margin-bottom:6px}
    .login-box p{color:#667;font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:14px;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#9fb000}
    .btn-login{width:100%;padding:10px;background:#9fb000;color:#000;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-login:hover{background:#d4e800}
    .err{color:#f55;font-size:12px;margin-top:8px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column}
    .topbar{background:#000718;border-bottom:1px solid #9fb000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{color:#d4e800;font-size:16px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .conn{font-size:12px;padding:3px 10px;border-radius:4px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}
    .conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
    .btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;height:calc(100vh - 46px)}
    .sidebar{width:190px;background:#050c2e;border-right:1px solid #1e2d6b;padding:12px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}
    .sb-btn.active{border-left:3px solid #d4e800}
    .sb-sec{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px}
    .main{flex:1;padding:20px;overflow-y:auto;background:#01042e}
    .ap{display:none}
    .ap.active{display:block}
    .page-title{font-size:18px;color:#d4e800;font-weight:700;margin-bottom:16px}
    .card{background:#050e30;border:1px solid #1e2d6b;border-radius:12px;padding:18px;margin-bottom:18px}
    .card h3{color:#9fb000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:13px;width:100%}
    .fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#9fb000}
    .full{grid-column:1/-1}
    .btn-pub{background:#9fb000;color:#000;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-pub:hover{background:#d4e800}
    .btn-pub:disabled{background:#445;color:#778;cursor:not-allowed}
    .ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .posts-list{display:flex;flex-direction:column;gap:8px}
    .pi{background:#0a1540;border:1px solid #1e2d6b;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .pi-icon{width:40px;height:40px;border-radius:6px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:#0f1e55;font-size:20px}
    .pi-info{flex:1}
    .pi-title{font-size:13px;font-weight:600;color:#ddd}
    .pi-meta{font-size:11px;color:#667;margin-top:2px}
    .pi-tag{display:inline-block;font-size:10px;background:#0f1e55;color:#9fb000;border-radius:3px;padding:1px 7px;margin-top:3px}
    .btn-del{background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-del:hover{background:#f55;color:#fff}
    .empty{text-align:center;color:#445;padding:30px;font-size:13px}
    .loading{text-align:center;color:#667;padding:20px;font-size:13px}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
    .stat-card{background:#050e30;border:1px solid #1e2d6b;border-radius:10px;padding:14px;text-align:center}
    .stat-number{font-size:28px;font-weight:700;color:#d4e800}
    .stat-label{font-size:11px;color:#667;margin-top:4px}
    .img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .img-upload input[type=file]{display:none}
    .img-upload label{background:#1a2d80;color:#9fb000;border:1px solid #1e2d6b;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer}
    .img-preview{width:40px;height:40px;border-radius:6px;object-fit:cover;display:none}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <h1>🎮 Virtux Admin</h1>
    <p>أدخل كلمة المرور</p>
    <input type="password" id="pw" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="err" id="loginErr">كلمة المرور خاطئة!</div>
  </div>
</div>

<div id="adminPage">
  <div class="topbar">
    <h1>🎮 Virtux Admin Panel</h1>
    <div class="topbar-right">
      <span class="conn" id="connStatus">جارٍ الاتصال...</span>
      <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <button class="sb-btn active" id="sb-dashboard" onclick="showPage('dashboard')">📊 Dashboard</button>
      <div class="sb-sec">الأقسام</div>
      <button class="sb-btn" id="sb-live" onclick="showPage('live')">🔴 Live</button>
      <button class="sb-btn" id="sb-tournaments" onclick="showPage('tournaments')">🏆 Tournaments</button>
      <button class="sb-btn" id="sb-highlights" onclick="showPage('highlights')">🎬 Highlights</button>
      <button class="sb-btn" id="sb-subscribers" onclick="showPage('subscribers')">👥 Subscribers</button>
      <div class="sb-sec">أخبار</div>
      <button class="sb-btn" id="sb-gaming-news" onclick="showPage('gaming-news')">📰 Gaming News</button>
      <button class="sb-btn" id="sb-youtube-news" onclick="showPage('youtube-news')">▶️ Youtube News</button>
      <div class="sb-sec">يوتيوب</div>
      <button class="sb-btn" id="sb-yt-channels" onclick="showPage('yt-channels')">📺 Channels</button>
      <button class="sb-btn" id="sb-yt-videos" onclick="showPage('yt-videos')">🎬 Videos</button>
      <button class="sb-btn" id="sb-yt-lives" onclick="showPage('yt-lives')">🔴 Lives</button>
      <div class="sb-sec">تعاون</div>
      <button class="sb-btn" id="sb-projects" onclick="showPage('projects')">🌐 Projects</button>
    </div>

    <div class="main">
      <!-- Dashboard -->
      <div class="ap active" id="ap-dashboard">
        <div class="page-title">📊 Dashboard</div>
        <div class="stats-grid" id="visitor-stats"></div>
        <div class="card">
          <h3>👥 المستخدمون المسجلون</h3>
          <div id="registered-users-list" class="posts-list"><div class="loading">جاري التحميل...</div></div>
        </div>
      </div>

      <!-- باقي الأقسام (مختصرة، لكنها موجودة في النسخ السابقة) -->
      <!-- نركز على قسم yt-channels المعدل -->
      <div class="ap" id="ap-yt-channels">
        <div class="page-title">📺 Youtube Channels</div>
        <div class="card"><h3>➕ إضافة قناة يوتيوب (رابط فقط)</h3>
          <div class="ok" id="ok-yt-channels">✅ تمت الإضافة!</div>
          <div class="er" id="er-yt-channels"></div>
          <div class="fg">
            <input class="full" id="yt-channels-url" placeholder="رابط قناة يوتيوب (مثال: https://www.youtube.com/@RMO-MR)">
            <select id="yt-channels-tag">
              <option value="Channel">📺 Channel</option>
            </select>
            <textarea class="full" id="yt-channels-content" placeholder="وصف إضافي (اختياري)" rows="3"></textarea>
          </div>
          <button class="btn-pub" onclick="addYouTubeChannel('yt-channels')">➕ إضافة</button>
        </div>
        <div class="card"><h3>القنوات</h3>
          <div id="list-yt-channels" class="posts-list"><div class="loading">جاري التحميل...</div></div>
        </div>
      </div>

      <!-- باقي الأقسام (نفس النسخة السابقة) يمكن إضافتها هنا -->
    </div>
  </div>
</div>

<script>
const SB = 'https://eyqcpkhjzpmawqtilhgl.supabase.co/rest/v1';
const KEY = 'sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';
const STORAGE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co/storage/v1/object/public';
const HDR = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
let PASS = localStorage.getItem('vx_pw') || 'virtux2025';

// ==================== دوال مساعدة ====================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ==================== الاتصال وتسجيل الدخول ====================
async function checkConn() {
  try {
    const r = await fetch(SB + '/posts?limit=1', { headers: HDR });
    const el = document.getElementById('connStatus');
    if (r.ok) { el.textContent = '✅ متصل'; el.className = 'conn'; }
    else { el.textContent = '❌ خطأ ' + r.status; el.className = 'conn fail'; }
  } catch(e) {
    document.getElementById('connStatus').textContent = '❌ لا إنترنت';
    document.getElementById('connStatus').className = 'conn fail';
  }
}

function login() {
  if (document.getElementById('pw').value === PASS) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    checkConn();
    loadDashboard();
    loadPosts('yt-channels');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('pw').value = '';
}

// ==================== Dashboard ====================
async function loadDashboard() {
  try {
    // Visitor stats
    try {
      const visitorRes = await fetch(SB + '/rpc/get_visitor_stats', { headers: HDR });
      if (visitorRes.ok) {
        const visitorStats = await visitorRes.json();
        const visitorHtml = `
          <div class="stat-card"><div class="stat-number">${visitorStats.today || 0}</div><div class="stat-label">زوار اليوم</div></div>
          <div class="stat-card"><div class="stat-number">${visitorStats.total || 0}</div><div class="stat-label">إجمالي الزوار</div></div>
        `;
        document.getElementById('visitor-stats').innerHTML = visitorHtml;
      } else {
        document.getElementById('visitor-stats').innerHTML = '<div class="empty">إحصائيات الزوار غير متاحة</div>';
      }
    } catch(e) { console.warn(e); }
    
    // Registered users
    try {
      const userCountRes = await fetch(SB + '/rpc/get_user_count', { headers: HDR });
      if (userCountRes.ok) {
        const userCount = await userCountRes.json();
        const usersListRes = await fetch(SB + '/rpc/get_users_list', { headers: HDR });
        let usersHtml = `<div class="stat-card"><div class="stat-number">${userCount}</div><div class="stat-label">مستخدمون مسجلون</div></div>`;
        if (usersListRes.ok) {
          const users = await usersListRes.json();
          if (users && users.length) {
            usersHtml += `<div class="posts-list" style="margin-top:10px;">${users.map(u => `<div class="pi"><div class="pi-info"><div class="pi-title">${escapeHtml(u.email)}</div><div class="pi-meta">تاريخ التسجيل: ${new Date(u.created_at).toLocaleDateString()}</div></div></div>`).join('')}</div>`;
          } else {
            usersHtml += '<div class="empty">لا يوجد مستخدمون بعد</div>';
          }
        } else {
          usersHtml += '<div class="empty">تعذر جلب قائمة المستخدمين</div>';
        }
        document.getElementById('registered-users-list').innerHTML = usersHtml;
      } else {
        document.getElementById('registered-users-list').innerHTML = '<div class="empty">إحصائيات المستخدمين غير متاحة</div>';
      }
    } catch(e) { console.warn(e); }
  } catch(e) { console.error(e); }
}

// ==================== دوال المنشورات العامة ====================
async function loadPosts(room) {
  const el = document.getElementById('list-'+room);
  if (!el) return;
  el.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    const r = await fetch(SB + '/posts?room=eq.'+room+'&order=id.desc', { headers: HDR });
    const data = await r.json();
    if (!Array.isArray(data)||!data.length) { el.innerHTML='<div class="empty">لا توجد منشورات.</div>'; return; }
    el.innerHTML = data.map(p => {
      const link = p.url ? ` • <a href="${p.url}" target="_blank" style="color:#9fb000;font-size:11px">🔗 رابط</a>` : '';
      let iconHtml = '📄';
      if (p.icon) {
        if (p.icon.startsWith('data:image') || p.icon.startsWith('http')) {
          iconHtml = `<img src="${p.icon}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;">`;
        } else {
          iconHtml = p.icon.length > 20 ? p.icon.substring(0,20)+'…' : p.icon;
        }
      }
      return `<div class="pi" id="pi-${p.id}">
        <div class="pi-icon">${iconHtml}</div>
        <div class="pi-info">
          <div class="pi-title">${escapeHtml(p.title)}</div>
          <div class="pi-meta">${escapeHtml(p.description||'')}${link}</div>
          <span class="pi-tag">${escapeHtml(p.tag||p.room)}</span>
        </div>
        <button class="btn-del" onclick="delPost(${p.id},'${p.room}')">🗑️ حذف</button>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML='<div class="empty">خطأ في التحميل.</div>'; }
}

async function delPost(id, room) {
  if (!confirm('هل تريد حذف هذا المنشور؟')) return;
  await fetch(SB+'/posts?id=eq.'+id, { method:'DELETE', headers: HDR });
  document.getElementById('pi-'+id)?.remove();
  loadDashboard();
}

// ==================== دوال جلب يوتيوب المحسّنة ====================
async function fetchYouTubeChannelInfo(url) {
  // قائمة بخوادم Invidious بديلة
  const invidiousInstances = [
    'https://invidious.snopyta.org',
    'https://yewtu.be',
    'https://inv.riverside.rocks',
    'https://invidious.tiekoetter.com',
    'https://invidious.nerdvpn.de',
    'https://iv.ggtyler.dev'
  ];
  
  // دالة لاستخراج المعرف من الرابط
  let channelId = null;
  let handle = null;
  try {
    if (url.includes('/channel/')) {
      channelId = url.split('/channel/')[1]?.split(/[\/?]/)[0];
    } else if (url.includes('/c/')) {
      channelId = url.split('/c/')[1]?.split(/[\/?]/)[0];
    } else if (url.includes('@')) {
      handle = url.split('@')[1]?.split(/[\/?]/)[0];
    } else {
      return null;
    }
  } catch(e) { return null; }

  // المحاولة عبر Invidious
  for (const instance of invidiousInstances) {
    try {
      let apiUrl = '';
      if (channelId) {
        apiUrl = `${instance}/api/v1/channels/${channelId}`;
      } else if (handle) {
        const searchUrl = `${instance}/api/v1/search?q=${handle}&type=channel`;
        const searchRes = await fetch(searchUrl);
        const searchData = await searchRes.json();
        if (searchData && searchData.length > 0) {
          channelId = searchData[0].authorId;
          apiUrl = `${instance}/api/v1/channels/${channelId}`;
        } else continue;
      } else continue;
      const res = await fetch(apiUrl);
      if (res.ok) {
        const data = await res.json();
        if (data && data.author) {
          return {
            title: data.author,
            subscribers: data.subscriberCount ? data.subscriberCount.toLocaleString() : '0',
            thumbnail: data.authorThumbnails?.[0]?.url || null
          };
        }
      }
    } catch(e) { continue; }
  }

  // الحل الاحتياطي: استخدام noembed (يعطي الاسم والصورة فقط)
  try {
    const oembedUrl = `https://noembed.com/embed?url=${encodeURIComponent(url)}`;
    const res = await fetch(oembedUrl);
    if (res.ok) {
      const data = await res.json();
      if (data && data.title) {
        // استخراج اسم القناة من العنوان (قد يكون "YouTube: channel name")
        let title = data.title;
        if (title.startsWith('YouTube: ')) title = title.substring(9);
        return {
          title: title,
          subscribers: '?', // غير متوفر
          thumbnail: data.thumbnail_url || null
        };
      }
    }
  } catch(e) {}

  // فشل كل المحاولات
  return null;
}

// إضافة قناة يوتيوب
async function addYouTubeChannel(room) {
  const urlField = document.getElementById(room+'-url');
  if (!urlField) return;
  const url = urlField.value.trim();
  if (!url) { alert('الرجاء إدخال رابط قناة يوتيوب'); return; }
  
  const info = await fetchYouTubeChannelInfo(url);
  if (!info) {
    alert('تعذر جلب معلومات القناة. تأكد من صحة الرابط وحاول مرة أخرى لاحقاً.\n\nملاحظة: قد تكون القناة غير موجودة أو أن الخدمة محظورة مؤقتاً.');
    return;
  }
  
  const tagField = document.getElementById(room+'-tag');
  const tag = tagField ? tagField.value : 'Channel';
  const contentField = document.getElementById(room+'-content');
  const extraContent = contentField ? contentField.value.trim() : '';
  
  const body = {
    title: info.title,
    description: info.subscribers !== '?' ? `${info.subscribers} مشترك` : 'عدد المشتركين غير متوفر',
    icon: info.thumbnail || '📺',
    url: url,
    tag: tag,
    room: room,
    content: extraContent || null
  };
  
  const btn = document.querySelector('#ap-'+room+' .btn-pub');
  if(btn) { btn.disabled=true; btn.textContent='جاري الإضافة...'; }
  try {
    const r = await fetch(SB + '/posts', {
      method: 'POST',
      headers: { ...HDR, 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      urlField.value = '';
      if (contentField) contentField.value = '';
      const ok = document.getElementById('ok-'+room);
      if (ok) { ok.style.display='block'; setTimeout(()=>ok.style.display='none',3000); }
      loadPosts(room);
      loadDashboard();
    } else {
      const err = await r.json();
      const er = document.getElementById('er-'+room);
      if (er) { er.textContent = '❌ ' + (err.message||err.hint||'خطأ'); er.style.display='block'; setTimeout(()=>er.style.display='none',5000); }
    }
  } catch(e) {
    const er = document.getElementById('er-'+room);
    if (er) { er.textContent = '❌ خطأ في الاتصال بقاعدة البيانات'; er.style.display='block'; setTimeout(()=>er.style.display='none',5000); }
  } finally {
    if(btn) { btn.disabled=false; btn.textContent='➕ إضافة'; }
  }
}

// ==================== دوال إضافية (لإكمال الوظائف) ====================
async function addPost(room) {

}

// ==================== عرض الصفحات ====================
function showPage(id) {
  document.querySelectorAll('.ap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  const target = document.getElementById('ap-' + id);
  if (target) target.classList.add('active');
  const btn = document.getElementById('sb-' + id);
  if (btn) btn.classList.add('active');
  if (id === 'dashboard') {
    loadDashboard();
  } else {
    loadPosts(id);
  }
}
</script>
