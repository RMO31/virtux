<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#0a0000;color:#fff;min-height:100vh;overflow:hidden}
    #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
    #loginPage,#adminPage{position:relative;z-index:1}
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:transparent}
    .login-box{background:rgba(15,0,0,0.92);border:1px solid #cc0000;border-radius:14px;padding:36px 32px;width:340px;text-align:center;backdrop-filter:blur(6px);box-shadow:0 0 40px rgba(200,0,0,0.2)}
    .login-box h1{color:#ff3333;font-size:24px;margin-bottom:6px}
    .login-box p{color:#776;font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #440000;background:#1a0000;color:#fff;font-size:14px;margin-bottom:12px}
    .login-box input:focus{outline:none;border-color:#cc0000}
    .btn-login{width:100%;padding:10px;background:#cc0000;color:#fff;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
    .btn-login:hover{background:#ff3333}
    .err{color:#f55;font-size:12px;margin-top:8px;display:none}
    #adminPage{display:none;height:100vh;flex-direction:column;background:transparent}
    .topbar{background:rgba(10,0,0,0.95);border-bottom:1px solid #cc0000;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(4px)}
    .topbar h1{color:#ff3333;font-size:16px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .conn{font-size:12px;padding:3px 10px;border-radius:4px;background:#0f3d2e;color:#4caf90;border:1px solid #0f6e56}
    .conn.fail{background:#3d0f0f;color:#f55;border-color:#6e0f0f}
    .btn-logout{background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
    .btn-logout:hover{background:#f55;color:#fff}
    .body{display:flex;flex:1;height:calc(100vh - 46px)}
    .sidebar{width:190px;background:rgba(15,0,0,0.92);border-right:1px solid #440000;padding:12px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;backdrop-filter:blur(3px)}
    .sb-btn{background:transparent;border:none;color:#bba;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#3a0000;color:#ff3333}
    .sb-btn.active{border-left:3px solid #ff3333}
    .sb-sec{font-size:10px;color:#665;text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px}
    .main{flex:1;padding:20px;overflow-y:auto;background:rgba(8,0,0,0.88);backdrop-filter:blur(2px)}
    .ap{display:none}
    .ap.active{display:block}
    .page-title{font-size:18px;color:#ff3333;font-weight:700;margin-bottom:16px}
    .card{background:#120000;border:1px solid #330000;border-radius:12px;padding:18px;margin-bottom:18px}
    .card h3{color:#cc0000;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .fg input,.fg select,.fg textarea{padding:9px 12px;border-radius:7px;border:1px solid #440000;background:#1a0000;color:#fff;font-size:13px;width:100%}
    .full{grid-column:1/-1}
    .btn-pub{background:#cc0000;color:#fff;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-pub:hover{background:#ff3333}
    .btn-pub:disabled{background:#333;color:#666;cursor:not-allowed}
    .ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .er{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
    .img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .img-upload input[type=file]{display:none}
    .img-upload label{background:#3a0000;color:#ff3333;border:1px solid #440000;border-radius:7px;padding:8px 12px;font-size:12px;cursor:pointer}
    .img-preview{width:40px;height:40px;border-radius:6px;object-fit:cover;display:none}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
    .stat-card{background:#120000;border:1px solid #330000;border-radius:10px;padding:14px;text-align:center}
    .stat-number{font-size:28px;font-weight:700;color:#ff3333}
    .stat-label{font-size:11px;color:#887;margin-top:4px}
    .posts-list{display:flex;flex-direction:column;gap:8px}
    .pi{background:#1a0000;border:1px solid #330000;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .pi-icon{width:40px;height:40px;border-radius:6px;object-fit:cover;display:flex;align-items:center;justify-content:center;background:#2a0000;font-size:20px}
    .pi-info{flex:1}
    .pi-title{font-size:13px;font-weight:600;color:#ddd}
    .pi-meta{font-size:11px;color:#776;margin-top:2px}
    .pi-tag{display:inline-block;font-size:10px;background:#2a0000;color:#ff3333;border-radius:3px;padding:1px 7px;margin-top:3px}
    .btn-edit{background:#3a0000;border:1px solid #cc0000;color:#ff3333;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-del{background:transparent;border:1px solid #f55;color:#f55;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer}
    .btn-edit:hover{background:#cc0000;color:#fff}
    .btn-del:hover{background:#f55;color:#fff}
    .empty{text-align:center;color:#554;padding:30px;font-size:13px}
    .loading{text-align:center;color:#776;padding:20px;font-size:13px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#120000;border:1px solid #cc0000;border-radius:14px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
    .modal-top{background:#0a0000;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #330000}
    .modal-top h2{font-size:16px;color:#ff3333}
    .modal-close{background:transparent;border:1px solid #556;color:#aaa;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px}
    .modal-body{padding:18px}
    .channel-card-admin{background:#1a0000;border:1px solid #330000;border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .channel-avatar-admin{width:50px;height:50px;border-radius:50%;object-fit:cover}
    .channel-info-admin{flex:1}
    .channel-name-admin{font-size:13px;font-weight:600;color:#ff3333}
    .channel-sub-admin{font-size:11px;color:#aaa}
    .channel-link-admin{color:#cc0000;font-size:11px;text-decoration:none}
    .preview-panel{background:#1a0000;border:1px solid #330000;border-radius:12px;padding:16px;margin-top:16px;display:flex;flex-direction:column;align-items:center}
    .preview-media{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-bottom:12px}
    .preview-buttons{display:flex;gap:8px;justify-content:center}
    .form-with-preview{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
    @media (max-width:768px){.form-with-preview{grid-template-columns:1fr}}
    .role-search-input{width:100%;padding:10px;margin-bottom:10px;border-radius:7px;border:1px solid #440000;background:#1a0000;color:#fff}
    .role-search-results{max-height:200px;overflow-y:auto;margin-bottom:10px}
    .role-search-result-item{background:#1a0000;border:1px solid #330000;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
    .role-buttons button{margin-left:5px;padding:4px 8px;font-size:11px;border-radius:4px;cursor:pointer}
    .recent-member-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #330000}
    .recent-avatar{width:36px;height:36px;border-radius:50%;background:#3a0000;display:flex;align-items:center;justify-content:center;font-size:16px}
    .news-item{display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid #330000}
    .news-text{flex:1;font-size:13px}
    .news-link{font-size:11px;color:#cc0000;text-decoration:none}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div id="loginPage">
  <div class="login-box">
    <h1>🎮 Virtux Admin</h1>
    <p>أدخل كلمة المرور</p>
    <input type="password" id="pw" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="err" id="loginErr">كلمة المرور خاطئة!</div>
  </div>
</div>

<div id="adminPage">
  <div class="topbar">
    <h1>🎮 Virtux Admin Panel</h1>
    <div class="topbar-right">
      <span class="conn" id="connStatus">جارٍ الاتصال...</span>
      <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <button class="sb-btn active" id="sb-dashboard" onclick="showPage('dashboard')">📊 Dashboard</button>
      <div class="sb-sec">الأقسام</div>
      <button class="sb-btn" id="sb-home" onclick="showPage('home')">🏠 Home</button>
      <button class="sb-btn" id="sb-live" onclick="showPage('live')">🔴 Live</button>
      <button class="sb-btn" id="sb-tournaments" onclick="showPage('tournaments')">🏆 Tournaments</button>
      <button class="sb-btn" id="sb-highlights" onclick="showPage('highlights')">🎬 Highlights</button>
      <button class="sb-btn" id="sb-subscribers" onclick="showPage('subscribers')">👥 Subscribers</button>
      <div class="sb-sec">أخبار</div>
      <button class="sb-btn" id="sb-gaming-news" onclick="showPage('gaming-news')">📰 Gaming News</button>
      <button class="sb-btn" id="sb-youtube-news" onclick="showPage('youtube-news')">▶️ Youtube News</button>
      <div class="sb-sec">يوتيوب</div>
      <button class="sb-btn" id="sb-yt-channels" onclick="showPage('yt-channels')">📺 Channels</button>
      <button class="sb-btn" id="sb-yt-videos" onclick="showPage('yt-videos')">🎬 Videos</button>
      <!-- تم حذف زر "🔴 Lives" المكرر -->
      <div class="sb-sec">تعاون</div>
      <button class="sb-btn" id="sb-projects" onclick="showPage('projects')">🌐 Collaboration</button>
    </div>
    <div class="main" id="mainContainer"></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-top"><h2>✏️ تعديل المنشور</h2><button class="modal-close" onclick="closeEditModal()">✕</button></div>
    <div class="modal-body" id="editModalBody"></div>
  </div>
</div>

<script>
// ==================== إعدادات Supabase ====================
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk';
const YOUTUBE_API_KEY = 'AIzaSyDzjcK_PXjTcrfMO6iE2S-PKg35ZLL0WJY';
const ADMIN_PASSWORD = 'virtux2025';

let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentEditPost = null;

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m] || m);
}

// ==================== تسجيل الدخول ====================
async function checkConn() {
  try {
    let res = await fetch(`${SUPABASE_URL}/rest/v1/posts?limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    let el = document.getElementById('connStatus');
    if (res.ok) { el.textContent = '✅ متصل'; el.className = 'conn'; }
    else { el.textContent = '❌ خطأ'; el.className = 'conn fail'; }
  } catch(e) { 
    document.getElementById('connStatus').textContent = '❌ لا إنترنت';
    document.getElementById('connStatus').className = 'conn fail';
  }
}

function login() {
  if (document.getElementById('pw').value === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    checkConn();
    buildPages();
    showPage('dashboard');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout() { window.location.reload(); }

// ==================== بناء الصفحات ====================
function buildPages() {
  let main = document.getElementById('mainContainer');
  main.innerHTML = '';
  // removed 'yt-lives' from rooms list
  let rooms = ['dashboard', 'home', 'live', 'tournaments', 'highlights', 'subscribers', 'gaming-news', 'youtube-news', 'yt-channels', 'yt-videos', 'projects', 'contact'];
  rooms.forEach(room => {
    let div = document.createElement('div');
    div.className = 'ap';
    div.id = `ap-${room}`;
    div.innerHTML = `<div class="page-title">${getRoomTitle(room)}</div><div id="content-${room}">جاري التحميل...</div>`;
    main.appendChild(div);
  });
}
function getRoomTitle(room) {
  let titles = {
    dashboard:'📊 Dashboard', home:'🏠 إدارة الصفحة الرئيسية', live:'🔴 Live', tournaments:'🏆 Tournaments', highlights:'🎬 Highlights',
    subscribers:'👥 Subscribers', 'gaming-news':'📰 Gaming News', 'youtube-news':'▶️ Youtube News',
    'yt-channels':'📺 Youtube Channels', 'yt-videos':'🎬 Youtube Videos',
    projects:'🌐 Collaboration', contact:'📞 Contact'
  };
  return titles[room] || room;
}
function showPage(id) {
  document.querySelectorAll('.ap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  let target = document.getElementById(`ap-${id}`);
  if (target) target.classList.add('active');
  let btn = document.getElementById(`sb-${id}`);
  if (btn) btn.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  else if (id === 'contact') loadContact();
  else loadContentPage(id);
}
function loadContact() {
  let container = document.getElementById('content-contact');
  container.innerHTML = `<div class="card"><h3>معلومات الاتصال</h3><p>بريد: admin@virtux.gg</p><p>ديسكورد: virtux_official</p></div>`;
}

// ==================== Dashboard ====================
async function loadDashboard() {
  let container = document.getElementById('content-dashboard');
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    let { data: users, error } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    if (!users) users = [];
    let total = users.length;
    // Helper: get roles array from user (supports both roles[] array and single role string)
    function getRoles(u) {
      if (Array.isArray(u.roles) && u.roles.length) return u.roles;
      if (u.role) return [u.role];
      return ['user'];
    }
    function hasRole(u, r) { return getRoles(u).includes(r); }

    let vipCount       = users.filter(u => hasRole(u,'vip')).length;
    let memberCount    = users.filter(u => hasRole(u,'member')).length;
    let modCount       = users.filter(u => hasRole(u,'moderator')).length;
    let youtuberCount  = users.filter(u => hasRole(u,'youtuber')).length;
    let ytVipCount     = users.filter(u => hasRole(u,'youtuber_vip')).length;
    let userCount      = users.filter(u => { let r=getRoles(u); return r.length===0||(r.length===1&&r[0]==='user'); }).length;

    let statsHtml = `<div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">👥 إجمالي</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#d4e800">${vipCount}</div><div class="stat-label">👑 VIP</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#4caf90">${memberCount}</div><div class="stat-label">⭐ Member</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#ff9800">${modCount}</div><div class="stat-label">🛡️ Mod</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#ff4444">${youtuberCount}</div><div class="stat-label">🎬 Youtuber</div></div>
      <div class="stat-card"><div class="stat-number" style="color:#ff6b35">${ytVipCount}</div><div class="stat-label">🔥 Youtuber VIP</div></div>
      <div class="stat-card"><div class="stat-number">${userCount}</div><div class="stat-label">👤 عادي</div></div>
    </div>`;

    let recentMembersHtml = `<div class="card"><h3>🆕 آخر الأعضاء المسجلين</h3>`;
    if (users.length) {
      let recent = users.slice(0, 5);
      recentMembersHtml += `<div class="posts-list">`;
      recent.forEach(u => {
        let roleColor = u.role === 'vip' ? '#d4e800' : u.role === 'member' ? '#4caf90' : u.role === 'moderator' ? '#ff9800' : '#aab';
        let roleBg = u.role === 'vip' ? '#2a2000' : u.role === 'member' ? '#0f3d2e' : u.role === 'moderator' ? '#3d2e0f' : '#0f1e55';
        let date = new Date(u.created_at).toLocaleDateString('ar-EG');
        recentMembersHtml += `<div class="recent-member-item">
          <div class="recent-avatar">👤</div>
          <div class="pi-info">
            <div class="pi-title">${escapeHtml(u.username || u.email)}</div>
            <div class="pi-meta">${escapeHtml(u.email)} • ${date}</div>
            <span style="display:inline-block;font-size:11px;background:${roleBg};color:${roleColor};border-radius:4px;padding:2px 8px;">${u.role?.toUpperCase() || 'USER'}</span>
          </div>
        </div>`;
      });
      recentMembersHtml += `</div>`;
    } else {
      recentMembersHtml += `<div class="empty">لا يوجد مستخدمون بعد.</div>`;
    }
    recentMembersHtml += `</div>`;

    let roleManagementHtml = `<div class="card"><h3>🔧 إدارة الصلاحيات (Roles)</h3>
      <input type="text" id="roleSearchInput" class="role-search-input" placeholder="🔍 ابحث باسم المستخدم أو البريد الإلكتروني..." oninput="searchUsersForRole(this.value)">
      <div id="roleSearchResults" class="role-search-results"></div>
      <div style="margin-top:10px;">
        <button class="btn-edit" onclick="refreshDashboard()" style="width:100%;">🔄 تحديث البيانات</button>
      </div>
    </div>`;

    let newsHtml = `<div class="card"><h3>📰 إدارة الأخبار (Ticker)</h3>
      <div class="fg">
        <input class="full" id="newsTitle" placeholder="نص الخبر (مثال: فتح باب التسجيل في البطولة)">
        <input class="full" id="newsUrl" placeholder="رابط (اختياري)">
      </div>
      <button class="btn-pub" onclick="addNews()">➕ إضافة خبر</button>
      <div id="newsList" class="posts-list" style="margin-top:15px;"></div>
    </div>`;

    const ROLE_META = {
      vip:          { label:'👑 VIP',          color:'#d4e800', bg:'#2a2000' },
      member:       { label:'⭐ Member',        color:'#4caf90', bg:'#0f3d2e' },
      moderator:    { label:'🛡️ Mod',          color:'#ff9800', bg:'#3d2e0f' },
      youtuber:     { label:'🎬 Youtuber',      color:'#ff4444', bg:'#3d0f0f' },
      youtuber_vip: { label:'🔥 Youtuber VIP',  color:'#ff6b35', bg:'#3d1a0f' },
      user:         { label:'👤 User',           color:'#aabbcc', bg:'#0f1e55' },
    };
    window._ROLE_META = ROLE_META;

    let fullUsersHtml = `<div class="card"><h3>👥 جميع المستخدمين</h3><div class="posts-list">` + users.map(u => {
      const uid = u.id;
      const userRoles = getRoles(u);
      const badgesHtml = userRoles.map(r => {
        const m = ROLE_META[r] || ROLE_META.user;
        return `<span style="display:inline-block;font-size:10px;background:${m.bg};color:${m.color};border-radius:4px;padding:2px 7px;margin:2px;">${m.label}</span>`;
      }).join('');
      const toggleBtns = Object.keys(ROLE_META).map(r => {
        const has = userRoles.includes(r);
        const m = ROLE_META[r];
        return has
          ? `<button style="font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid ${m.color};background:${m.bg};color:${m.color};cursor:pointer;" onclick="toggleRole(&quot;${uid}&quot;,&quot;${r}&quot;,false)">✕ ${m.label}</button>`
          : `<button style="font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid #334;background:#0a1020;color:#778;cursor:pointer;" onclick="toggleRole(&quot;${uid}&quot;,&quot;${r}&quot;,true)">${m.label}</button>`;
      }).join('');
      return `<div class="pi" id="user-${uid}">
        <div class="pi-icon">👤</div>
        <div class="pi-info" style="flex:1;">
          <div class="pi-title">${escapeHtml(u.username || u.email)}</div>
          <div class="pi-meta">${escapeHtml(u.email)} • ${new Date(u.created_at).toLocaleDateString()}</div>

// دوال إدارة الأخبار
async function loadNewsList() {
  let { data: news, error } = await supabaseClient.from('posts')
    .select('*')
    .eq('room', 'ticker')
    .order('id', { ascending: false });
  if (error) return;
  let container = document.getElementById('newsList');
  if (!container) return;
  if (!news || news.length === 0) {
    container.innerHTML = '<div class="empty">لا توجد أخبار. أضف خبراً الآن.</div>';
    return;
  }
  container.innerHTML = news.map(item => `
    <div class="news-item" id="news-${item.id}">
      <div class="news-text">${escapeHtml(item.title)}</div>
      ${item.url ? `<a href="${item.url}" target="_blank" class="news-link">رابط</a>` : ''}
      <button class="btn-edit" onclick="editNews(${item.id})">✏️</button>
      <button class="btn-del" onclick="deleteNews(${item.id})">🗑️</button>
    </div>

}
async function addNews() {
  let title = document.getElementById('newsTitle').value.trim();
  let url = document.getElementById('newsUrl').value.trim();
  if (!title) { alert('يرجى إدخال نص الخبر'); return; }
  let { error } = await supabaseClient.from('posts').insert({ title, url: url||null, room:'ticker', tag:'news', icon:'📢', content:null });
  if (error) { alert('فشل إضافة الخبر: '+error.message); return; }
  document.getElementById('newsTitle').value = ''; document.getElementById('newsUrl').value = '';
  loadNewsList();
}
async function deleteNews(id) { if(!confirm('حذف الخبر؟')) return; await supabaseClient.from('posts').delete().eq('id', id); loadNewsList(); }
async function editNews(id) {
  let { data, error } = await supabaseClient.from('posts').select('*').eq('id', id).single();
  if (error) return;
  let newTitle = prompt('تعديل نص الخبر:', data.title);
  if (newTitle === null) return;
  let newUrl = prompt('تعديل الرابط (اختياري):', data.url||'');
  await supabaseClient.from('posts').update({ title: newTitle, url: newUrl||null }).eq('id', id);
  loadNewsList();
}
async function searchUsersForRole(query) {
  let resultsDiv = document.getElementById('roleSearchResults');
  if (!query || query.length < 2) { resultsDiv.innerHTML = ''; return; }
  try {
    let { data: users, error } = await supabaseClient.from('profiles')
      .select('id,username,email,role,roles')
      .or(`username.ilike.%${query}%,email.ilike.%${query}%`).limit(10);
    if (error) throw error;
    if (!users || !users.length) { resultsDiv.innerHTML = '<div class="empty" style="padding:10px;">لا يوجد مستخدم مطابق</div>'; return; }
    const RM = window._ROLE_META || { vip:{label:'👑 VIP',color:'#d4e800',bg:'#2a2000'}, member:{label:'⭐ Member',color:'#4caf90',bg:'#0f3d2e'}, moderator:{label:'🛡️ Mod',color:'#ff9800',bg:'#3d2e0f'}, youtuber:{label:'🎬 Youtuber',color:'#ff4444',bg:'#3d0f0f'}, youtuber_vip:{label:'🔥 Youtuber VIP',color:'#ff6b35',bg:'#3d1a0f'}, user:{label:'👤 User',color:'#aabbcc',bg:'#0f1e55'} };
    resultsDiv.innerHTML = users.map(u => {
      const id = u.id;
      const uRoles = Array.isArray(u.roles) && u.roles.length ? u.roles : (u.role ? [u.role] : ['user']);

      const toggleBtns = Object.keys(RM).map(r => {
        const has = uRoles.includes(r); const m = RM[r];
        return has
          ? `<button style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid ${m.color};background:${m.bg};color:${m.color};cursor:pointer;" onclick="toggleRole(&quot;${id}&quot;,&quot;${r}&quot;,false)">✕ ${m.label}</button>`
          : `<button style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #334;background:#0a1020;color:#778;cursor:pointer;" onclick="toggleRole(&quot;${id}&quot;,&quot;${r}&quot;,true)">${m.label}</button>`;
      }).join('');
      return `<div class="role-search-result-item">
        <div><strong>${escapeHtml(u.username||u.email)}</strong><br><small>${escapeHtml(u.email)}</small><br><div style="margin-top:4px;">${badges}</div></div>

      </div>`;
    }).join('');
  } catch(e) { console.error(e); resultsDiv.innerHTML = '<div class="empty">خطأ في البحث</div>'; }
}
function refreshDashboard() { loadDashboard(); }
async function setRole(userId, role) {
  // Legacy: just call toggleRole add
  await toggleRole(userId, role, true);
}
async function toggleRole(userId, role, add) {
  try {
    // Fetch current roles
    const { data: prof, error: fetchErr } = await supabaseClient
      .from('profiles').select('role,roles').eq('id', userId).single();
    if (fetchErr) { alert('❌ فشل جلب بيانات المستخدم: ' + fetchErr.message); return; }

    let currentRoles = Array.isArray(prof.roles) && prof.roles.length
      ? [...prof.roles]
      : (prof.role ? [prof.role] : ['user']);

    if (add) {
      if (!currentRoles.includes(role)) currentRoles.push(role);
      // Remove plain 'user' if adding a real role
      if (currentRoles.length > 1) currentRoles = currentRoles.filter(r => r !== 'user');
    } else {
      currentRoles = currentRoles.filter(r => r !== role);
      if (currentRoles.length === 0) currentRoles = ['user'];
    }

    const primaryRole = currentRoles[0];
    const { error } = await supabaseClient.from('profiles')
      .update({ roles: currentRoles, role: primaryRole })
      .eq('id', userId);
    if (error) { alert('❌ فشل تغيير الرول: ' + error.message); console.error(error); return; }
    await loadDashboard();
  } catch(e) { alert('❌ خطأ: ' + e.message); console.error(e); }
}
async function deleteUser(userId) {
  if (!confirm('حذف المستخدم نهائياً؟ لا يمكن التراجع')) return;
  try {
    const { error } = await supabaseClient.from('profiles').delete().eq('id', userId);
    if (error) { alert('❌ فشل الحذف: ' + error.message + '\n\nتأكد أن RLS policy تسمح بالحذف للأدمن'); console.error(error); return; }
    alert('✅ تم حذف المستخدم');
    await loadDashboard();
  } catch(e) { alert('❌ خطأ: ' + e.message); console.error(e); }
}

function clearMedia(room) {
  if (room !== 'highlights' && room !== 'home' && room !== 'projects' && room !== 'gaming-news' && room !== 'youtube-news' && room !== 'live' && room !== 'tournaments') return;
  const previewImg = document.getElementById(`preview-img-${room}`);
  const previewVideo = document.getElementById(`preview-video-${room}`);
  const previewText = document.getElementById(`preview-text-${room}`);
  if (previewImg) previewImg.style.display = 'none';
  if (previewVideo) previewVideo.style.display = 'none';
  if (previewText) previewText.style.display = 'block';
  document.getElementById(`url-${room}`).value = '';
  document.getElementById(`icon-${room}`).value = '';
  document.getElementById(`imgfile-${room}`).value = '';
  document.getElementById(`videofile-${room}`).value = '';
  delete document.getElementById(`icon-${room}`)._imgData;
}
function handleImageUpload(room) {
  const fileInput = document.getElementById(`imgfile-${room}`);
  const file = fileInput?.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const previewImg = document.getElementById(`preview-img-${room}`);
    const previewVideo = document.getElementById(`preview-video-${room}`);
    const previewText = document.getElementById(`preview-text-${room}`);
    if (previewImg) { previewImg.src = e.target.result; previewImg.style.display = 'block'; }
    if (previewVideo) previewVideo.style.display = 'none';
    if (previewText) previewText.style.display = 'none';
    const iconField = document.getElementById(`icon-${room}`);
    iconField.value = '🖼️';
    iconField._imgData = e.target.result;
    document.getElementById(`url-${room}`).value = '';
  };
  reader.readAsDataURL(file);
}
async function uploadVideoToBucket(room) {
  let fileInput = document.getElementById(`videofile-${room}`);
  let file = fileInput?.files[0];
  if (!file) { alert('لم تختر ملفاً'); return; }
  if (!file.type.startsWith('video/')) { alert('الملف المختار ليس فيديو'); return; }
  let fileName = Date.now() + '_' + file.name;
  fileName = fileName.replace(/\s/g, '_').replace(/[^a-zA-Z0-9._-]/g, '');
  let filePath = `highlights/${fileName}`;
  let uploadUrl = `${SUPABASE_URL}/storage/v1/object/videos/${filePath}`;
  let btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  try {
    let res = await fetch(uploadUrl, { method: 'POST', headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` }, body: file });
    if (res.ok) {
      let publicUrl = `${SUPABASE_URL}/storage/v1/object/public/videos/${filePath}`;
      document.getElementById(`url-${room}`).value = publicUrl;
      let titleField = document.getElementById(`title-${room}`);
      if (titleField && !titleField.value.trim()) titleField.value = file.name.replace(/\.[^/.]+$/, '');
      const previewImg = document.getElementById(`preview-img-${room}`);
      const previewVideo = document.getElementById(`preview-video-${room}`);
      const previewText = document.getElementById(`preview-text-${room}`);
      if (previewImg) previewImg.style.display = 'none';
      if (previewVideo) { previewVideo.src = publicUrl; previewVideo.style.display = 'block'; }
      if (previewText) previewText.style.display = 'none';
      document.getElementById(`icon-${room}`).value = '';
      delete document.getElementById(`icon-${room}`)._imgData;
      alert('✅ تم رفع الفيديو! الرابط جاهز.');
    } else { let errText = await res.text(); alert('❌ فشل الرفع: ' + errText); }
  } catch(e) { alert('خطأ: ' + e.message); }
  finally { if (btn) btn.disabled = false; }
}
async function addPost(room) {
  const titleEl = document.getElementById(`title-${room}`);
  const urlEl = document.getElementById(`url-${room}`);
  const descEl = document.getElementById(`desc-${room}`);
  const contentEl = document.getElementById(`content-${room}`);
  const iconEl = document.getElementById(`icon-${room}`);
  const tagEl = document.getElementById(`tag-${room}`);
  function getSafeValue(el) { if (!el) return ''; if (el.value === undefined) return ''; return (el.value || '').trim(); }
  let title = getSafeValue(titleEl);
  let url = getSafeValue(urlEl);
  let desc = getSafeValue(descEl);
  let content = getSafeValue(contentEl);
  let icon = getSafeValue(iconEl);
  let tag = tagEl ? tagEl.value : room;
  let imgData = iconEl?._imgData || '';
  if (imgData) icon = imgData;
  const hasImage = (icon && (icon.startsWith('data:') || icon.startsWith('http'))) || (url && url.match(/\.(jpg|jpeg|png|gif|webp)$/i));
  const hasVideo = url && (url.match(/\.(mp4|webm|avi|mov|mkv|flv|wmv|m4v|mpg|mpeg|3gp)$/i) || url.includes('/storage/v1/object/public/videos/') || url.includes('youtube.com') || url.includes('youtu.be'));
  if (room === 'highlights') {
    if (tag === 'Photo') { if (!hasImage) { showError(room, '❌ عند اختيار "صورة"، يجب رفع صورة أو إضافة رابط صورة.'); return; } }
    else if (tag === 'Video') { if (!hasVideo) { showError(room, '❌ عند اختيار "فيديو"، يجب رفع فيديو أو إضافة رابط يوتيوب.'); return; } }
    else { if (!hasImage && !hasVideo) { showError(room, '❌ في Pro / Tournament، يجب رفع صورة أو فيديو.'); return; } }
  } else if (room === 'home') {
    if (tag === 'Photo') { if (!hasImage) { showError(room, '❌ يجب رفع صورة أو إضافة رابط صورة.'); return; } }
    else if (tag === 'Video') { if (!hasVideo) { showError(room, '❌ يجب رفع فيديو أو إضافة رابط يوتيوب.'); return; } }
    else { if (!title && !desc && !content && !url && !icon) { showError(room, '❌ المقال فارغ. أدخل عنواناً أو محتوى.'); return; } }
  } else if (room === 'projects') {
    if (tag === 'Photo') { if (!hasImage) { showError(room, '❌ يجب رفع صورة أو إضافة رابط صورة.'); return; } }
    else if (tag === 'Video') { if (!hasVideo) { showError(room, '❌ يجب رفع فيديو أو إضافة رابط يوتيوب.'); return; } }
    else { if (!title && !url && !icon && !content) { showError(room, '❌ المشروع فارغ. أدخل عنواناً أو وسائط.'); return; } }
  } else if (room === 'gaming-news' || room === 'youtube-news' || room === 'live' || room === 'tournaments') {
    if (tag === 'Photo') { if (!hasImage) { showError(room, '❌ يجب رفع صورة أو إضافة رابط صورة.'); return; } }
    else if (tag === 'Video') { if (!hasVideo) { showError(room, '❌ يجب رفع فيديو أو إضافة رابط يوتيوب.'); return; } }
    else { if (!title && !desc && !content && !url && !icon) { showError(room, '❌ المنشور فارغ. أدخل عنواناً أو محتوى.'); return; } }
  } else {
    if (!title && !url && !icon) { showError(room, '❌ المنشور فارغ. أدخل عنواناً أو رابطاً أو صورة.'); return; }
  }
  if (!title && (url || icon)) title = room === 'highlights' ? '🎬 مقطع' : (room === 'home' ? '📄 مقال' : (room === 'projects' ? '🌐 مشروع' : (room === 'gaming-news' ? '📰 خبر' : (room === 'youtube-news' ? '▶️ خبر' : (room === 'live' ? '🔴 بث' : (room === 'tournaments' ? '🏆 بطولة' : '📄 منشور'))))));
  const body = { title, description: desc, icon: icon || '📄', url, tag, room, content };
  const btn = document.querySelector(`#ap-${room} .btn-pub`);
  if (btn) btn.disabled = true;
  try {
    const { error } = await supabaseClient.from('posts').insert(body);
    if (error) throw error;
    const okDiv = document.getElementById(`ok-${room}`);
    if (okDiv) { okDiv.style.display = 'block'; setTimeout(() => okDiv.style.display = 'none', 2000); }
    if (titleEl) titleEl.value = '';
    if (descEl) descEl.value = '';
    if (urlEl) urlEl.value = '';
    if (iconEl) iconEl.value = '';
    if (contentEl) contentEl.value = '';
    const fileInput = document.getElementById(`imgfile-${room}`);
    if (fileInput) fileInput.value = '';
    const videoInput = document.getElementById(`videofile-${room}`);
    if (videoInput) videoInput.value = '';
    const previewImg = document.getElementById(`preview-img-${room}`);
    const previewVideo = document.getElementById(`preview-video-${room}`);
    const previewText = document.getElementById(`preview-text-${room}`);
    if (previewImg) previewImg.style.display = 'none';
    if (previewVideo) previewVideo.style.display = 'none';
    if (previewText) previewText.style.display = 'block';
    loadContentPage(room);
    loadDashboard();
  } catch (e) { showError(room, e.message); }
  finally { if (btn) btn.disabled = false; }
}
function showError(room, msg) { let er = document.getElementById(`er-${room}`); if (er) { er.textContent = msg; er.style.display = 'block'; setTimeout(() => er.style.display = 'none', 4000); } else alert(msg); }
async function deletePost(id, room) { if (!confirm('حذف المنشور نهائياً؟')) return; await supabaseClient.from('posts').delete().eq('id', id); loadContentPage(room); loadDashboard(); }

  else if (room === 'home') opts = `<option value="Article">📄 مقال</option><option value="Photo">🖼️ صورة</option><option value="Video">🎬 فيديو</option>`;
  else if (room === 'projects') opts = `<option value="Project">🌐 مشروع</option><option value="Video">🎬 فيديو</option><option value="Photo">🖼️ صورة</option>`;
  else if (room === 'gaming-news') opts = `<option value="News">📰 خبر</option><option value="Video">🎬 فيديو</option><option value="Photo">🖼️ صورة</option><option value="VIP">👑 VIP</option>`;
  else if (room === 'youtube-news') opts = `<option value="Youtube News">▶️ خبر يوتيوب</option><option value="Video">🎬 فيديو</option><option value="Photo">🖼️ صورة</option>`;
  else if (room === 'subscribers') opts = `<option value="Youtuber">🔔 Youtuber</option><option value="Youtuber VIP">👑 VIP</option>`;

async function fetchYouTubeChannelInfo(url) {
  try { let handle = url.split('@')[1]?.split(/[\/?]/)[0]; if (!handle) return null; let apiUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${handle}&key=${YOUTUBE_API_KEY}`; let res = await fetch(apiUrl); let data = await res.json(); if (data.items && data.items[0]) return { title: data.items[0].snippet.title, subscribers: data.items[0].statistics.subscriberCount?.toLocaleString() || '0', thumbnail: data.items[0].snippet.thumbnails?.high?.url }; return null; } catch(e) { return null; }
}
async function addYouTubeChannel(room) {
  let url = document.getElementById(`url-${room}`).value.trim();
  if (!url) { alert('أدخل رابط القناة'); return; }
  let btn = document.querySelector(`#ap-${room} .btn-pub`) || document.querySelector('.btn-pub');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ الإضافة...'; }
  try {
    let info = await fetchYouTubeChannelInfo(url);
    if (!info) { alert('تعذر جلب معلومات القناة'); return; }
    let extraContent = document.getElementById(`content-${room}`)?.value.trim() || '';
    let body = { title: info.title, description: `${info.subscribers} مشترك`, icon: info.thumbnail || '📺', url: url, tag: room === 'yt-channels' ? 'Channel' : (document.getElementById(`tag-${room}`)?.value || 'Youtuber'), room: room, content: extraContent };
    let { error } = await supabaseClient.from('posts').insert(body);
    if (error) throw error;

    // ── جلب فوري: فيديوهات + بث مباشر + قبل بث ──
    let handle = url.split('@')[1]?.split(/[\/?]/)[0];
    if (handle) {
      if (btn) btn.textContent = '📥 جاري تنزيل المحتوى...';
      let chInfo = await getChannelId(handle);
      if (chInfo) {
        // فيديوهات
        let videos = await fetchLatestVideos(chInfo.id, 5);
        let vCount = 0;
        for (let v of videos) { if (await saveToDb(v, 'yt-videos', 'Video')) vCount++; }
        // بث مباشر
        let live = await fetchLiveStream(chInfo.id);
        let lCount = 0;
        if (live) { if (await saveToDb(live, 'live', 'Live Now')) lCount++; }
        // قبل بث
        let upcoming = await fetchUpcomingStream(chInfo.id);
        let uCount = 0;
        if (upcoming) { if (await saveToDb(upcoming, 'live', 'Pre Lives')) uCount++; }
        console.log(`✅ ${chInfo.title}: ${vCount} فيديو | ${lCount} بث | ${uCount} قبل بث`);
      }
    }

    document.getElementById(`url-${room}`).value = '';

async function getChannelId(handle) {
  try {
    let res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id,snippet&forHandle=${handle}&key=${YOUTUBE_API_KEY}`);
    let d = await res.json();
    if (d.items?.[0]) return { id: d.items[0].id, title: d.items[0].snippet.title };
  } catch(e) {}
  return null;
}

// جلب آخر فيديوهات عادية
async function fetchLatestVideos(channelId, maxResults = 5, publishedAfter = null) {
  try {
    let extra = publishedAfter ? `&publishedAfter=${encodeURIComponent(publishedAfter)}` : '';
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=${maxResults}&order=date&type=video&eventType=none${extra}&key=${YOUTUBE_API_KEY}`);
    let d = await res.json();
    return (d.items || []).map(v => ({
      videoId:     v.id.videoId,
      title:       v.snippet.title,
      channelName: v.snippet.channelTitle,
      thumbnail:   v.snippet.thumbnails?.high?.url || '',
      publishedAt: v.snippet.publishedAt,
      videoUrl:    `https://www.youtube.com/watch?v=${v.id.videoId}`,
      type:        'video'
    }));
  } catch(e) { return []; }
}

// جلب بث مباشر حالي
async function fetchLiveStream(channelId) {
  try {
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=live&type=video&key=${YOUTUBE_API_KEY}`);
    let d = await res.json();
    if (!d.items?.length) return null;
    let v = d.items[0];
    return {
      videoId:     v.id.videoId,
      title:       v.snippet.title,
      channelName: v.snippet.channelTitle,
      thumbnail:   v.snippet.thumbnails?.high?.url || '',
      publishedAt: v.snippet.publishedAt,
      videoUrl:    `https://www.youtube.com/watch?v=${v.id.videoId}`,
      type:        'live'
    };
  } catch(e) { return null; }
}

// جلب بث قادم (scheduled)
async function fetchUpcomingStream(channelId) {
  try {
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=upcoming&type=video&key=${YOUTUBE_API_KEY}`);
    let d = await res.json();
    if (!d.items?.length) return null;
    let v = d.items[0];
    return {
      videoId:     v.id.videoId,
      title:       v.snippet.title,
      channelName: v.snippet.channelTitle,
      thumbnail:   v.snippet.thumbnails?.high?.url || '',
      publishedAt: v.snippet.publishedAt,
      videoUrl:    `https://www.youtube.com/watch?v=${v.id.videoId}`,
      type:        'upcoming'
    };
  } catch(e) { return null; }
}

// حفظ في DB مع منع التكرار
async function saveToDb(item, room, tag) {
  let { data: existing } = await supabaseClient.from('posts')
    .select('id').eq('url', item.videoUrl).limit(1);
  if (existing?.length) return false;
  await supabaseClient.from('posts').insert({
    title:       item.title,
    description: item.channelName,
    icon:        item.thumbnail || (tag === 'Live Now' ? '🔴' : tag === 'Pre Lives' ? '⏰' : '📹'),
    url:         item.videoUrl,
    tag:         tag,
    room:        room,
    content:     item.publishedAt || ''
  });
  return true;
}

// الفحص الشامل لكل القنوات
async function autoCheckAllChannels() {
  try {
    let { data: channels } = await supabaseClient.from('posts')
      .select('*').eq('room', 'yt-channels').eq('tag', 'Channel');
    if (!channels?.length) return;

    let newVideos = 0, newLive = 0, newUpcoming = 0;

    for (let ch of channels) {
      let handle = ch.url?.split('@')[1]?.split(/[\/?]/)[0];
      if (!handle) continue;
      let chInfo = await getChannelId(handle);
      if (!chInfo) continue;

      // ── فيديوهات عادية ──
      let { data: lastVid } = await supabaseClient.from('posts')
        .select('content').eq('room', 'yt-videos').eq('description', chInfo.title)
        .eq('tag', 'Video').order('id', { ascending: false }).limit(1);
      let publishedAfter = lastVid?.[0]?.content || null;
      let videos = await fetchLatestVideos(chInfo.id, 10, publishedAfter);
      for (let v of videos) { if (await saveToDb(v, 'yt-videos', 'Video')) newVideos++; }

      // ── بث مباشر حالي → يُحفظ في غرفة live بـ tag "Live Now" ──
      let live = await fetchLiveStream(chInfo.id);
      if (live) { if (await saveToDb(live, 'live', 'Live Now')) newLive++; }

      // ── بث قادم → يُحفظ في غرفة live بـ tag "Pre Lives" ──
      let upcoming = await fetchUpcomingStream(chInfo.id);
      if (upcoming) { if (await saveToDb(upcoming, 'live', 'Pre Lives')) newUpcoming++; }
    }

    let total = newVideos + newLive + newUpcoming;
    if (total > 0) {
      console.log(`✅ جديد: ${newVideos} فيديو | ${newLive} بث مباشر | ${newUpcoming} قبل بث`);
      if (document.getElementById('content-yt-videos')) loadContentPage('yt-videos');
      if (document.getElementById('content-live'))      loadContentPage('live');
    }
  } catch(e) { console.error('autoCheck error:', e); }
}

let _autoCheckInterval = null;
function startAutoCheck() {
  if (_autoCheckInterval) clearInterval(_autoCheckInterval);
  autoCheckAllChannels();
  _autoCheckInterval = setInterval(autoCheckAllChannels, 15 * 60 * 1000);
}

<script>
// ===== 3D SPACE TUNNEL + FLOATING CUBES BACKGROUND =====
(function() {
  const canvas = document.getElementById('bgCanvas');
  if (!canvas) return;
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) {
    // Fallback: 2D canvas 3D effect
    fallback2D(canvas);
    return;
  }

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  // Vertex shader
  const vsSource = `
    attribute vec3 aPos;
    attribute vec3 aColor;
    uniform mat4 uMVP;
    varying vec3 vColor;
    varying float vDepth;
    void main() {
      vec4 pos = uMVP * vec4(aPos, 1.0);
      gl_Position = pos;
      vColor = aColor;
      vDepth = pos.z;
    }
  `;
  const fsSource = `
    precision mediump float;
    varying vec3 vColor;
    varying float vDepth;
    void main() {
      float fog = clamp(1.0 - vDepth * 0.18, 0.0, 1.0);
      gl_FragColor = vec4(vColor * fog, fog * 0.92);
    }
  `;

  function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vsSource));
  gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fsSource));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const aPos = gl.getAttribLocation(prog, 'aPos');
  const aColor = gl.getAttribLocation(prog, 'aColor');
  const uMVP = gl.getUniformLocation(prog, 'uMVP');

  // Math helpers
  function mat4() { return new Float32Array(16); }
  function identity(m) {
    m[0]=1;m[1]=0;m[2]=0;m[3]=0;
    m[4]=0;m[5]=1;m[6]=0;m[7]=0;
    m[8]=0;m[9]=0;m[10]=1;m[11]=0;
    m[12]=0;m[13]=0;m[14]=0;m[15]=1;
    return m;
  }
  function perspective(m, fov, aspect, near, far) {
    const f = 1.0 / Math.tan(fov / 2);
    const nf = 1 / (near - far);
    m[0]=f/aspect; m[1]=0; m[2]=0; m[3]=0;
    m[4]=0; m[5]=f; m[6]=0; m[7]=0;
    m[8]=0; m[9]=0; m[10]=(far+near)*nf; m[11]=-1;
    m[12]=0; m[13]=0; m[14]=2*far*near*nf; m[15]=0;
    return m;
  }
  function multiply(out, a, b) {
    for(let i=0;i<4;i++) for(let j=0;j<4;j++) {
      out[j*4+i]=0;
      for(let k=0;k<4;k++) out[j*4+i]+=a[k*4+i]*b[j*4+k];
    }
    return out;
  }
  function rotateY(m, angle) {
    const c=Math.cos(angle), s=Math.sin(angle);
    const r=identity(mat4());
    r[0]=c; r[2]=s; r[8]=-s; r[10]=c;
    return multiply(mat4(), m, r);
  }
  function rotateX(m, angle) {
    const c=Math.cos(angle), s=Math.sin(angle);
    const r=identity(mat4());
    r[5]=c; r[6]=-s; r[9]=s; r[10]=c;
    return multiply(mat4(), m, r);
  }
  function translate(m, tx, ty, tz) {
    const r=identity(mat4());
    r[12]=tx; r[13]=ty; r[14]=tz;
    return multiply(mat4(), m, r);
  }

  // Cube geometry
  function makeCubeEdges(cx, cy, cz, size, r, g, b) {
    const s = size/2;
    const verts = [
      [cx-s,cy-s,cz-s],[cx+s,cy-s,cz-s],[cx+s,cy+s,cz-s],[cx-s,cy+s,cz-s],
      [cx-s,cy-s,cz+s],[cx+s,cy-s,cz+s],[cx+s,cy+s,cz+s],[cx-s,cy+s,cz+s]
    ];
    const edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    const pos = [], col = [];
    edges.forEach(([a,b]) => {
      pos.push(...verts[a], ...verts[b]);
      col.push(r,g,b, r,g,b);
    });
    return {pos, col};
  }

  // Generate floating cubes
  function randomColor() {
    const palettes = [
      [0.9, 0.0, 0.0],   // red
      [1.0, 0.2, 0.1],   // bright red
      [0.7, 0.0, 0.0],   // dark red
      [0.5, 0.0, 0.0],   // deep red
      [1.0, 0.1, 0.0],   // red-orange
      [0.8, 0.05, 0.05],  // crimson
    ];
    return palettes[Math.floor(Math.random()*palettes.length)];
  }

  const numCubes = 60;
  const cubes = Array.from({length: numCubes}, () => ({
    x: (Math.random()-0.5)*20,
    y: (Math.random()-0.5)*20,
    z: -Math.random()*40,
    size: 0.3 + Math.random()*1.2,
    rx: Math.random()*Math.PI*2,
    ry: Math.random()*Math.PI*2,
    rz: Math.random()*Math.PI*2,
    drx: (Math.random()-0.5)*0.015,
    dry: (Math.random()-0.5)*0.02,
    drz: (Math.random()-0.5)*0.012,
    speed: 0.04 + Math.random()*0.06,
    color: randomColor()
  }));

  // Star particles (3D)
  const stars3d = Array.from({length:300}, () => ({
    x: (Math.random()-0.5)*50,
    y: (Math.random()-0.5)*50,
    z: -Math.random()*60
  }));

  // Grid tunnel rings
  const tunnelRings = Array.from({length:20}, (_, i) => ({
    z: -i*3.5,
    angle: i*0.1
  }));

  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  let t = 0;

  function buildAndDrawBuffer(positions, colors, mode) {
    if(positions.length === 0) return;
    const posBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(aPos);

    const colBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(colors), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(aColor);

    gl.drawArrays(mode, 0, positions.length/3);
    gl.deleteBuffer(posBuf);
    gl.deleteBuffer(colBuf);
  }

  function drawCubeEdges(cube, proj, view) {
    const s = cube.size/2;
    const verts = [
      [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
      [-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]
    ];
    const edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];

    let model = identity(mat4());
    model = rotateX(model, cube.rx);
    model = rotateY(model, cube.ry);
    model[12] = cube.x; model[13] = cube.y; model[14] = cube.z;

    const mvp = multiply(mat4(), proj, multiply(mat4(), view, model));
    gl.uniformMatrix4fv(uMVP, false, mvp);

    const pos=[], col=[];
    const [r,g,b] = cube.color;
    edges.forEach(([a,bb]) => {
      pos.push(...verts[a], ...verts[bb]);
      col.push(r,g,b, r,g,b);
    });
    buildAndDrawBuffer(pos, col, gl.LINES);
  }

  function drawTunnelRing(ring, proj, view) {
    const segs = 16;
    const radius = 6 + Math.sin(t*0.5+ring.z*0.1)*1.5;
    const pos=[], col=[];
    for(let i=0; i<segs; i++) {
      const a1 = (i/segs)*Math.PI*2 + ring.angle;
      const a2 = ((i+1)/segs)*Math.PI*2 + ring.angle;
      pos.push(Math.cos(a1)*radius, Math.sin(a1)*radius, ring.z);
      pos.push(Math.cos(a2)*radius, Math.sin(a2)*radius, ring.z);
      const glow = 0.3+0.5*Math.abs(Math.sin(t*0.8+i*0.4));
      col.push(glow, glow*0.1, 0);
      col.push(glow, glow*0.1, 0);
    }
    let model = identity(mat4());
    const mvp = multiply(mat4(), proj, multiply(mat4(), view, model));
    gl.uniformMatrix4fv(uMVP, false, mvp);
    buildAndDrawBuffer(pos, col, gl.LINES);
  }

  function drawStars(proj, view) {
    const pos=[], col=[];
    stars3d.forEach(s => {
      pos.push(s.x, s.y, s.z);
      const br = 0.5+0.5*Math.sin(t*2+s.x+s.y);
      col.push(br, br, br);
    });
    let model = identity(mat4());
    const mvp = multiply(mat4(), proj, multiply(mat4(), view, model));
    gl.uniformMatrix4fv(uMVP, false, mvp);
    gl.vertexAttribPointer;
    const posBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(pos), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(aPos);
    const colBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(col), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(aColor);
    gl.drawArrays(gl.POINTS, 0, pos.length/3);
    gl.deleteBuffer(posBuf);
    gl.deleteBuffer(colBuf);
  }

  function animate() {
    t += 0.016;
    const W = canvas.width, H = canvas.height;
    gl.clearColor(0.04, 0.0, 0.0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    const proj = perspective(mat4(), 0.9, W/H, 0.1, 80);
    const camZ = t * 0.4;
    const camX = Math.sin(t*0.15)*1.2;
    const camY = Math.cos(t*0.12)*0.8;

    let view = identity(mat4());
    view[12] = -camX; view[13] = -camY; view[14] = 2;

    // Draw stars
    drawStars(proj, view);

    // Draw tunnel rings
    tunnelRings.forEach(ring => {
      ring.z += 0.04;
      ring.angle += 0.004;
      if(ring.z > 4) ring.z -= 20*3.5/tunnelRings.length + 70;
      drawTunnelRing(ring, proj, view);
    });

    // Draw cubes
    cubes.forEach(cube => {
      cube.z += cube.speed;
      cube.rx += cube.drx;
      cube.ry += cube.dry;
      cube.rz += cube.drz;
      if(cube.z > 5) {
        cube.z = -40 - Math.random()*20;
        cube.x = (Math.random()-0.5)*20;
        cube.y = (Math.random()-0.5)*20;
        cube.color = randomColor();
      }
      drawCubeEdges(cube, proj, view);
    });

    // Draw connecting lines between nearby cubes
    const linPos=[], linCol=[];
    for(let i=0; i<cubes.length; i++) {
      for(let j=i+1; j<cubes.length; j++) {
        const dx=cubes[i].x-cubes[j].x, dy=cubes[i].y-cubes[j].y, dz=cubes[i].z-cubes[j].z;
        const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(dist < 3.5) {
          const alpha = (1-dist/3.5)*0.4;
          linPos.push(cubes[i].x,cubes[i].y,cubes[i].z, cubes[j].x,cubes[j].y,cubes[j].z);
          linCol.push(alpha,alpha*0.1,0, alpha,alpha*0.1,0);
        }
      }
    }
    if(linPos.length > 0) {
      let model = identity(mat4());
      const mvp = multiply(mat4(), proj, multiply(mat4(), view, model));
      gl.uniformMatrix4fv(uMVP, false, mvp);
      buildAndDrawBuffer(linPos, linCol, gl.LINES);
    }

    requestAnimationFrame(animate);
  }

  animate();

  // 2D fallback
  function fallback2D(c) {
    const ctx = c.getContext('2d');
    function resz() { c.width=window.innerWidth; c.height=window.innerHeight; }
    resz(); window.addEventListener('resize', resz);
    const pts = Array.from({length:120}, ()=>({
      x:Math.random(), y:Math.random(),
      vx:(Math.random()-0.5)*0.002, vy:(Math.random()-0.5)*0.002,
      r:Math.random()*2+1,
      c:`hsl(${Math.random()*20},100%,${50+Math.random()*30}%)`
    }));
    function frame() {
      ctx.fillStyle='rgba(10,0,0,0.18)';
      ctx.fillRect(0,0,c.width,c.height);
      pts.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>1) p.vx*=-1;
        if(p.y<0||p.y>1) p.vy*=-1;
        ctx.fillStyle=p.c;
        ctx.beginPath();
        ctx.arc(p.x*c.width,p.y*c.height,p.r,0,Math.PI*2);
        ctx.fill();
      });
      pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
        const dx=(a.x-b.x)*c.width, dy=(a.y-b.y)*c.height;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){ctx.strokeStyle=`rgba(220,30,0,${(1-d/120)*0.3})`;ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(a.x*c.width,a.y*c.height);ctx.lineTo(b.x*c.width,b.y*c.height);ctx.stroke();}
      }));
      requestAnimationFrame(frame);
    }
    frame();
  }
})();

// بدء الفحص التلقائي كل 15 دقيقة
setTimeout(startAutoCheck, 3000);
</script>
