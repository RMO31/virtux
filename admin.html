<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
    .vx-root{display:flex;flex-direction:column;min-height:100vh}
    .vx-topbar{display:flex;align-items:center;padding:10px 18px;background:#000;border-bottom:1px solid #d4af37;gap:12px;flex-wrap:wrap}
    .vx-logo{font-size:22px;font-weight:700;color:#d4af37;letter-spacing:2px}
    .vx-logo span{color:#fff;font-weight:400}
    .vx-topnav{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
    .dd{position:relative}
    .dd-btn{background:transparent;border:1px solid #d4af37;color:#d4af37;padding:5px 14px;border-radius:5px;font-size:13px;cursor:pointer}
    .dd-btn:hover{background:#d4af37;color:#000}
    .dd-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:#1a1a1a;border:1px solid #d4af37;border-radius:6px;min-width:170px;z-index:999}
    .dd.open .dd-menu{display:block}
    .dd-menu a{display:block;color:#ccc;padding:9px 16px;font-size:13px;cursor:pointer;border-bottom:1px solid #333;text-decoration:none}
    .dd-menu a:last-child{border-bottom:none}
    .dd-menu a:hover{background:#d4af37;color:#000}
    .vx-ticker{background:#000;padding:5px 16px;display:flex;align-items:center;gap:10px;overflow:hidden}
    .ticker-label{font-size:11px;background:#d4af37;color:#000;padding:2px 8px;border-radius:3px;font-weight:700;white-space:nowrap}
    .ticker-track{display:flex;gap:30px;animation:ticker 28s linear infinite;white-space:nowrap}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .ticker-item{font-size:12px;color:#99aabb}
    .ticker-item span{color:#d4af37}
    .vx-body{display:flex;flex:1}
    .vx-sidebar{width:180px;background:linear-gradient(180deg,#1a1a1a,#2a2a2a);border-right:1px solid #d4af37;display:flex;flex-direction:column;gap:4px;padding:10px 6px}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#d4af37;color:#000}
    .sb-btn.active{border-left:3px solid #d4af37}
    .sb-section{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:1px;padding:8px 12px 2px}
    .vx-main{flex:1;max-height:calc(100vh - 84px);overflow-y:auto;padding:20px}
    .admin-welcome{background:#1e1e2e;border:1px solid #d4af37;border-radius:12px;padding:30px;text-align:center}
    .admin-welcome h2{color:#d4af37;margin-bottom:15px}
    .post-btn-large{background:#d4af37;color:#000;border:none;border-radius:8px;padding:12px 24px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:20px}
    .post-btn-large:hover{background:#e6c300}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,4,0.85);z-index:500;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#1e1e2e;border:1px solid #d4af37;border-radius:14px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
    .modal-top{background:#000;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333}
    .modal-top h2{font-size:16px;color:#d4af37}
    .modal-close{background:transparent;border:1px solid #555;color:#aaa;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px}
    .modal-body{padding:18px}
    .mf-group{margin-bottom:12px}
    .mf-group label{display:block;font-size:11px;color:#d4af37;margin-bottom:5px}
    .mf-group input,.mf-group select,.mf-group textarea{width:100%;padding:9px 12px;border-radius:7px;border:1px solid #444;background:#2a2a3a;color:#fff;font-size:13px}
    .mf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mf-img-upload{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .mf-img-label{background:#2a2a3a;color:#d4af37;border:1px solid #444;border-radius:6px;padding:7px 12px;font-size:12px;cursor:pointer}
    .mf-img-preview{width:50px;height:50px;border-radius:6px;object-fit:cover;display:none}
    .btn-submit{width:100%;padding:10px;background:#d4af37;color:#000;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
    .modal-ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90;border-radius:7px;padding:9px 14px;margin-bottom:12px;display:none}
    .modal-err{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55;border-radius:7px;padding:9px 14px;margin-bottom:12px;display:none}
  </style>
</head>
<body>
<div class="vx-root">
  <div class="vx-topbar">
    <div class="vx-logo">VIRT<span>UX</span> <span style="font-size:12px; color:#d4af37;">| Admin</span></div>
    <div class="vx-topnav">
      <div id="area-guest" style="display:flex;align-items:center;">
        <button class="dd-btn" onclick="openLoginModal()">Login</button>
      </div>
      <div id="area-user" style="display:none;align-items:center;gap:8px;">
        <span id="user-name" style="font-size:13px;color:#d4af37;"></span>
        <span id="user-badge" style="font-size:11px;padding:2px 8px;border-radius:4px;background:#2a2a3a;color:#d4af37;display:none;"></span>
        <button onclick="doLogout()" style="background:transparent;border:1px solid #f55;color:#f55;padding:5px 12px;border-radius:5px;cursor:pointer;">Logout</button>
      </div>
    </div>
  </div>
  <div class="vx-ticker">
    <div class="ticker-label">LIVE</div>
    <div class="ticker-track"><span class="ticker-item">🏆 <span>ESL Pro League</span> — Finals</span><span class="ticker-item">🔴 <span>NinjaX</span> live</span></div>
  </div>
  <div class="vx-body">
    <div class="vx-sidebar">
      <button class="sb-btn active" id="sb-dashboard">📊 Dashboard</button>
      <div class="sb-section">Actions</div>
      <button class="sb-btn" id="sb-newpost" onclick="openPostModal('live')">➕ New Post</button>
    </div>
    <div class="vx-main" id="vx-main">
      <div class="admin-welcome">
        <h2>🎮 Admin Control Panel</h2>
        <p>Manage your community posts from here.</p>
        <p style="margin-top:10px; color:#aaa;">Use the "New Post" button to publish content to Live, Tournaments, Highlights, or YouTube Videos.</p>
        <button class="post-btn-large" onclick="openPostModal('live')">➕ Create New Post</button>
      </div>
    </div>
  </div>
</div>

<!-- POST MODAL (مثل السابق) -->
<div class="modal-overlay" id="postModal">
  <div class="modal-box">
    <div class="modal-top"><h2 id="postModalTitle">➕ New Post</h2><button class="modal-close" onclick="closePostModal()">✕</button></div>
    <div class="modal-body">
      <div class="modal-ok" id="postOk">✅ Posted successfully!</div>
      <div class="modal-err" id="postErr"></div>
      <div id="postFormContent"></div>
      <button class="btn-submit" id="postSubmitBtn" onclick="submitPost()">➕ Publish</button>
    </div>
  </div>
</div>

<!-- LOGIN MODAL (مبسط) -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box" style="max-width:360px;">
    <div class="modal-top"><h2>Login to Admin</h2><button class="modal-close" onclick="closeLoginModal()">✕</button></div>
    <div class="modal-body">
      <input type="email" id="lm-email" placeholder="Email" class="mf-group input" style="width:100%;margin-bottom:10px;padding:9px;">
      <input type="password" id="lm-password" placeholder="Password" class="mf-group input" style="width:100%;margin-bottom:10px;padding:9px;">
      <button class="btn-submit" onclick="doLogin()">Login</button>
      <div id="lm-err" style="color:#f55; margin-top:10px; display:none;"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentRoom = 'live';
let currentPostImg = null;

// Room configs for posting
const roomLabels = {
  live:'Live Streams', tournaments:'Tournaments', highlights:'Highlights', 'yt-videos':'YouTube Videos'
};
const postForms = {
  live: `<div class="mf-group"><label>Stream Title</label><input id="pf-title"></div><div class="mf-row"><div class="mf-group"><label>Game</label><input id="pf-desc"></div><div class="mf-group"><label>Type</label><select id="pf-tag"><option>Live Now</option><option>Pre Lives</option></select></div></div><div class="mf-group"><label>Stream URL</label><input id="pf-url"></div><div class="mf-group"><label>Thumbnail</label><div class="mf-img-upload"><input type="file" id="pf-img" accept="image/*" style="display:none" onchange="previewPostImg()"><label for="pf-img" class="mf-img-label">📁 Upload Image</label><img id="pf-preview" class="mf-img-preview"></div></div>`,
  tournaments: `<div class="mf-group"><label>Tournament Name</label><input id="pf-title"></div><div class="mf-row"><div class="mf-group"><label>Game</label><input id="pf-desc"></div><div class="mf-group"><label>Type</label><select id="pf-tag"><option>Registration</option><option>Global</option></select></div></div><div class="mf-group"><label>URL</label><input id="pf-url"></div><div class="mf-group"><label>Description</label><textarea id="pf-content" rows="3"></textarea></div>`,
  highlights: `<div class="mf-group"><label>Title</label><input id="pf-title"></div><div class="mf-row"><div class="mf-group"><label>Player/Game</label><input id="pf-desc"></div><div class="mf-group"><label>Type</label><select id="pf-tag"><option>Video</option><option>Photo</option></select></div></div><div id="pf-video-field"><div class="mf-group"><label>Video URL</label><input id="pf-url"></div></div><div id="pf-photo-field" style="display:none"><div class="mf-group"><label>Photo</label><div class="mf-img-upload"><input type="file" id="pf-img" accept="image/*" onchange="previewPostImg()"><label for="pf-img" class="mf-img-label">Upload</label><img id="pf-preview" class="mf-img-preview"></div></div></div>`,
  'yt-videos': `<div class="mf-group"><label>YouTube URL</label><input id="pf-url"></div><div class="mf-group"><label>Title (optional)</label><input id="pf-title"></div><div class="mf-group"><label>Tag</label><select id="pf-tag"><option>Video</option><option>VIP</option></select></div>`
};

function openPostModal(room) {
  if(window.userRole === 'guest') { openLoginModal(); return; }
  currentRoom = room;
  document.getElementById('postModalTitle').textContent = `➕ Post in ${roomLabels[room]}`;
  document.getElementById('postFormContent').innerHTML = postForms[room] || '';
  document.getElementById('postModal').classList.add('open');
}
function closePostModal() { document.getElementById('postModal').classList.remove('open'); }
function previewPostImg() {
  const file = document.getElementById('pf-img')?.files[0];
  if(file) { const reader = new FileReader(); reader.onload = e => { currentPostImg = e.target.result; const prev = document.getElementById('pf-preview'); if(prev) { prev.src = e.target.result; prev.style.display = 'block'; } }; reader.readAsDataURL(file); }
}
async function submitPost() {
  const title = document.getElementById('pf-title')?.value.trim() || '';
  const desc = document.getElementById('pf-desc')?.value.trim() || '';
  const url = document.getElementById('pf-url')?.value.trim() || '';
  const tag = document.getElementById('pf-tag')?.value || currentRoom;
  const content = document.getElementById('pf-content')?.value.trim() || null;
  if(!title && !url) { showPostErr('Please enter title or URL'); return; }
  const body = { title: title||'Post', description: desc, icon: currentPostImg || '📄', url, tag, room: currentRoom, content, posted_by: window.userId };
  const btn = document.getElementById('postSubmitBtn'); btn.disabled = true; btn.textContent = 'Publishing...';
  try {
    const { error } = await db.from('posts').insert(body);
    if(error) throw error;
    document.getElementById('postOk').style.display = 'block';
    setTimeout(() => closePostModal(), 1500);
  } catch(e) { showPostErr(e.message); }
  finally { btn.disabled = false; btn.textContent = '➕ Publish'; }
}
function showPostErr(msg) { const el = document.getElementById('postErr'); el.textContent = '❌ '+msg; el.style.display = 'block'; }

// Auth functions
async function checkAuth() {
  const { data: { session } } = await db.auth.getSession();
  const guest = document.getElementById('area-guest'), userArea = document.getElementById('area-user');
  if(session?.user) {
    guest.style.display = 'none'; userArea.style.display = 'flex';
    const { data: profile } = await db.from('profiles').select('username,role').eq('id', session.user.id).single();
    document.getElementById('user-name').textContent = '👋 ' + (profile?.username || session.user.email.split('@')[0]);
    const badge = document.getElementById('user-badge');
    if(profile?.role && profile.role !== 'user') { badge.textContent = profile.role.toUpperCase(); badge.style.display = 'inline-block'; }
    window.userRole = profile?.role || 'user'; window.userId = session.user.id;
  } else { guest.style.display = 'flex'; userArea.style.display = 'none'; window.userRole = 'guest'; window.userId = null; }
}
async function doLogout() { await db.auth.signOut(); window.location.reload(); }
function openLoginModal() { document.getElementById('loginModal').classList.add('open'); }
function closeLoginModal() { document.getElementById('loginModal').classList.remove('open'); }
async function doLogin() {
  const email = document.getElementById('lm-email').value, pw = document.getElementById('lm-password').value;
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if(error) { const errDiv = document.getElementById('lm-err'); errDiv.textContent = error.message; errDiv.style.display = 'block'; }
  else { closeLoginModal(); checkAuth(); }
}
checkAuth();
window.openPostModal = openPostModal;
</script>
</body>
</html>
