<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux - Article</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;padding:20px}
    .container{max-width:800px;margin:0 auto;background:#050e30;border-radius:16px;border:1px solid #9fb000;overflow:hidden}
    .header{background:#000718;padding:16px 20px;border-bottom:1px solid #9fb000}
    .header h1{color:#d4e800;font-size:22px}
    .back-link{display:inline-block;margin-bottom:20px;color:#9fb000;text-decoration:none;font-size:14px}
    .back-link:hover{color:#d4e800}
    .article-img{width:100%;max-height:300px;object-fit:cover;display:block}
    .article-emoji{font-size:80px;text-align:center;padding:20px;background:#0a1540}
    .content{padding:24px}
    .title{font-size:24px;color:#d4e800;margin-bottom:12px}
    .meta{color:#667;font-size:13px;margin-bottom:20px;border-bottom:1px solid #1e2d6b;padding-bottom:12px}
    .article-body{line-height:1.8;color:#ddd;font-size:15px}
    .article-body p{margin-bottom:16px}
    .footer{margin-top:30px;text-align:center;padding:16px;border-top:1px solid #1e2d6b;font-size:12px;color:#667}
    .loading{text-align:center;padding:50px;color:#9fb000}
    .error{text-align:center;padding:50px;color:#f55}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="javascript:history.back()" class="back-link">← العودة</a>
    <h1>📄 قراءة المقال</h1>
  </div>
  <div id="article-content">
    <div class="loading">جاري تحميل المقال...</div>
  </div>
  <div class="footer">Virtux Gaming Community</div>
</div>
<script>
const SB_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SB_KEY = 'sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';
async function loadArticle() {
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  if (!id) { document.getElementById('article-content').innerHTML = '<div class="error">❌ No article ID provided.</div>'; return; }
  try {
    const res = await fetch(`${SB_URL}/rest/v1/posts?id=eq.${id}`, { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
    const data = await res.json();
    if (!data || data.length === 0) throw new Error('Article not found');
    const post = data[0];
    const isImg = post.icon && (post.icon.startsWith('data:')||post.icon.startsWith('http'));
    const mediaHtml = isImg ? `<img class="article-img" src="${post.icon}" alt="${post.title}">` : `<div class="article-emoji">${post.icon || '📄'}</div>`;
    const contentHtml = post.content ? post.content.replace(/\n/g, '<br>') : (post.description || 'No content available.');
    document.getElementById('article-content').innerHTML = `${mediaHtml}<div class="content"><h1 class="title">${post.title}</h1><div class="meta">🏷️ ${post.tag || post.room} &nbsp;|&nbsp; 📅 ${new Date().toLocaleDateString()}</div><div class="article-body">${contentHtml}</div>${post.url ? `<div style="margin-top:20px"><a href="${post.url}" target="_blank" style="background:#9fb000;color:#000;padding:8px 16px;border-radius:8px;text-decoration:none">🔗 رابط إضافي</a></div>` : ''}</div>`;
  } catch (err) { document.getElementById('article-content').innerHTML = `<div class="error">❌ ${err.message}</div>`; }
}
loadArticle();
</script>
</body>
</html>
