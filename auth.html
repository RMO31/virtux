<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;min-height:100vh;display:flex;flex-direction:column}
    .topbar{display:flex;align-items:center;padding:12px 20px;background:#000718;border-bottom:1px solid #9fb000}
    .logo{font-size:20px;font-weight:700;color:#d4e800;letter-spacing:2px;text-decoration:none}
    .logo span{color:#fff;font-weight:400}
    .back{margin-left:auto;font-size:13px;color:#9fb000;text-decoration:none;border:1px solid #9fb000;padding:4px 12px;border-radius:5px}
    .back:hover{background:#9fb000;color:#000}
    .container{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
    .auth-box{background:#050e30;border:1px solid #9fb000;border-radius:16px;padding:36px 32px;width:100%;max-width:400px}
    .auth-box h1{color:#d4e800;font-size:22px;margin-bottom:6px;text-align:center}
    .auth-box p{color:#667;font-size:13px;margin-bottom:24px;text-align:center}
    .tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid #1e2d6b;border-radius:8px;overflow:hidden}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;background:#0a1540;color:#aab;border:none;font-family:'Poppins',sans-serif;transition:all 0.2s}
    .tab.active{background:#9fb000;color:#000;font-weight:600}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:12px;color:#9fb000;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
    .form-group input{width:100%;padding:10px 14px;border-radius:7px;border:1px solid #1e2d6b;background:#0a1540;color:#fff;font-size:14px;font-family:'Poppins',sans-serif}
    .form-group input:focus{outline:none;border-color:#9fb000}
    .btn-auth{width:100%;padding:11px;background:#9fb000;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;margin-top:6px;transition:background 0.2s}
    .btn-auth:hover{background:#d4e800}
    .btn-auth:disabled{background:#445;color:#778;cursor:not-allowed}
    .msg{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;display:none}
    .msg.ok{background:#0f3d2e;border:1px solid #0f6e56;color:#4caf90}
    .msg.err{background:#3d0f0f;border:1px solid #6e0f0f;color:#f55}
    .divider{text-align:center;color:#445;font-size:12px;margin:16px 0}
    .form-panel{display:none}
    .form-panel.active{display:block}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="logo">VIRT<span>UX</span></a>
    <a href="index.html" class="back">← Back to Site</a>
  </div>
  <div class="container">
    <div class="auth-box">
      <h1>🎮 Welcome to Virtux</h1>
      <p>Join the gaming community</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <div class="msg" id="authMsg"></div>

      <!-- LOGIN -->
      <div class="form-panel active" id="panel-login">
        <div class="form-group">
          <label>Email or Username</label>
          <input type="text" id="login-email" placeholder="example@domain.com or username">
        </div>
          <div style="text-align:center; margin-top:10px; margin-bottom:10px;">
            <a href="javascript:void(0)" onclick="doForgotPassword()" style="color:#9fb000; font-size:12px; text-decoration:underline;">Forgot Password?</a>
          </div>
        </div>
        <button class="btn-auth" onclick="doLogin()" id="btn-login">Login</button>
      </div>

      <div class="form-panel" id="panel-register">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="GamerName123">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="example@domain.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <button class="btn-auth" onclick="doRegister()" id="btn-register">Create Account</button>
      </div>

    </div>
  </div>

<script>
const SB_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk';
const db = window.supabase.createClient(SB_URL, SB_KEY, {
  auth: {
    persistSession: true,
    storageKey: 'virtux-auth-v2',
    autoRefreshToken: true,
    detectSessionInUrl: true,
    flowType: 'pkce',
    storage: window.localStorage
  }
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('authMsg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
function hideMsg() {
  document.getElementById('authMsg').style.display = 'none';
}

function getDummyEmail(username) {
  if (!username) return '';
  const clean = username.trim().toLowerCase();
  try {
    const encoder = new TextEncoder();
    const bytes = encoder.encode(clean);
    const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    return `ux_${hex}@virtux.v`;
  } catch(e) {
    return clean.replace(/[^a-z0-9]/g, '') + '@virtux.v';
  }
}

async function doLogin() {
  const identifier = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!identifier || !password) { showMsg('Please fill all fields!', 'err'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Logging in...';

  try {
    let email = identifier;
    let loginError = null;

    if (identifier.includes('@')) {
      const { error } = await db.auth.signInWithPassword({ email: identifier, password });
      loginError = error;
    } else {
      const attempts = [
        getDummyEmail(identifier),
        identifier.toLowerCase().replace(/\s+/g, '') + '@virtux.v',
        identifier.toLowerCase().trim().replace(/\s+/g, '_') + '@virtux.v',
        identifier.trim() + '@virtux.v',
        identifier.trim().replace(/\s+/g, '') + '@virtux.v'
      ];
      
      const { data: p } = await db.from('profiles').select('email').ilike('username', identifier.trim()).maybeSingle();
      if (p?.email) attempts.unshift(p.email);

      let lastErr = null;
      for (const email of attempts) {
        console.log('Trying login with:', email);
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (!error) { lastErr = null; break; }
        lastErr = error;
      }
      loginError = lastErr;
    }

    if (loginError) {
      const msg = (loginError.message === 'Invalid login credentials' || loginError.status === 400)
        ? 'اسم المستخدم أو كلمة المرور غير صحيحة. جرب الدخول بالإيميل إذا كان حسابك قديماً.'
        : loginError.message;
      throw new Error(msg);
    }
    if (loginError) throw loginError;

    showMsg('✅ Welcome back! Redirecting...', 'ok');
    setTimeout(() => window.location.href = 'index.html', 1500);
  } catch (err) {
    let msg = err.message || '';
    if (msg.includes('Invalid login credentials')) {
      msg = 'Invalid email/username or password.';
    }
    showMsg('❌ ' + msg, 'err');
    btn.disabled = false; btn.textContent = 'Login';
  }
}

async function doForgotPassword() {
  const email = prompt('Enter your email to receive a reset link:');
  if (!email) return;
  try {
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname + '#reset_password=true',
    });
    if (error) throw error;
    alert('Reset link sent! Please check your email.');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) { showMsg('Please fill all fields!', 'err'); return; }
  
  if (!/^[a-zA-Z0-9_\s\u0600-\u06FF]+$/.test(username)) {
    showMsg('Username contains invalid characters.', 'err');
    return;
  }

  if (password.length < 6) { showMsg('Password must be at least 6 characters!', 'err'); return; }
  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = 'Creating account...';
  
  const { data, error } = await db.auth.signUp({ 
    email: email, 
    password, 
    options: { 
      data: { username },
      emailRedirectTo: window.location.origin + window.location.pathname
    } 
  });
  if (error) {
    let msg = '❌ ' + error.message;
    if (error.message.includes('rate limit')) {
      msg = '❌ Registration limit reached. Please try later.';
    }
    showMsg(msg, 'err');
    btn.disabled = false; btn.textContent = 'Create Account';
  } else {
    // Create/Update profile
    if (data.user) {
      await db.from('profiles').upsert({ 
        id: data.user.id, 
        username, 
        email: email, 
        role: 'user',
        roles: ['user'],
        created_at: new Date().toISOString()
      });
    }
    if (data.session) {
      showMsg('✅ Welcome back! Redirecting...', 'ok');
      setTimeout(() => window.location.href = 'index.html', 1500);
    } else {
      showMsg('✅ Account created! IMPORTANT: If you cannot login, please disable "Confirm Email" in your Supabase Dashboard settings.', 'ok');
      btn.disabled = false; btn.textContent = 'Create Account';
      setTimeout(() => switchTab('login'), 4000);
    }
  }
}

function showHtmlMsg(html, type) {
  const el = document.getElementById('authMsg');
  el.innerHTML = html;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

const DISPOSABLE_DOMAINS = [
  'temp-mail.org', 'mailinator.com', '10minutemail.com', 'guerrillamail.com', 'sharklasers.com',
  'dispostable.com', 'getnada.com', 'maildrop.cc', 'moakt.com', 'yopmail.com', 'trashmail.com'
];
function isRealEmail(email) {
  if (!email || !email.includes('@')) return false;
  const domain = email.split('@')[1].toLowerCase();
  return !DISPOSABLE_DOMAINS.includes(domain);
}

let resendTimer = null;
async function resendConfirmation(email) {
  if (resendTimer) return;
  try {
    const { error } = await db.auth.resend({ type: 'signup', email });
    if (error) throw error;
    showMsg('✅ Confirmation email sent again!', 'ok');
    
    // Start countdown
    let seconds = 120;
    const btn = document.querySelector('button[onclick*="resendConfirmation"]');
    if (btn) {
      btn.disabled = true;
      resendTimer = setInterval(() => {
        seconds--;
        btn.textContent = `Wait ${seconds}s to resend`;
        if (seconds <= 0) {
          clearInterval(resendTimer);
          resendTimer = null;
          btn.disabled = false;
          btn.textContent = "Didn't get it? Resend";
        }
      }, 1000);
    }
  } catch(e) {
    showMsg('❌ Error: ' + e.message, 'err');
  }
}

// Check if already logged in
db.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html';
});
</script>
</body>
</html>
