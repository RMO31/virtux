<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux — Gaming Community</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
    .vx-root{display:flex;flex-direction:column;min-height:100vh}
    .vx-topbar{display:flex;align-items:center;padding:10px 18px;background:#000;border-bottom:1px solid #d4af37;gap:12px;flex-wrap:wrap}
    .vx-logo{font-size:22px;font-weight:700;color:#d4af37;letter-spacing:2px}
    .vx-logo span{color:#fff;font-weight:400}
    .vx-topnav{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
    .dd{position:relative}
    .dd-btn{background:transparent;border:1px solid #d4af37;color:#d4af37;padding:5px 14px;border-radius:5px;font-size:13px;cursor:pointer}
    .dd-btn:hover{background:#d4af37;color:#000}
    .dd-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:#1a1a1a;border:1px solid #d4af37;border-radius:6px;min-width:170px;z-index:999}
    .dd.open .dd-menu{display:block}
    .dd-menu a{display:block;color:#ccc;padding:9px 16px;font-size:13px;cursor:pointer;border-bottom:1px solid #333;text-decoration:none}
    .dd-menu a:last-child{border-bottom:none}
    .dd-menu a:hover{background:#d4af37;color:#000}
    .vx-ticker{background:#000;padding:5px 16px;display:flex;align-items:center;gap:10px;overflow:hidden}
    .ticker-label{font-size:11px;background:#d4af37;color:#000;padding:2px 8px;border-radius:3px;font-weight:700;white-space:nowrap}
    .ticker-track{display:flex;gap:30px;animation:ticker 28s linear infinite;white-space:nowrap}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .ticker-item{font-size:12px;color:#99aabb}
    .ticker-item span{color:#d4af37}
    .vx-body{display:flex;flex:1}
    .vx-sidebar{width:180px;background:linear-gradient(180deg,#1a1a1a,#2a2a2a);border-right:1px solid #d4af37;display:flex;flex-direction:column;gap:4px;padding:10px 6px}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#d4af37;color:#000}
    .sb-btn.active{border-left:3px solid #d4af37}
    .sb-section{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:1px;padding:8px 12px 2px}
    .vx-main{flex:1;max-height:calc(100vh - 84px);overflow-y:auto}
    .vx-page{display:none}
    .vx-page.active{display:block}
    
    /* خلفية صفحة الهوم الجديدة - لوحة حربية */
    .home-hero {
      position: relative;
      background: linear-gradient(135deg, #2b4d2b, #5a3a1a, #1a2a1a);
      background-image: repeating-linear-gradient(45deg, rgba(100,80,40,0.2) 0px, rgba(100,80,40,0.2) 2px, transparent 2px, transparent 8px),
                        repeating-linear-gradient(135deg, rgba(60,40,20,0.3) 0px, rgba(60,40,20,0.3) 1px, transparent 1px, transparent 6px);
      min-height: calc(100vh - 84px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      border-bottom: none;
    }
    .flags-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }
    .flag {
      width: 140px;
      height: 90px;
      background-size: cover;
      background-position: center;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .flag-iran { background-image: url('https://upload.wikimedia.org/wikipedia/commons/c/ca/Flag_of_Iran.svg'); }
    .flag-palestine { background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/00/Flag_of_Palestine.svg'); }
    .victory-text {
      font-size: 56px;
      font-weight: bold;
      color: #d4af37;
      text-shadow: 0 0 20px #000, 2px 2px 4px #8b0000;
      margin: 20px 0;
      z-index: 2;
      font-family: 'Poppins', sans-serif;
    }
    .home-title {
      font-size: 48px;
      font-weight: 800;
      color: #d4af37;
      text-shadow: 0 0 15px #000, 3px 3px 0 #5a3a1a;
      margin-top: 20px;
      z-index: 2;
    }
    .home-subtitle {
      font-size: 18px;
      color: #eee;
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border-radius: 40px;
      margin-top: 15px;
      z-index: 2;
    }
    .missile {
      position: absolute;
      bottom: -80px;
      width: 45px;
      height: 90px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4444"><path d="M12,2 L14,8 L22,8 L16,12 L18,18 L12,14 L6,18 L8,12 L2,8 L10,8 L12,2Z"/></svg>') no-repeat center;
      background-size: contain;
      filter: drop-shadow(0 0 8px orange);
      animation: launch 4s linear infinite;
      z-index: 3;
    }
    @keyframes launch {
      0% { bottom: -100px; opacity: 1; transform: translateX(0) rotate(0deg);}
      50% { opacity: 1; transform: translateX(25px) rotate(6deg);}
      100% { bottom: 110%; opacity: 0; transform: translateX(-25px) rotate(-6deg);}
    }
    .missile:nth-child(1) { left: 5%; animation-duration: 3s; animation-delay: 0s; width: 40px; height: 80px;}
    .missile:nth-child(2) { left: 20%; animation-duration: 4.2s; animation-delay: 0.7s; width: 50px; height: 100px;}
    .missile:nth-child(3) { left: 35%; animation-duration: 3.6s; animation-delay: 1.2s; width: 45px; height: 90px;}
    .missile:nth-child(4) { left: 50%; animation-duration: 4.5s; animation-delay: 0.3s; width: 55px; height: 110px;}
    .missile:nth-child(5) { left: 65%; animation-duration: 3.8s; animation-delay: 1.8s; width: 40px; height: 80px;}
    .missile:nth-child(6) { left: 80%; animation-duration: 4s; animation-delay: 0.9s; width: 48px; height: 95px;}
    .missile:nth-child(7) { left: 92%; animation-duration: 3.4s; animation-delay: 2.1s; width: 42px; height: 85px;}
    
    .empty-home { text-align: center; padding: 60px 20px; color: #aaa; background: #111; }
    
    /* باقي الأنماط */
    .filter-bar{display:flex;gap:6px;padding:10px 18px;flex-wrap:wrap;border-bottom:1px solid #333}
    .filter-btn{background:#222;border:1px solid #444;color:#ddd;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer}
    .filter-btn:hover,.filter-btn.active{background:#d4af37;color:#000;border-color:#d4af37}
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:18px}
    .post-card{background:#1e1e2e;border:1px solid #333;border-radius:12px;overflow:hidden;transition:border-color 0.2s;display:flex;flex-direction:column}
    .post-card:hover{border-color:#d4af37}
    .post-card-img{width:100%;height:160px;object-fit:cover}
    .post-card-emoji{width:100%;height:120px;background:linear-gradient(135deg,#2a2a3a,#1a1a2a);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
    .post-card-video{width:100%;aspect-ratio:16/9;background:#000}
    .post-card-video video,.post-card-video iframe{width:100%;height:100%;border:none}
    .restricted-overlay{position:relative}
    .restricted-overlay::after{content:"🔒";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;background:rgba(0,0,0,0.7);padding:10px 20px;border-radius:10px;color:#d4af37;pointer-events:none}
    .live-badge{position:absolute;top:8px;left:8px;background:red;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
    .post-card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column}
    .post-card-title{font-size:14px;font-weight:600;color:#ddd;margin-bottom:4px}
    .post-card-summary{font-size:12px;color:#aaa;margin-bottom:12px;line-height:1.5}
    .post-card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:auto}
    .post-tag{font-size:11px;background:#2a2a3a;color:#d4af37;border-radius:4px;padding:2px 8px}
    .post-link{font-size:12px;color:#d4af37;text-decoration:none;background:#2a2a3a;border:1px solid #444;border-radius:5px;padding:4px 10px}
    .post-link:hover{background:#d4af37;color:#000}
    .post-dl{font-size:12px;color:#000;text-decoration:none;background:#d4af37;border-radius:5px;padding:4px 10px;font-weight:600}
    .read-more{font-size:12px;background:#d4af37;color:#000;border-radius:5px;padding:4px 10px;text-decoration:none;font-weight:600}
    .read-more:hover{background:#e6c300}
    .channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:16px 18px}
    .channel-card{background:#1e1e2e;border:1px solid #333;border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center;transition:border-color 0.2s}
    .channel-card:hover{border-color:#d4af37}
    .channel-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;background:#2a2a3a;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px}
    .channel-info{width:100%}
    .channel-name{font-size:14px;font-weight:600;color:#d4af37;margin-bottom:4px}
    .channel-sub{font-size:12px;color:#aaa;margin-bottom:8px}
    .channel-link{font-size:12px;color:#d4af37;text-decoration:none;border:1px solid #d4af37;border-radius:5px;padding:5px 12px;display:inline-block;margin-top:6px}
    .channel-link:hover{background:#d4af37;color:#000}
    .empty-state{text-align:center;color:#555;padding:40px;font-size:14px}
    .loading-state{text-align:center;color:#aaa;padding:30px;font-size:13px}
    .contact-page{padding:20px}
    .contact-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
    .contact-card{background:#1e1e2e;border:1px solid #333;border-radius:8px;padding:14px;text-align:center;cursor:pointer}
    .contact-card:hover{border-color:#d4af37}
    .cc-icon{font-size:28px;margin-bottom:6px}
    .cc-name{font-size:13px;color:#d4af37;font-weight:600}
    .cc-handle{font-size:11px;color:#aaa}
    .page-header{padding:14px 20px 10px;border-bottom:1px solid #333;background:#0a0a0a}
    .page-header h2{font-size:17px;color:#d4af37;font-weight:600}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="vx-root">
  <div class="vx-topbar">
    <div class="vx-logo">VIRT<span>UX</span></div>
    <div class="vx-topnav">
      <div class="dd" id="dd-news"><button class="dd-btn" onclick="window.toggleDD('dd-news')">News ▾</button><div class="dd-menu"><a onclick="window.showPage('gaming-news');window.closeDD()">📰 Gaming News</a><a onclick="window.showPage('youtube-news');window.closeDD()">▶️ Youtube News</a></div></div>
      <div class="dd" id="dd-yt"><button class="dd-btn" onclick="window.toggleDD('dd-yt')">Youtube ▾</button><div class="dd-menu"><a onclick="window.showPage('yt-channels');window.closeDD()">📺 Channels</a><a onclick="window.showPage('yt-videos');window.closeDD()">🎬 Videos</a><a onclick="window.showPage('yt-lives');window.closeDD()">🔴 Lives</a></div></div>
      <!-- تم التعديل: اسم الزر من Collab إلى 📢 Advertisements، والقائمة الداخلية من 🌐 Projects إلى 🌐 Collaboration -->
      <div class="dd" id="dd-collab"><button class="dd-btn" onclick="window.toggleDD('dd-collab')">📢 Advertisements ▾</button><div class="dd-menu"><a onclick="window.showPage('projects');window.closeDD()">🌐 Collaboration</a></div></div>
    </div>
    <div id="auth-btn-area" style="margin-left:8px;">
      <a href="#" id="btn-login-link" style="background:transparent;border:1px solid #d4af37;color:#d4af37;padding:5px 14px;border-radius:5px;font-size:13px;cursor:pointer;text-decoration:none;">Login</a>
      <div id="btn-user-area" style="display:none;align-items:center;gap:8px;">
        <span id="user-name" style="font-size:13px;color:#d4af37;"></span>
        <span id="user-role-badge" style="font-size:11px;padding:2px 8px;border-radius:4px;background:#2a2a3a;color:#d4af37;display:none;"></span>
        <button onclick="doLogout()" style="background:transparent;border:1px solid #f55;color:#f55;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer;">Logout</button>
      </div>
    </div>
  </div>
  
  <!-- شريط الأخبار الديناميكي -->
  <div class="vx-ticker">
    <div class="ticker-label">LIVE</div>
    <div class="ticker-track" id="ticker-track">
      <div class="loading-state">جاري تحميل الأخبار...</div>
    </div>
  </div>
  
  <div class="vx-body">
    <div class="vx-sidebar">
      <button class="sb-btn active" id="sb-home" onclick="window.showPage('home')">🏠 Home</button>
      <div class="sb-section">Content</div>
      <button class="sb-btn" id="sb-live" onclick="window.showPage('live')">🔴 Live</button>
      <button class="sb-btn" id="sb-tournaments" onclick="window.showPage('tournaments')">🏆 Tournaments</button>
      <button class="sb-btn" id="sb-highlights" onclick="window.showPage('highlights')">🎬 Highlights</button>
      <div class="sb-section">Community</div>
      <button class="sb-btn" id="sb-subscribers" onclick="window.showPage('subscribers')">👥 Subscribers</button>
      <button class="sb-btn" id="sb-contact" onclick="window.showPage('contact')">📞 Contact</button>
    </div>
    <div class="vx-main">
      <div class="vx-page active" id="page-home">
        <div class="home-hero">
          <div class="flags-container">
            <div class="flag flag-iran"></div>
            <div class="victory-text">النصر للاسلام</div>
            <div class="flag flag-palestine"></div>
          </div>
          <div class="home-title">مرحباً بكم في VIRTUX</div>
          <div class="home-subtitle">مجتمع الألعاب والنخبة</div>
          <div class="missile"></div><div class="missile"></div><div class="missile"></div><div class="missile"></div><div class="missile"></div><div class="missile"></div><div class="missile"></div>
        </div>
        <div class="empty-home"><p>✨ سيتم إضافة محتوى الصفحة الرئيسية قريباً.</p></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let allPosts = {};

const rooms = ['live', 'tournaments', 'highlights', 'subscribers', 'gaming-news', 'youtube-news', 'yt-channels', 'yt-videos', 'yt-lives', 'projects'];
const roomLabels = {
  live: '🔴 Live Streams', tournaments: '🏆 Tournaments', highlights: '🎬 Highlights', subscribers: '👥 Subscribers',
  'gaming-news': '📰 Gaming News', 'youtube-news': '▶️ Youtube News', 'yt-channels': '📺 Youtube Channels',
  'yt-videos': '🎬 Youtube Videos', 'yt-lives': '🔴 Youtube Lives',
  projects: '🌐 Collaboration'   // تم التعديل: أصبح اسم الصفحة "🌐 Collaboration" بدلاً من Projects
};

const mainContainer = document.querySelector('.vx-main');
rooms.forEach(room => {
  const pageDiv = document.createElement('div');
  pageDiv.className = 'vx-page';
  pageDiv.id = `page-${room}`;
  let filterBar = '';
  if (room === 'live') {
    filterBar = `<div class="filter-bar"><button class="filter-btn active" onclick="window.filterPosts('live','',this)">All</button><button class="filter-btn" onclick="window.filterPosts('live','Live Now',this)">Live Now</button><button class="filter-btn" onclick="window.filterPosts('live','Pre Lives',this)">Pre Lives</button><button class="filter-btn" onclick="window.filterPosts('live','VIP',this)">VIP</button></div>`;
  } else if (room === 'tournaments') {
    filterBar = `<div class="filter-bar"><button class="filter-btn active" onclick="window.filterPosts('tournaments','',this)">All</button><button class="filter-btn" onclick="window.filterPosts('tournaments','Registration',this)">Registration</button><button class="filter-btn" onclick="window.filterPosts('tournaments','Global',this)">Global</button><button class="filter-btn" onclick="window.filterPosts('tournaments','VIP',this)">VIP</button></div>`;
  } else if (room === 'highlights') {
    filterBar = `<div class="filter-bar"><button class="filter-btn active" onclick="window.filterPosts('highlights','',this)">All</button><button class="filter-btn" onclick="window.filterPosts('highlights','Pro',this)">Pro</button><button class="filter-btn" onclick="window.filterPosts('highlights','Tournament',this)">Tournament</button><button class="filter-btn" onclick="window.filterPosts('highlights','Video',this)">Video</button><button class="filter-btn" onclick="window.filterPosts('highlights','Photo',this)">Photo</button></div>`;
  } else if (room === 'subscribers') {
    filterBar = `<div class="filter-bar"><button class="filter-btn active" onclick="window.filterPosts('subscribers','',this)">All</button><button class="filter-btn" onclick="window.filterPosts('subscribers','YouTube',this)">YouTube</button><button class="filter-btn" onclick="window.filterPosts('subscribers','Member',this)">Members</button><button class="filter-btn" onclick="window.filterPosts('subscribers','Donor',this)">Donors</button><button class="filter-btn" onclick="window.filterPosts('subscribers','VIP',this)">VIP</button><button class="filter-btn" onclick="window.filterPosts('subscribers','Youtuber VIP',this)">Youtuber VIP</button></div>`;
  }
  pageDiv.innerHTML = `<div class="page-header"><h2>${roomLabels[room]}</h2></div>${filterBar}<div class="posts-grid" id="grid-${room}"><div class="loading-state">Loading...</div></div>`;
  mainContainer.appendChild(pageDiv);
});

const contactPage = document.createElement('div');
contactPage.className = 'vx-page';
contactPage.id = 'page-contact';
contactPage.innerHTML = `<div class="page-header"><h2>📞 Contact Virtux</h2></div><div class="contact-page"><div class="contact-cards"><div class="contact-card"><div class="cc-icon">💬</div><div class="cc-name">Discord</div><div class="cc-handle">discord.gg/virtux</div></div><div class="contact-card"><div class="cc-icon">📧</div><div class="cc-name">Email</div><div class="cc-handle">contact@virtux.gg</div></div><div class="contact-card"><div class="cc-icon">🐦</div><div class="cc-name">Twitter / X</div><div class="cc-handle">@VirtuxGG</div></div><div class="contact-card"><div class="cc-icon">📸</div><div class="cc-name">Instagram</div><div class="cc-handle">@virtux.official</div></div><div class="contact-card"><div class="cc-icon">▶️</div><div class="cc-name">YouTube</div><div class="cc-handle">@VirtuxGaming</div></div></div></div>`;
mainContainer.appendChild(contactPage);

async function loadPage(room) {
  const el = document.getElementById(`grid-${room}`);
  if (!el) return;
  el.innerHTML = '<div class="loading-state">جاري التحميل...</div>';
  try {
    const { data, error } = await db.from('posts').select('*').eq('room', room).order('id', { ascending: false });
    if (error) throw error;
    allPosts[room] = data || [];
    renderCards(allPosts[room], `grid-${room}`, room);
  } catch(e) {
    console.error(e);
    el.innerHTML = '<div class="empty-state">فشل التحميل</div>';
  }
}

function isVIPContent(post) {
  return post.tag === 'VIP' || post.tag === 'Youtuber VIP';
}

function renderCards(posts, gridId, room) {
  const el = document.getElementById(gridId);
  if (!posts || !posts.length) { el.innerHTML = '<div class="empty-state">لا توجد منشورات بعد 🎮</div>'; return; }
  
  if (room === 'subscribers' || room === 'yt-channels') {
    el.innerHTML = `<div class="channels-grid">${posts.map(p => {
      const isImg = p.icon && (p.icon.startsWith('data:') || p.icon.startsWith('http'));
      const avatar = isImg ? `<img class="channel-avatar" src="${p.icon}">` : `<div class="channel-avatar">${p.icon || '📺'}</div>`;
      const link = p.url ? `<a href="${p.url}" target="_blank" class="channel-link">زيارة القناة</a>` : '';
      let subText = p.description || '';
      if (p.description && !isNaN(parseInt(p.description))) subText = `👥 ${p.description} مشترك`;
      return `<div class="channel-card">${avatar}<div class="channel-info"><div class="channel-name">${escapeHtml(p.title)}</div><div class="channel-sub">${subText}</div><div class="channel-sub" style="font-size:11px; color:#aab;">${escapeHtml(p.content || '')}</div></div>${link}</div>`;
    }).join('')}</div>`;
    return;
  }
  
  const userRole = window.userRole || 'guest';
  const allowedRoles = ['member', 'vip', 'admin'];
  const canViewVIP = allowedRoles.includes(userRole);
  
  el.innerHTML = posts.map(p => {
    let mediaContent = '';
    const isRestricted = isVIPContent(p) && !canViewVIP;
    
    if (isRestricted) {
      let thumb = '';
      if (p.icon && (p.icon.startsWith('http') || p.icon.startsWith('data:'))) {
        thumb = `<img class="post-card-img" src="${p.icon}">`;
      } else {
        thumb = `<div class="post-card-emoji" style="filter: blur(4px);">${p.icon || '📄'}</div>`;
      }
      mediaContent = `<div class="restricted-overlay" style="position:relative;">${thumb}<div style="position:absolute; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; flex-direction:column;"><span style="font-size:40px;">🔒</span><span style="color:#d4af37; font-size:12px; margin-top:8px;">هذا المحتوى للأعضاء فقط</span></div></div>`;
    } else {
      const isLocalVideo = p.url && (p.url.match(/\.(mp4|webm)$/i) || p.url.includes('/storage/v1/object/public/videos/'));
      const isYouTube = p.url && (p.url.includes('youtube.com/watch') || p.url.includes('youtu.be'));
      
      if (isLocalVideo) {
        mediaContent = `<div class="post-card-video"><video src="${p.url}" controls preload="metadata" style="width:100%; height:100%; object-fit:cover;"></video></div>`;
      }
      else if (isYouTube) {
        const videoId = extractYouTubeId(p.url);
        if (videoId) {
          mediaContent = `<div class="post-card-video"><iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>`;
        } else {
          mediaContent = `<img class="post-card-img" src="${p.icon || '📹'}">`;
        }
      }
      else if (p.icon && (p.icon.startsWith('data:') || p.icon.startsWith('http'))) {
        mediaContent = `<img class="post-card-img" src="${p.icon}">`;
      }
      else {
        mediaContent = `<div class="post-card-emoji">${p.icon || '📄'}${room === 'live' && p.tag === 'Live Now' ? '<div class="live-badge">LIVE</div>' : ''}</div>`;
      }
    }
    
    let summary = '';
    if (p.content) summary = p.content.substring(0, 150).trim() + (p.content.length > 150 ? '...' : '');
    else if (p.description) summary = p.description.substring(0, 150);
    const readMoreLink = p.content ? `<a href="post.html?id=${p.id}" class="read-more">📖 اقرأ المزيد</a>` : '';
    
    let actions = '';
    if (!isRestricted && p.url) {
      if (p.url.match(/\.(mp4|webm)$/i) || p.url.includes('/storage/v1/object/public/videos/')) {
        actions = `<a href="${p.url}" target="_blank" class="post-dl" download>⬇️ تحميل</a>`;
      } else if (p.url.includes('youtube.com') || p.url.includes('youtu.be')) {
        // لا نضيف زر يوتيوب إضافي
      } else {
        actions = `<a href="${p.url}" target="_blank" class="post-link">🔗 رابط</a>`;
      }
    }
    
    return `<div class="post-card">
      ${mediaContent}
      <div class="post-card-body">
        <div class="post-card-title">${escapeHtml(p.title)}</div>
        <div class="post-card-summary">${summary}</div>
        <div class="post-card-footer">
          <span class="post-tag">${escapeHtml(p.tag || '')}</span>
          <div style="display:flex; gap:6px; flex-wrap:wrap;">${actions}${readMoreLink}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function extractYouTubeId(url) {
  const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|live\/))([^&\?\/]+)/);
  return match ? match[1] : null;
}

function filterPosts(room, tag, btn) {
  if (btn && btn.closest('.filter-bar')) {
    btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const posts = allPosts[room] || [];
  const filtered = tag ? posts.filter(p => p.tag === tag) : posts;
  renderCards(filtered, `grid-${room}`, room);
}

function showPage(id) {
  document.querySelectorAll('.vx-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  const page = document.getElementById(`page-${id}`);
  if (page) page.classList.add('active');
  const btn = document.getElementById(`sb-${id}`);
  if (btn) btn.classList.add('active');
  if (id !== 'home' && id !== 'contact') loadPage(id);
}

function toggleDD(id) {
  document.querySelectorAll('.dd').forEach(d => { if(d.id !== id) d.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}
function closeDD() {
  document.querySelectorAll('.dd').forEach(d => d.classList.remove('open'));
}
document.addEventListener('click', e => { if(!e.target.closest('.dd')) closeDD(); });

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m] || m);
}

// تحميل الأخبار من قاعدة البيانات
async function loadTickerNews() {
  const track = document.getElementById('ticker-track');
  if (!track) return;
  try {
    const { data, error } = await db.from('posts')
      .select('title, url')
      .eq('room', 'ticker')
      .order('id', { ascending: false })
      .limit(10);
    if (error) throw error;
    if (!data || data.length === 0) {
      track.innerHTML = '<span class="ticker-item">📢 لا توجد أخبار حالياً</span>';
      return;
    }
    // تكرار الأخبار لضمان استمرار الحركة (نكرر المصفوفة مرتين)
    const items = [...data, ...data];
    track.innerHTML = items.map(item => {
      const text = item.title;
      const url = item.url;
      if (url) {
        return `<span class="ticker-item"><a href="${url}" target="_blank" style="color:#d4af37; text-decoration:none;">📢 ${escapeHtml(text)}</a></span>`;
      } else {
        return `<span class="ticker-item">📢 ${escapeHtml(text)}</span>`;
      }
    }).join('');
    // إعادة تشغيل الأنيميشن (للتأكد)
    track.style.animation = 'none';
    track.offsetHeight; // force reflow
    track.style.animation = 'ticker 28s linear infinite';
  } catch(e) {
    console.error('خطأ في تحميل الأخبار:', e);
    track.innerHTML = '<span class="ticker-item">⚠️ فشل تحميل الأخبار</span>';
  }
}

// تسجيل الزيارة
(function trackVisit() {
  const lastVisit = localStorage.getItem('virtux_last_visit');
  const now = Date.now();
  const oneDay = 24 * 60 * 60 * 1000;
  if (!lastVisit || (now - parseInt(lastVisit)) > oneDay) {
    localStorage.setItem('virtux_last_visit', now);
    fetch('https://eyqcpkhjzpmawqtilhgl.supabase.co/rest/v1/rpc/log_visit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ page_url: window.location.pathname })
    }).catch(e => console.log('Visit log error:', e));
  }
})();

window.showPage = showPage;
window.filterPosts = filterPosts;
window.toggleDD = toggleDD;
window.closeDD = closeDD;

// Auth
const authDb = db;
async function checkAuth() {
  const { data: { session } } = await authDb.auth.getSession();
  const loginLink = document.getElementById('btn-login-link');
  const userArea = document.getElementById('btn-user-area');
  if (session && session.user) {
    if (loginLink) loginLink.style.display = 'none';
    if (userArea) userArea.style.display = 'flex';
    let { data: profile, error } = await authDb.from('profiles').select('username,role').eq('id', session.user.id).single();
    if (!profile && !error) {
      const userName = session.user.user_metadata?.full_name || session.user.user_metadata?.name || session.user.email.split('@')[0];
      const { error: insertError } = await authDb.from('profiles').insert({
        id: session.user.id,
        username: userName,
        email: session.user.email,
        role: 'user'
      });
      if (!insertError) {
        const { data: newProfile } = await authDb.from('profiles').select('username,role').eq('id', session.user.id).single();
        profile = newProfile;
      }
    }
    const userName = document.getElementById('user-name');
    const roleBadge = document.getElementById('user-role-badge');
    if (userName) userName.textContent = '👋 ' + (profile?.username || session.user.email.split('@')[0]);
    if (roleBadge && profile?.role && profile.role !== 'user') {
      roleBadge.textContent = profile.role.toUpperCase();
      roleBadge.style.display = 'inline-block';
    }
    window.userRole = profile?.role || 'user';
    window.userId = session.user.id;
    window.userEmail = session.user.email;
  } else {
    if (loginLink) loginLink.style.display = 'inline-block';
    if (userArea) userArea.style.display = 'none';
    window.userRole = 'guest';
  }
}
async function doLogout() {
  await authDb.auth.signOut();
  window.location.reload();
}

document.getElementById('btn-login-link')?.addEventListener('click', (e) => {
  e.preventDefault();
  const email = prompt('أدخل بريدك الإلكتروني:');
  if (!email) return;
  const password = prompt('أدخل كلمة المرور:');
  if (!password) return;
  authDb.auth.signInWithPassword({ email, password }).then(({ error }) => {
    if (error) alert('فشل تسجيل الدخول: ' + error.message);
    else window.location.reload();
  });
});

checkAuth();
loadTickerNews(); // تحميل الأخبار عند بدء الصفحة
</script>
