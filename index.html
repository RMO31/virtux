<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtux</title>

<style>
body{background:#01042e;color:#fff;font-family:Poppins}
.dynamic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;padding:20px}
.dyn-card{border:2px solid #9fb000;border-radius:12px;overflow:hidden;box-shadow:0 0 10px #9fb00044}
.dyn-thumb{height:150px;background:#000;display:flex;align-items:center;justify-content:center}
.dyn-thumb img{width:100%;height:100%;object-fit:cover}
.dyn-info{padding:10px}
.dyn-title{font-weight:bold}
.dyn-tag{color:#9fb000;font-size:12px}
a{color:#9fb000}
</style>

</head>
<body>

<h2 style="padding:10px">🏠 Home</h2>
<div id="grid-home" class="dynamic-grid"></div>

<h2 style="padding:10px">🎬 Highlights</h2>
<div id="grid-highlights" class="dynamic-grid"></div>

<h2 style="padding:10px">📰 Gaming News</h2>
<div id="grid-gaming-news" class="dynamic-grid"></div>

<h2 style="padding:10px">▶️ Youtube Videos</h2>
<div id="grid-yt-videos" class="dynamic-grid"></div>

<script>
const SB='https://eyqcpkhjzpmawqtilhgl.supabase.co/rest/v1/posts';
const KEY='sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';

async function load(room){
 const r=await fetch(SB+'?room=eq.'+room,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
 const data=await r.json();
 render(data,'grid-'+room,room);
}

function render(posts,id,room){
 const el=document.getElementById(id);
 if(!posts.length){el.innerHTML='No posts';return;}

 el.innerHTML=posts.map(p=>{

 let media='';
 if(p.icon && p.icon.startsWith('data:')){
   media=`<img src="${p.icon}">`;
 }else{
   media=p.icon||'📄';
 }

 let video='';
 if(p.url && p.url.startsWith('data:video')){
   video=`<video controls style="width:100%"><source src="${p.url}"></video>`;
 }

 return `
 <div class="dyn-card">
   <div class="dyn-thumb">${media}</div>
   ${video}
   <div class="dyn-info">
     <div class="dyn-title">${p.title}</div>
     <div>${p.description||''}</div>
     <div class="dyn-tag">${p.tag||''}</div>
     ${p.url && !p.url.startsWith('data:') ? `<a href="${p.url}" target="_blank">🔗 Link</a>`:''}
   </div>
 </div>
 `;
 }).join('');
}

load('home');
load('highlights');
load('gaming-news');
load('yt-videos');
</script>

</body>
</html>
