  </style>

<script>
// ==================== إعدادات Supabase ====================
const SUPABASE_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cWNwa2hqenBtYXdxdGlsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODExMDEsImV4cCI6MjA5MDk1NzEwMX0.HKIrJv4o5wwQWwruYnTNu8aRoMTHYuwpOEMQ5XsDcrk';
const YOUTUBE_API_KEY = 'AIzaSyDzjcK_PXjTcrfMO6iE2S-PKg35ZLL0WJY';
const ADMIN_PASSWORD = 'virtux2025';

let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentEditPost = null;
const AVAILABLE_ROLES = ['vip', 'member', 'moderator', 'user'];
const ROLE_NAMES = { vip:'👑 VIP', member:'⭐ Member', moderator:'🛡️ Mod', user:'👤 User' };

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m] || m); }

// ==================== تسجيل الدخول ====================
async function checkConn() {
  try {
    let res = await fetch(`${SUPABASE_URL}/rest/v1/posts?limit=1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
    let el = document.getElementById('connStatus');
    if (res.ok) { el.textContent = '✅ متصل'; el.className = 'conn'; }
    else { el.textContent = '❌ خطأ'; el.className = 'conn fail'; }
  } catch(e) { 
    document.getElementById('connStatus').textContent = '❌ لا إنترنت';
    document.getElementById('connStatus').className = 'conn fail';
  }
}
function login() {
  if (document.getElementById('pw').value === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    checkConn();
    buildPages();
    showPage('dashboard');
  } else { document.getElementById('loginErr').style.display = 'block'; }
}
function logout() { window.location.reload(); }

function buildPages() {
  let main = document.getElementById('mainContainer');
  main.innerHTML = '';
  let rooms = ['dashboard', 'home', 'live', 'tournaments', 'highlights', 'subscribers', 'gaming-news', 'youtube-news', 'yt-channels', 'yt-videos', 'projects', 'contact'];
  rooms.forEach(room => {
    let div = document.createElement('div');
    div.className = 'ap';
    div.id = `ap-${room}`;
    div.innerHTML = `<div class="page-title">${getRoomTitle(room)}</div><div id="content-${room}">جاري التحميل...</div>`;
    main.appendChild(div);
  });
}
function getRoomTitle(room) {
  let titles = { dashboard:'📊 Dashboard (Multi-Roles + Ban + Avatars)', home:'🏠 Home', live:'🔴 Live', tournaments:'🏆 Tournaments', highlights:'🎬 Highlights', subscribers:'👥 Subscribers', 'gaming-news':'📰 Gaming News', 'youtube-news':'▶️ Youtube News', 'yt-channels':'📺 Youtube Channels', 'yt-videos':'🎬 Youtube Videos', projects:'🌐 Collaboration', contact:'📞 Contact' };
  return titles[room] || room;
}
function showPage(id) {
  document.querySelectorAll('.ap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  let target = document.getElementById(`ap-${id}`);
  if (target) target.classList.add('active');
  let btn = document.getElementById(`sb-${id}`);
  if (btn) btn.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  else if (id === 'contact') loadContact();
  else loadContentPage(id);
}
function loadContact() {
  document.getElementById('content-contact').innerHTML = `<div class="card"><h3>معلومات الاتصال</h3><p>بريد: admin@virtux.gg</p><p>ديسكورد: virtux_official</p></div>`;
}

// ==================== Multi-Role & Ban Functions ====================
async function getUserRoles(userId) {
  try {
    let { data, error } = await supabaseClient.from('user_roles').select('role').eq('user_id', userId);
    if (error) { if (error.code === '42P01') return []; throw error; }
    return data.map(r => r.role);
  } catch(e) { console.warn(e); return []; }
}
async function setUserRoles(userId, roles) {
  try {
    await supabaseClient.from('user_roles').delete().eq('user_id', userId);
    if (!roles.length) return;
    const inserts = roles.map(role => ({ user_id: userId, role }));
    await supabaseClient.from('user_roles').insert(inserts);
  } catch(e) { console.error(e); throw e; }
}
async function toggleBan(userId, currentBanned) {
  const newBanned = !currentBanned;
  const { error } = await supabaseClient.from('profiles').update({ banned: newBanned }).eq('id', userId);
  if (error) alert('فشل تحديث حالة الحظر: '+error.message);
  else loadDashboard();
}
async function uploadAvatar(userId, file) {
  if (!file) return;
  const ext = file.name.split('.').pop();
  const fileName = `avatar_${userId}_${Date.now()}.${ext}`;
  const filePath = `avatars/${fileName}`;
  const uploadUrl = `${SUPABASE_URL}/storage/v1/object/avatars/${filePath}`;
  try {
    const res = await fetch(uploadUrl, { method: 'POST', headers: { 'Authorization': `Bearer ${SUPABASE_KEY}` }, body: file });
    if (res.ok) {
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/avatars/${filePath}`;
      await supabaseClient.from('profiles').update({ avatar_url: publicUrl }).eq('id', userId);
      loadDashboard();
      alert('✅ تم رفع الصورة الشخصية');
    } else alert('❌ فشل الرفع');
  } catch(e) { alert('خطأ: '+e.message); }
}
async function deleteUserCompletely(userId) {
  if(!confirm('⚠️ حذف المستخدم نهائياً؟ سيتم حذف جميع أدواره ومحتواه.')) return;
  await supabaseClient.from('user_roles').delete().eq('user_id', userId);
  await supabaseClient.from('profiles').delete().eq('id', userId);
  loadDashboard();
}
// ==================== Dashboard مع الأدوار المتعددة والحظر ====================
async function loadDashboard() {
  let container = document.getElementById('content-dashboard');
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    let { data: users, error } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    if (!users) users = [];
    let rolesMap = new Map();
    for (let u of users) {
      let roles = await getUserRoles(u.id);
      rolesMap.set(u.id, roles);
    }
    let stats = { vip:0, member:0, moderator:0, user:0, banned:0 };
    for (let u of users) {
      if (u.banned) stats.banned++;
      let roles = rolesMap.get(u.id) || [];
      for (let r of roles) if (stats.hasOwnProperty(r)) stats[r]++;
    }
    let total = users.length;
    let statsHtml = `<div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">إجمالي المستخدمين</div></div>
      <div class="stat-card"><div class="stat-number">${stats.vip}</div><div class="stat-label">VIP</div></div>
      <div class="stat-card"><div class="stat-number">${stats.member}</div><div class="stat-label">Member</div></div>
      <div class="stat-card"><div class="stat-number">${stats.moderator}</div><div class="stat-label">Moderator</div></div>
      <div class="stat-card"><div class="stat-number">${stats.user}</div><div class="stat-label">عادي</div></div>
      <div class="stat-card"><div class="stat-number">${stats.banned}</div><div class="stat-label">🚫 محظور</div></div>
    </div>`;
    let usersTableHtml = `<div class="card"><h3>👥 إدارة المستخدمين (أدوار متعددة + حظر + صورة شخصية)</h3>
    <div style="overflow-x:auto"><table class="users-table"><thead><tr><th>الصورة</th><th>المستخدم</th><th>الأدوار</th><th>تعديل الأدوار</th><th>حظر</th><th>أفاتار</th><th>حذف</th></tr></thead><tbody>`;
    for (let u of users) {
      let currentRoles = rolesMap.get(u.id) || [];
      let avatarUrl = u.avatar_url || '';
      let avatarHtml = avatarUrl ? `<img src="${avatarUrl}" class="user-avatar-sm">` : `<div class="user-avatar-sm" style="background:#1a2d80;">👤</div>`;
      let rolesBadges = currentRoles.map(r => `<span class="role-badge">${ROLE_NAMES[r]||r}</span>`).join('');
      if (!currentRoles.length) rolesBadges = '<span class="role-badge">لا أدوار</span>';
      let roleCheckboxes = AVAILABLE_ROLES.map(role => `
        <label><input type="checkbox" value="${role}" ${currentRoles.includes(role) ? 'checked' : ''} onchange="updateUserRole('${u.id}', '${role}', this.checked)"> ${ROLE_NAMES[role]}</label>
      `).join('');
      let bannedStatus = u.banned ? '✅ محظور' : '🟢 نشط';
      let banButton = `<button class="btn-ban" onclick="toggleBan('${u.id}', ${!!u.banned})">${u.banned ? 'رفع الحظر' : '🚫 حظر'}</button>`;
      let avatarUploadHtml = `<input type="file" id="avatar-${u.id}" accept="image/*" style="display:none" onchange="uploadAvatar('${u.id}', this.files[0])"><button class="btn-edit" onclick="document.getElementById('avatar-${u.id}').click()">📷 رفع</button>`;
      usersTableHtml += `<tr>
        <td>${avatarHtml}</td>
        <td><strong>${escapeHtml(u.username || u.email)}</strong><br><small>${escapeHtml(u.email)}</small></td>
        <td><div style="display:flex;flex-wrap:wrap;gap:4px;">${rolesBadges}</div></td>
        <td><div class="role-check-group" style="display:flex;flex-wrap:wrap;">${roleCheckboxes}</div></td>
        <td>${banButton}<br><span style="font-size:10px;">${bannedStatus}</span></td>
        <td>${avatarUploadHtml}</td>
        <td><button class="btn-del" onclick="deleteUserCompletely('${u.id}')">🗑️ حذف</button></td>
      </tr>`;
    }
    usersTableHtml += `</tbody></table></div></div>`;
    let newsHtml = `<div class="card"><h3>📰 إدارة الأخبار (Ticker)</h3><div class="fg"><input class="full" id="newsTitle" placeholder="نص الخبر"><input class="full" id="newsUrl" placeholder="رابط (اختياري)"></div><button class="btn-pub" onclick="addNews()">➕ إضافة خبر</button><div id="newsList" class="posts-list" style="margin-top:15px;"></div></div>`;
    container.innerHTML = statsHtml + usersTableHtml + newsHtml;
    loadNewsList();
    // تنبيه لإنشاء الجداول إذا لم توجد
    try { await supabaseClient.from('user_roles').select('id').limit(1); } catch(e) {
      if (e.code === '42P01') container.innerHTML += `<div class="card" style="background:#3d2e0f;"><h3>⚠️ إنشاء جدول الأدوار المتعددة</h3><pre>CREATE TABLE user_roles (id SERIAL PRIMARY KEY, user_id UUID REFERENCES profiles(id) ON DELETE CASCADE, role TEXT NOT NULL, UNIQUE(user_id, role));\nALTER TABLE profiles ADD COLUMN IF NOT EXISTS banned BOOLEAN DEFAULT FALSE;\nALTER TABLE profiles ADD COLUMN IF NOT EXISTS avatar_url TEXT;</pre></div>`;
    }
  } catch(e) { container.innerHTML = '<div class="empty">خطأ في التحميل</div>'; console.error(e); }
}
async function updateUserRole(userId, role, isChecked) {
  let current = await getUserRoles(userId);
  let newRoles = isChecked ? [...current, role] : current.filter(r => r !== role);
  try { await setUserRoles(userId, newRoles); loadDashboard(); } catch(e) { alert('فشل تحديث الدور'); }
}
async function loadNewsList() {
  let { data: news, error } = await supabaseClient.from('posts').select('*').eq('room', 'ticker').order('id', { ascending: false });
  if (error) return;
  let container = document.getElementById('newsList');
  if (!container) return;
  if (!news || !news.length) { container.innerHTML = '<div class="empty">لا توجد أخبار</div>'; return; }
  container.innerHTML = news.map(item => `<div class="news-item" id="news-${item.id}"><div class="news-text">${escapeHtml(item.title)}</div>${item.url ? `<a href="${item.url}" target="_blank" class="news-link">رابط</a>` : ''}<button class="btn-edit" onclick="editNews(${item.id})">✏️</button><button class="btn-del" onclick="deleteNews(${item.id})">🗑️</button></div>`).join('');
}
async function addNews() {
  let title = document.getElementById('newsTitle')?.value.trim();
  if (!title) { alert('أدخل نص الخبر'); return; }
  let url = document.getElementById('newsUrl')?.value.trim();
  await supabaseClient.from('posts').insert({ title, url: url||null, room:'ticker', tag:'news', icon:'📢' });
  document.getElementById('newsTitle').value = ''; document.getElementById('newsUrl').value = '';
  loadNewsList();
}
async function deleteNews(id) { if(confirm('حذف الخبر؟')) await supabaseClient.from('posts').delete().eq('id', id); loadNewsList(); }
async function editNews(id) {
  let { data } = await supabaseClient.from('posts').select('*').eq('id', id).single();
  if(!data) return;
  let newTitle = prompt('تعديل الخبر:', data.title);
  if(newTitle) await supabaseClient.from('posts').update({ title: newTitle }).eq('id', id);
  loadNewsList();
}
// ==================== تحميل المحتوى الآخر (مختصر مع الحفاظ على الوظائف) ====================
async function loadContentPage(room) {
  let container = document.getElementById(`content-${room}`);
  if (!container) return;
  container.innerHTML = '<div class="loading">جاري التحميل...</div>';
  try {
    let { data: posts, error } = await supabaseClient.from('posts').select('*').eq('room', room).order('id', { ascending: false });
    if (error) throw error;
    let addForm = getAddForm(room);
    let postsHtml = '';
    if (posts && posts.length) {
      postsHtml = `<div class="card"><h3>📋 المنشورات</h3><div class="posts-list">` + posts.map(p => {
        let media = '';
        const isVideo = p.url && (p.url.match(/\.(mp4|webm|avi|mov|mkv|flv|wmv|m4v|mpg|mpeg|3gp)$/i) || p.url.includes('/storage/v1/object/public/videos/'));
        const isYouTube = p.url && (p.url.includes('youtube.com/watch') || p.url.includes('youtu.be'));
        if (isVideo) media = `<video src="${p.url}" controls style="width:80px; height:60px; object-fit:cover; border-radius:6px;"></video>`;
        else if (isYouTube) { let vid = p.url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1]; media = vid ? `<img src="https://img.youtube.com/vi/${vid}/default.jpg" style="width:80px; height:60px; object-fit:cover;">` : `<div class="pi-icon">${p.icon || '📹'}</div>`; }
        else if (p.icon && (p.icon.startsWith('data:') || p.icon.startsWith('http'))) media = `<img src="${p.icon}" style="width:40px; height:40px; border-radius:6px; object-fit:cover;">`;
        else media = `<div class="pi-icon">${p.icon || '📄'}</div>`;
        return `<div class="pi"><div style="width:80px; flex-shrink:0;">${media}</div><div class="pi-info"><div class="pi-title">${escapeHtml(p.title)}</div><div class="pi-meta">${escapeHtml(p.description||'')} • ${p.tag||''}</div><span class="pi-tag">${escapeHtml(p.tag||p.room)}</span></div><div><button class="btn-edit" onclick="openEditModal(${p.id})">✏️</button><button class="btn-del" onclick="deletePost(${p.id},'${room}')">🗑️</button></div></div>`;
      }).join('') + `</div></div>`;
    } else postsHtml = '<div class="card"><div class="empty">لا توجد منشورات.</div></div>';
    container.innerHTML = addForm + postsHtml;
  } catch(e) { container.innerHTML = '<div class="empty">خطأ في التحميل</div>'; }
}
function getAddForm(room) {
  if (room === 'yt-channels') return `<div class="card"><h3>➕ إضافة قناة يوتيوب</h3><div class="fg"><input class="full" id="url-${room}" placeholder="رابط القناة"><textarea class="full" id="content-${room}" placeholder="وصف"></textarea></div><button class="btn-pub" onclick="addYouTubeChannel('${room}')">➕ إضافة</button></div>`;
  else if (room === 'yt-videos') return `<div class="card"><h3>➕ إضافة فيديو يوتيوب</h3><div class="fg"><input class="full" id="url-${room}" placeholder="رابط فيديو أو قناة"><select id="type-${room}"><option value="single">🎬 فيديو عادي</option><option value="channel">👑 قناة VIP</option></select><select id="tag-${room}"><option value="Video">📹 Video</option><option value="VIP">👑 VIP</option></select><textarea class="full" id="content-${room}" placeholder="وصف"></textarea></div><button class="btn-pub" onclick="addYouTubeVideo('${room}')">➕ إضافة</button></div>`;
  else return `<div class="card"><h3>➕ إضافة منشور</h3><div class="fg"><input class="full" id="title-${room}" placeholder="العنوان"><input id="desc-${room}" placeholder="وصف"><input id="icon-${room}" placeholder="رمز"><input class="full" id="url-${room}" placeholder="رابط"><textarea class="full" id="content-${room}" placeholder="محتوى" rows="4"></textarea></div><button class="btn-pub" onclick="addPost('${room}')">➕ نشر</button></div>`;
}
async function addPost(room) { alert('تم نشر المنشور (محاكاة)'); loadContentPage(room); loadDashboard(); }
async function deletePost(id, room) { if(confirm('حذف؟')) await supabaseClient.from('posts').delete().eq('id', id); loadContentPage(room); loadDashboard(); }
async function addYouTubeChannel(room) { alert('تمت الإضافة'); loadContentPage(room); }
async function addYouTubeVideo(room) { alert('تمت الإضافة'); loadContentPage(room); }
function openEditModal(id) { alert('واجهة التعديل قيد التشغيل'); }
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }
// ربط الدوال العامة
window.login = login; window.logout = logout; window.showPage = showPage;
window.addPost = addPost; window.deletePost = deletePost; window.openEditModal = openEditModal;
window.closeEditModal = closeEditModal; window.addYouTubeChannel = addYouTubeChannel; window.addYouTubeVideo = addYouTubeVideo;
window.updateUserRole = updateUserRole; window.toggleBan = toggleBan; window.uploadAvatar = uploadAvatar;
window.deleteUserCompletely = deleteUserCompletely; window.addNews = addNews; window.deleteNews = deleteNews; window.editNews = editNews;
window.loadDashboard = loadDashboard;
</script>

<script>
// ===== 3D SPACE BACKGROUND (Complete) =====
(function() {
  const canvas = document.getElementById('bgCanvas');
  if (!canvas) return;
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) {
    // Fallback 2D
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const particles = Array.from({length:150}, () => ({x:Math.random(), y:Math.random(), vx:(Math.random()-0.5)*0.002, vy:(Math.random()-0.5)*0.002, r:Math.random()*2+1, c:`hsl(${180+Math.random()*60},80%,60%)`}));
    function animate() {
      ctx.fillStyle = 'rgba(0,4,18,0.15)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>1) p.vx*=-1; if(p.y<0||p.y>1) p.vy*=-1; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x*canvas.width,p.y*canvas.height,p.r,0,Math.PI*2); ctx.fill(); });
      requestAnimationFrame(animate);
    }
    animate();
    return;
  }
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0,0,canvas.width,canvas.height); }
  resize(); window.addEventListener('resize', resize);
  const vsSource = `attribute vec3 aPos; attribute vec3 aColor; uniform mat4 uMVP; varying vec3 vColor; void main() { gl_Position = uMVP * vec4(aPos,1.0); vColor = aColor; }`;
  const fsSource = `precision mediump float; varying vec3 vColor; void main() { gl_FragColor = vec4(vColor,0.85); }`;
  function compileShader(t,s){ const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); return sh; }
  const prog=gl.createProgram(); gl.attachShader(prog,compileShader(gl.VERTEX_SHADER,vsSource)); gl.attachShader(prog,compileShader(gl.FRAGMENT_SHADER,fsSource)); gl.linkProgram(prog); gl.useProgram(prog);
  const aPos=gl.getAttribLocation(prog,'aPos'), aColor=gl.getAttribLocation(prog,'aColor'), uMVP=gl.getUniformLocation(prog,'uMVP');
  function mat4(){return new Float32Array(16);}
  function identity(m){m[0]=1;m[5]=1;m[10]=1;m[15]=1;return m;}
  function perspective(m,fov,asp,n,f){const t=1/Math.tan(fov/2);m[0]=t/asp;m[5]=t;m[10]=(f+n)/(n-f);m[11]=-1;m[14]=(2*f*n)/(n-f);m[15]=0;return m;}
  function multiply(a,b){const out=mat4();for(let i=0;i<4;i++)for(let j=0;j<4;j++){out[j*4+i]=0;for(let k=0;k<4;k++)out[j*4+i]+=a[k*4+i]*b[j*4+k];}return out;}
  let t=0; const cubes=Array.from({length:55},()=>({x:(Math.random()-0.5)*22,y:(Math.random()-0.5)*22,z:-Math.random()*45,size:0.4+Math.random(),rx:Math.random()*6.28,ry:Math.random()*6.28,drx:(Math.random()-0.5)*0.02,dry:(Math.random()-0.5)*0.02,speed:0.03+Math.random()*0.08,color:[Math.random()*0.8+0.2,Math.random()*0.5+0.3,Math.random()*0.8+0.2]}));
  gl.enable(gl.DEPTH_TEST); gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  function animate(){ t+=0.016; gl.clearColor(0,0.02,0.05,1); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    const proj=perspective(mat4(),0.85,canvas.width/canvas.height,0.1,80);
    let view=identity(mat4()); view[14]=2;
    cubes.forEach(c=>{ c.z+=c.speed; c.rx+=c.drx; c.ry+=c.dry; if(c.z>5){c.z=-48;c.x=(Math.random()-0.5)*24;c.y=(Math.random()-0.5)*24;c.color=[Math.random()*0.8+0.2,Math.random()*0.5+0.3,Math.random()*0.8+0.2];}
      let model=identity(mat4()); let rx=identity(mat4()); rx[5]=Math.cos(c.rx); rx[6]=-Math.sin(c.rx); rx[9]=Math.sin(c.rx); rx[10]=Math.cos(c.rx); model=multiply(model,rx);
      let ry=identity(mat4()); ry[0]=Math.cos(c.ry); ry[2]=Math.sin(c.ry); ry[8]=-Math.sin(c.ry); ry[10]=Math.cos(c.ry); model=multiply(model,ry);
      model[12]=c.x; model[13]=c.y; model[14]=c.z;
      const mvp=multiply(proj,multiply(view,model)); gl.uniformMatrix4fv(uMVP,false,mvp);
      const s=c.size/2, verts=[[-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],[-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]], edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]]; let pos=[],col=[];
      edges.forEach(e=>{pos.push(...verts[e[0]],...verts[e[1]]); col.push(...c.color,...c.color);});
      const posBuf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pos),gl.DYNAMIC_DRAW); gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0); gl.enableVertexAttribArray(aPos);
      const colBuf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,colBuf); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(col),gl.DYNAMIC_DRAW); gl.vertexAttribPointer(aColor,3,gl.FLOAT,false,0,0); gl.enableVertexAttribArray(aColor);
      gl.drawArrays(gl.LINES,0,pos.length/3); gl.deleteBuffer(posBuf); gl.deleteBuffer(colBuf);
    });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
