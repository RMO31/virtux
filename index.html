<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtux — Gaming Community</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* نفس الأنماط السابقة (محذوفة للاختصار، استخدم أنماطك الحالية) */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#01042e;color:#fff;min-height:100vh}
    .vx-root{display:flex;flex-direction:column;min-height:100vh}
    .vx-topbar{display:flex;align-items:center;padding:10px 18px;background:#000718;border-bottom:1px solid #9fb000;gap:12px}
    .vx-logo{font-size:22px;font-weight:700;color:#d4e800;letter-spacing:2px}
    .vx-logo span{color:#fff;font-weight:400}
    .vx-topnav{display:flex;gap:6px;margin-left:auto}
    .dd{position:relative}
    .dd-btn{background:transparent;border:1px solid #9fb000;color:#d4e800;padding:5px 14px;border-radius:5px;font-size:13px;cursor:pointer}
    .dd-btn:hover{background:#9fb000;color:#000}
    .dd-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:#010a2e;border:1px solid #9fb000;border-radius:6px;min-width:170px;z-index:999}
    .dd.open .dd-menu{display:block}
    .dd-menu a{display:block;color:#ccc;padding:9px 16px;font-size:13px;cursor:pointer;border-bottom:1px solid #1a2550;text-decoration:none}
    .dd-menu a:last-child{border-bottom:none}
    .dd-menu a:hover{background:#9fb000;color:#000}
    .vx-ticker{background:#000;padding:5px 16px;display:flex;align-items:center;gap:10px;overflow:hidden}
    .ticker-label{font-size:11px;background:#d4e800;color:#000;padding:2px 8px;border-radius:3px;font-weight:700;white-space:nowrap}
    .ticker-track{display:flex;gap:30px;animation:ticker 28s linear infinite;white-space:nowrap}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .ticker-item{font-size:12px;color:#99aabb}
    .ticker-item span{color:#d4e800}
    .vx-body{display:flex;flex:1}
    .vx-sidebar{width:180px;background:linear-gradient(180deg,#050c2e,#0a1540);border-right:1px solid #1e2d6b;display:flex;flex-direction:column;gap:4px;padding:10px 6px}
    .sb-btn{background:transparent;border:none;color:#aab;padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;text-align:left}
    .sb-btn:hover,.sb-btn.active{background:#1a2d80;color:#d4e800}
    .sb-btn.active{border-left:3px solid #d4e800}
    .sb-section{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px;padding:8px 12px 2px}
    .vx-main{flex:1;max-height:calc(100vh - 84px);overflow-y:auto}
    .vx-page{display:none}
    .vx-page.active{display:block}
    .home-hero{background:linear-gradient(135deg,#010a2e,#0a1f5e,#010a2e);padding:28px 24px 20px;border-bottom:1px solid #9fb000}
    .home-hero h1{font-size:26px;font-weight:700;color:#d4e800;margin-bottom:6px}
    .home-hero p{color:#8899cc;font-size:14px}
    .empty-home{text-align:center;padding:60px 20px;color:#667;font-size:14px}
    .filter-bar{display:flex;gap:6px;padding:10px 18px;flex-wrap:wrap;border-bottom:1px solid #1e2d6b}
    .filter-btn{background:#0a1540;border:1px solid #1e2d6b;color:#aaa;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer}
    .filter-btn:hover,.filter-btn.active{background:#9fb000;color:#000;border-color:#9fb000}
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:18px}
    .post-card{background:#050e30;border:1px solid #1e2d6b;border-radius:12px;overflow:hidden;transition:border-color 0.2s;display:flex;flex-direction:column}
    .post-card:hover{border-color:#9fb000}
    .post-card-img{width:100%;height:160px;object-fit:cover}
    .post-card-emoji{width:100%;height:120px;background:linear-gradient(135deg,#0a1540,#1a2d80);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
    .live-badge{position:absolute;top:8px;left:8px;background:red;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
    .post-card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column}
    .post-card-title{font-size:14px;font-weight:600;color:#ddd;margin-bottom:4px}
    .post-card-summary{font-size:12px;color:#aab;margin-bottom:12px;line-height:1.5}
    .post-card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:auto}
    .post-tag{font-size:11px;background:#0f1e55;color:#9fb000;border-radius:4px;padding:2px 8px}
    .post-link{font-size:12px;color:#9fb000;text-decoration:none;background:#0f1e55;border:1px solid #1e3a6b;border-radius:5px;padding:4px 10px}
    .post-link:hover{background:#1a2d80}
    .post-dl{font-size:12px;color:#000;text-decoration:none;background:#9fb000;border-radius:5px;padding:4px 10px;font-weight:600}
    .read-more{font-size:12px;background:#9fb000;color:#000;border-radius:5px;padding:4px 10px;text-decoration:none;font-weight:600}
    .read-more:hover{background:#d4e800}
    .channel-card{background:#050e30;border:1px solid #1e2d6b;border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px}
    .channel-card:hover{border-color:#9fb000}
    .channel-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;background:#0f1e55;display:flex;align-items:center;justify-content:center;font-size:22px}
    .channel-info{flex:1}
    .channel-name{font-size:14px;font-weight:600;color:#d4e800}
    .channel-sub{font-size:12px;color:#667;margin-top:2px}
    .channel-link{font-size:12px;color:#9fb000;text-decoration:none;border:1px solid #9fb000;border-radius:5px;padding:5px 12px;white-space:nowrap}
    .channel-link:hover{background:#9fb000;color:#000}
    .empty-state{text-align:center;color:#445;padding:40px;font-size:14px}
    .loading-state{text-align:center;color:#667;padding:30px;font-size:13px}
    .contact-page{padding:20px}
    .contact-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
    .contact-card{background:#050e30;border:1px solid #1e2d6b;border-radius:8px;padding:14px;text-align:center;cursor:pointer}
    .contact-card:hover{border-color:#9fb000}
    .cc-icon{font-size:28px;margin-bottom:6px}
    .cc-name{font-size:13px;color:#d4e800;font-weight:600}
    .cc-handle{font-size:11px;color:#778}
  </style>
</head>
<body>
<div class="vx-root">
  <!-- نفس الهيكل السابق -->
  <div class="vx-topbar">...</div>
  <div class="vx-ticker">...</div>
  <div class="vx-body">
    <div class="vx-sidebar">...</div>
    <div class="vx-main">
      <!-- ... جميع الأقسام كما هي ... -->
      <div class="vx-page" id="page-subscribers">
        <div class="page-header"><h2>👥 Subscribers</h2></div>
        <div class="filter-bar">...</div>
        <div class="posts-grid" id="grid-subscribers"><div class="loading-state">Loading...</div></div>
      </div>
      <!-- ... -->
    </div>
  </div>
</div>
<script>
const SB_URL = 'https://eyqcpkhjzpmawqtilhgl.supabase.co';
const SB_KEY = 'sb_publishable_wpU27Lgl48mMujV4UBZ9FA__NqIRQpP';
let allPosts = {};
function truncate(str, len=150) { if (!str) return ''; if (str.length <= len) return str; return str.substring(0, len).trim() + '...'; }
function toggleDD(id) { /* ... */ }
function closeDD() { /* ... */ }
document.addEventListener('click', e => { if(!e.target.closest('.dd')) closeDD(); });
function showPage(id) { /* ... */ loadPage(id); }
async function loadPage(room) { /* ... */ }
function renderCards(posts, gridId, room) {
  const el = document.getElementById(gridId);
  if(!posts||!posts.length) { el.innerHTML='<div class="empty-state">No posts yet 🎮</div>'; return; }
  
  // معاملة خاصة لقسم subscribers (نفس تنسيق yt-channels)
  if (room === 'subscribers' || room === 'yt-channels') {
    el.innerHTML = posts.map(p => {
      const isImg = p.icon && (p.icon.startsWith('data:')||p.icon.startsWith('http'));
      const avatar = isImg ? `<img class="channel-avatar" src="${p.icon}">` : `<div class="channel-avatar">${p.icon||'📺'}</div>`;
      const link = p.url ? `<a href="${p.url}" target="_blank" class="channel-link">Visit Channel</a>` : '';
      // عرض عدد المتابعين إن وجد في description
      const subscriberText = p.description ? `👥 ${p.description} subscribers` : '';
      return `<div class="channel-card">
        ${avatar}
        <div class="channel-info">
          <div class="channel-name">${p.title}</div>
          <div class="channel-sub">${subscriberText}</div>
          <div class="channel-sub" style="font-size:11px; color:#aab;">${p.content || ''}</div>
        </div>
        ${link}
      </div>`;
    }).join('');
    return;
  }
  
  // باقي الأقسام (live, tournaments, highlights, gaming-news, yt-videos, yt-lives, projects)
  el.innerHTML = posts.map(p => {
    const isImg = p.icon && (p.icon.startsWith('data:')||p.icon.startsWith('http'));
    const thumb = isImg ? `<img class="post-card-img" src="${p.icon}">` : `<div class="post-card-emoji">${p.icon||'📄'}${room==='live'&&p.tag==='Live Now'?'<div class="live-badge">LIVE</div>':''}</div>`;
    let summary = ''; if (p.content) summary = truncate(p.content.replace(/<[^>]*>/g, ''), 150); else if (p.description) summary = truncate(p.description, 150);
    const readMoreLink = p.content ? `<a href="post.html?id=${p.id}" class="read-more">📖 اقرأ المزيد</a>` : '';
    let actions = '';
    if(p.url) {
      if(room==='yt-videos'||room==='yt-lives'||room==='youtube-news') actions += `<a href="${p.url}" target="_blank" class="post-link">▶️ Watch</a>`;
      else if(room==='highlights') { actions += `<a href="${p.url}" target="_blank" class="post-dl" download>⬇️ Download</a>`; actions += `<a href="${p.url}" target="_blank" class="post-link">🔗 Link</a>`; }
      else actions += `<a href="${p.url}" target="_blank" class="post-link">🔗 Link</a>`;
    }
    return `<div class="post-card">${thumb}<div class="post-card-body"><div class="post-card-title">${p.title}</div><div class="post-card-summary">${summary}</div><div class="post-card-footer"><span class="post-tag">${p.tag||''}</span><div style="display:flex; gap:6px; flex-wrap:wrap;">${actions}${readMoreLink}</div></div></div></div>`;
  }).join('');
}
function filterPosts(room, tag, btn) { /* ... */ }
// تسجيل الزيارة الفريدة
(function trackVisit() {
  const lastVisit = localStorage.getItem('virtux_last_visit');
  const now = Date.now();
  const oneDay = 24 * 60 * 60 * 1000;
  if (!lastVisit || (now - parseInt(lastVisit)) > oneDay) {
    localStorage.setItem('virtux_last_visit', now);
    fetch('https://eyqcpkhjzpmawqtilhgl.supabase.co/rest/v1/rpc/log_visit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
      body: JSON.stringify({ page_url: window.location.pathname })
    }).catch(e => console.log('Visit log error:', e));
  }
})();
</script>
</body>
</html>
